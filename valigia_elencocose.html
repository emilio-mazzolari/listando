<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Le mie cose - Valigia</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; font-family: -apple-system, Helvetica, Arial, sans-serif; background: #f2f2f7; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 420px; padding: 20px; padding-bottom: 100px; position: relative; }
        .card { background: white; border-radius: 16px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .testo-prodotto { flex-grow: 1; font-size: 16px; color: #1c1c1e; font-weight: 500; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f2f2f7; }
        .item:last-child { border-bottom: none; }
        
        /* Stile pulsanti identico a Prodotti Spesa */
        .btn-small { border: none; border-radius: 8px; width: 34px; height: 34px; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-left: 6px; font-size: 16px; transition: all 0.2s; }
        .plus { background-color: #aec6cf; color: white; } 
        .edit { background-color: #fdfd96; color: #3a3a3c; } 
        .delete { background-color: #ffd1d1; color: #d32f2f; }

        .input-group { display: flex; gap: 10px; margin-bottom: 12px; position: relative; }
        input { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #ddd; font-size: 16px; outline: none; height: 45px; box-sizing: border-box; background: white; }
        .btn-main { width: 100px; height: 45px; border-radius: 12px; border: none; background: #aec6cf; color: white; font-weight: bold; cursor: pointer; font-size: 13px; text-transform: uppercase; }

        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: #aec6cf; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(0,0,0,0.1); z-index: 1000; }
        .tab-item { flex: 1; text-align: center; font-size: 11px; color: #333; text-decoration: none; font-weight: 800; display: flex; flex-direction: column; text-transform: uppercase; }
        .tab-item span { font-size: 22px; margin-bottom: 3px; }
        .tab-active { color: white; }

        /* Categorie Style */
        .cat-title { background: #aec6cf; color: white; padding: 8px 15px; border-radius: 10px; font-weight: 800; font-size: 14px; margin-bottom: 10px; text-transform: uppercase; display: flex; justify-content: space-between; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal-box { background: white; padding: 25px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; }
        .btn-modal { width: 100%; padding: 15px; margin-top: 10px; border-radius: 12px; border: none; background: #aec6cf; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-cancel { background: #e5e5ea; color: #8e8e93; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="app">
        <div class="header-box"><h2 style="margin:0; font-weight: 800;">📋 LE MIE COSE</h2></div>
        
        <!-- AGGIUNGI CATEGORIA -->
        <div class="input-group">
            <input type="text" id="nuovaCategoria" placeholder="Nuova categoria...">
            <button class="btn-main" onclick="creaCategoria()">INSERISCI</button>
        </div>

        <div id="contenitoreMaster">Caricamento...</div>
    </div>

    <div class="tab-bar">
        <a href="index.html" class="tab-item"><span>🏠</span>HOME</a>
        <a href="valigia.html" class="tab-item"><span>💼</span>VALIGIA</a>
        <a href="cosevaligia.html" class="tab-item tab-active"><span>📋</span>COSE</a>
        <a href="#" class="tab-item" onclick="logout()"><span>🚪</span>ESCI</a>
    </div>

    <script>
        const URL_SUPA = "https://eejdpophfxsrqdvsucye.supabase.co/rest/v1";
        const KEY = "sb_publishable_A7ZE5MzG6TtUrTKNo3SebA_qOk3_n4v";
        const headers = { "apikey": KEY, "Content-Type": "application/json", "Authorization": "Bearer " + KEY };
        const userEmail = localStorage.getItem('userEmail');

        const DATI_DEFAULT = {
            "Abbigliamento": ["t-shirt", "stivali per pioggia", "spazzola scarpe", "sciarpa", "scarpe trakking", "scarpe da ballo", "scarpe", "poncho", "pigiama", "pantaloni", "pantaloncini", "pail", "mutande", "monospalla", "maglioni", "giubbino catarifrangente", "giaccone", "giacca a vento", "felpe", "detergente scarpe", "costume", "cinture", "ciabatte", "cappello", "camicie", "calze antiscivolo", "calze", "bretelle"],
            "Igiene": ["accappatoio", "asciugamano", "bagnodoccia", "carta igienica", "cera", "cerotti", "cotton fioc", "dentifricio", "deodorante", "disinfettante mani", "fazzolettini", "filo interdentale", "mascherina", "pettine", "preservativi", "rasoio", "salviette", "salviette umide", "sapone marsiglia", "spazzolino"],
            "Campeggio": ["antizanzare", "borraccia", "cuscino", "federa", "forbici", "lenzuolo", "materassino", "pile", "plaid", "pompetta", "sacchi spazzatura", "sacco a pelo", "scatola plastica", "scopettino tenda", "telo", "tenda", "torcia"],
            "Cucina": ["accendino", "bicchieri", "bombola", "colino", "detersivo", "fornellino", "moka", "pentola", "piatti", "posate", "spugnetta", "vaschetta"],
            "Extra": ["arnica", "auricolari", "caricabatterie", "carta identità", "carta imbarco", "cavigliera", "cellulare", "chiavi di casa", "coltellino svizzero", "comped", "cuffie audio", "cuscino aereo", "custodia occhiali", "guaranà", "ketoprofene", "kit contenitori x aereo", "lasonil", "lenti contatto", "libri", "magnesio potassio", "ombrello", "portafoglio", "powerbank", "prenotazione hotel", "prenotazione parcheggio", "quaderno", "sveglia", "tenda cambusa", "zainetto"],
            "Mare": ["calotta", "costume", "crema solare", "salviettone"],
            "Cibo": ["biscotti", "caffè", "frutta", "latte", "marmellata", "muesli", "olio", "pane", "pasta", "sale", "sughi", "zucchero"]
        };

        async function caricaDati() {
            try {
                const resCat = await fetch(`${URL_SUPA}/categorie_valigia?email_utente=eq.${userEmail}&order=nome.asc`, { headers });
                const categorie = await resCat.json();
                const resArt = await fetch(`${URL_SUPA}/catalogo_valigia?email_utente=eq.${userEmail}&order=nome.asc`, { headers });
                const articoli = await resArt.json();

                if (categorie.length === 0) {
                    renderizzaDati(Object.keys(DATI_DEFAULT).map(n => ({nome: n, id: n, isDefault: true})), []);
                } else {
                    renderizzaDati(categorie, articoli);
                }
            } catch (e) { console.error(e); }
        }

        function renderizzaDati(categorie, articoli) {
            const master = document.getElementById("contenitoreMaster");
            master.innerHTML = "";

            categorie.forEach(cat => {
                const card = document.createElement("div");
                card.className = "card";
                
                const title = document.createElement("div");
                title.className = "cat-title";
                title.innerHTML = `<span>${cat.nome}</span> ${!cat.isDefault ? `<span onclick="eliminaCategoria(${cat.id})" style="cursor:pointer">🗑️</span>` : ''}`;
                card.appendChild(title);

                // Input Aggiungi Nuova Cosa
                const inputGroup = document.createElement("div");
                inputGroup.className = "input-group";
                inputGroup.innerHTML = `
                    <input type="text" id="input-cat-${cat.id}" placeholder="Nuova cosa...">
                    <button class="btn-main" onclick="aggiungiArticolo('${cat.id}', ${cat.isDefault || false})">INSERISCI</button>
                `;
                card.appendChild(inputGroup);

                // Lista prodotti
                const list = document.createElement("div");
                const prods = cat.isDefault ? DATI_DEFAULT[cat.nome] : articoli.filter(a => a.categoria_id == cat.id);
                
                prods.forEach(p => {
                    const nomeProdotto = cat.isDefault ? p : p.nome;
                    const idProdotto = cat.isDefault ? `def-${nomeProdotto}` : p.id;
                    
                    const item = document.createElement("div");
                    item.className = "item";
                    item.innerHTML = `
                        <span class="testo-prodotto">${nomeProdotto}</span>
                        <div style="display:flex;">
                            <button class="btn-small plus" id="btn-${idProdotto}" onclick="mettiInValigia('${idProdotto}', '${nomeProdotto.replace(/'/g, "\\'")}')">+</button>
                            ${!cat.isDefault ? `<button class="btn-small delete" onclick="eliminaArticolo(${p.id})">🗑</button>` : ''}
                        </div>
                    `;
                    list.appendChild(item);
                });
                card.appendChild(list);
                master.appendChild(card);
            });
        }

        async function mettiInValigia(btnId, nome) {
            const btn = document.getElementById(`btn-${btnId}`);
            
            // Verifica duplicati
            const res = await fetch(`${URL_SUPA}/cose_valigia?nome=eq.${nome}&email_utente=eq.${userEmail}`, { headers });
            const esistente = await res.json();

            if (esistente.length > 0) {
                aggiornaBottone(btn, "GIÀ IN LISTA", "#ffd1d1", "#d32f2f");
                return;
            }

            const add = await fetch(`${URL_SUPA}/cose_valigia`, {
                method: "POST", headers,
                body: JSON.stringify({ nome: nome, email_utente: userEmail, completato: false })
            });

            if (add.ok) {
                aggiornaBottone(btn, "AGGIUNTO", "#aec6cf", "white");
            }
        }

        function aggiornaBottone(btn, testo, sfondo, coloreTesto) {
            const originalText = "+";
            const originalBg = "";
            btn.innerText = testo;
            btn.style.backgroundColor = sfondo;
            btn.style.color = coloreTesto;
            btn.style.width = "auto";
            btn.style.padding = "0 8px";
            btn.style.fontSize = "12px";
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.backgroundColor = originalBg;
                btn.style.color = "";
                btn.style.width = "34px";
                btn.style.padding = "0";
                btn.style.fontSize = "16px";
            }, 1500);
        }

        async function creaCategoria() {
            const nome = document.getElementById("nuovaCategoria").value.trim();
            if (!nome) return;
            await fetch(`${URL_SUPA}/categorie_valigia`, {
                method: "POST", headers,
                body: JSON.stringify({ nome: nome, email_utente: userEmail })
            });
            document.getElementById("nuovaCategoria").value = "";
            caricaDati();
        }

        async function aggiungiArticolo(catId, isDefault) {
            const input = document.getElementById(`input-cat-${catId}`);
            const nome = input.value.trim();
            if (!nome) return;

            if (isDefault) {
                // Se aggiunge a un default, creiamo prima la categoria nel DB per quell'utente
                const res = await fetch(`${URL_SUPA}/categorie_valigia`, {
                    method: "POST", headers,
                    body: JSON.stringify({ nome: catId, email_utente: userEmail })
                });
                const nuovaCat = await fetch(`${URL_SUPA}/categorie_valigia?nome=eq.${catId}&email_utente=eq.${userEmail}`, { headers }).then(r => r.json());
                catId = nuovaCat[0].id;
            }

            await fetch(`${URL_SUPA}/catalogo_valigia`, {
                method: "POST", headers,
                body: JSON.stringify({ nome: nome, categoria_id: catId, email_utente: userEmail })
            });
            input.value = "";
            caricaDati();
        }

        async function eliminaCategoria(id) {
            if(confirm("Eliminare categoria e prodotti?")) {
                await fetch(`${URL_SUPA}/categorie_valigia?id=eq.${id}`, { method: "DELETE", headers });
                caricaDati();
            }
        }

        async function eliminaArticolo(id) {
            await fetch(`${URL_SUPA}/catalogo_valigia?id=eq.${id}`, { method: "DELETE", headers });
            caricaDati();
        }

        function logout() { localStorage.clear(); window.location.href = 'login.html'; }
        if (!userEmail) window.location.href = 'login.html';
        caricaDati();
    </script>
</body>
</html>
