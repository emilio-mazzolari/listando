<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Listando - Le mie cose</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --green: #0fba8d; --blue: #3384d4; --yellow: #feb310;
            --grey: #d8dddc; --dark: #000000; --bg: #fdfdfd;
            --soft-blue: #aec6cf;
        }

        body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--dark); display: flex; justify-content: center; }
        .app { width: 100%; max-width: 420px; padding: 20px; padding-bottom: 110px; }

        h2 { font-weight: 900; font-size: 24px; margin: 10px 0 20px 0; text-transform: uppercase; }

        /* Box Inserimento Categoria */
        .category-input-box { 
            background: rgba(216, 221, 220, 0.3); 
            padding: 15px; 
            border-radius: 28px; 
            margin-bottom: 25px;
            border: 1px solid rgba(216, 221, 220, 0.5);
        }

        .input-group { display: flex; gap: 10px; }
        input { 
            flex: 1; padding: 12px; border-radius: 16px; border: 2px solid var(--grey); 
            outline: none; font-size: 14px; background: white; transition: border-color 0.2s;
        }
        input:focus { border-color: var(--blue); }

        .btn-action-main { 
            background: var(--blue); color: white; border: none; border-radius: 16px; 
            width: 50px; height: 50px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .btn-action-main svg { width: 22px; height: 22px; stroke-width: 3.5; stroke: currentColor; fill: none; }

        /* Card Categoria */
        .card { background: white; border-radius: 28px; padding: 18px; border: 3px solid var(--grey); margin-bottom: 25px; }
        
        .cat-title { 
            font-weight: 900; font-size: 14px; color: var(--blue); 
            margin-bottom: 15px; text-transform: uppercase; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .btn-del-cat { color: #ff4d4d; cursor: pointer; font-size: 18px; }

        /* Lista Articoli */
        .item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 2px solid #f2f2f7; }
        .item:last-child { border-bottom: none; }
        .testo-prodotto { font-weight: 700; font-size: 15px; }

        .btn-actions { display: flex; gap: 8px; }
        .btn-small { 
            border: 2.5px solid var(--grey); border-radius: 12px; width: 40px; height: 40px; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; background: white; 
        }
        .btn-small svg { width: 18px; height: 18px; stroke-width: 3; stroke: currentColor; fill: none; }
        .btn-small.plus { border-color: var(--blue); color: var(--blue); }
        .btn-small.delete { border-color: #ff4d4d; color: #ff4d4d; }

        /* Feedback stato pulsante */
        .btn-feedback { font-size: 10px !important; font-weight: 800; text-transform: uppercase; width: auto !important; padding: 0 10px; }

        /* Tab Bar */
        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 3px solid var(--grey); z-index: 1000; }
        .tab-item { flex: 1; text-align: center; font-size: 10px; color: var(--dark); text-decoration: none; font-weight: 800; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .tab-active { color: var(--soft-blue); }
        .icon-tab { width: 26px; height: 26px; stroke-width: 2.5; stroke: currentColor; fill: none; }
    </style>
</head>
<body>

    <div class="app">
        <h2>📋 Le mie cose</h2>

        <div class="category-input-box">
            <div class="input-group">
                <input type="text" id="nuovaCategoria" placeholder="Aggiungi nuova categoria...">
                <button class="btn-action-main" onclick="creaCategoria()">
                    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
            </div>
        </div>

        <div id="contenitoreMaster">
            <p style="text-align:center; padding:20px; font-weight:700; color:var(--grey);">Caricamento...</p>
        </div>
    </div>

    <div class="tab-bar">
        <a href="index.html" class="tab-item"><svg class="icon-tab" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>HOME</a>
        <a href="valigia.html" class="tab-item"><svg class="icon-tab" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>VALIGIA</a>
        <a href="cosevaligia.html" class="tab-item tab-active"><svg class="icon-tab" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>COSE</a>
        <a href="#" class="tab-item" onclick="logout()"><svg class="icon-tab" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline></svg>ESCI</a>
    </div>

    <script>
        const URL_SUPA = "https://eejdpophfxsrqdvsucye.supabase.co/rest/v1";
        const KEY = "sb_publishable_A7ZE5MzG6TtUrTKNo3SebA_qOk3_n4v";
        const headers = { "apikey": KEY, "Content-Type": "application/json", "Authorization": "Bearer " + KEY };
        const userEmail = localStorage.getItem('userEmail');

        const DATI_DEFAULT = {
            "Abbigliamento": ["t-shirt", "stivali per pioggia", "spazzola scarpe", "sciarpa", "scarpe trakking", "scarpe da ballo", "scarpe", "poncho", "pigiama", "pantaloni", "pantaloncini", "pail", "mutande", "monospalla", "maglioni", "giubbino catarifrangente", "giaccone", "giacca a vento", "felpe", "detergente scarpe", "costume", "cinture", "ciabatte", "cappello", "camicie", "calze antiscivolo", "calze", "bretelle"],
            "Igiene": ["accappatoio", "asciugamano", "bagnodoccia", "carta igienica", "cera", "cerotti", "cotton fioc", "dentifricio", "deodorante", "disinfettante mani", "fazzolettini", "filo interdentale", "mascherina", "pettine", "preservativi", "rasoio", "salviette", "salviette umide", "sapone marsiglia", "spazzolino"],
            "Campeggio": ["antizanzare", "borraccia", "cuscino", "federa", "forbici", "lenzuolo", "materassino", "pile", "plaid", "pompetta", "sacchi spazzatura", "sacco a pelo", "scatola plastica", "scopettino tenda", "telo", "tenda", "torcia"],
            "Cucina": ["accendino", "bicchieri", "bombola", "colino", "detersivo", "fornellino", "moka", "pentola", "piatti", "posate", "spugnetta", "vaschetta"],
            "Extra": ["arnica", "auricolari", "caricabatterie", "carta identità", "carta imbarco", "cavigliera", "cellulare", "chiavi di casa", "coltellino svizzero", "comped", "cuffie audio", "cuscino aereo", "custodia occhiali", "guaranà", "ketoprofene", "kit contenitori x aereo", "lasonil", "lenti contatto", "libri", "magnesio potassio", "ombrello", "portafoglio", "powerbank", "prenotazione hotel", "prenotazione parcheggio", "quaderno", "sveglia", "tenda cambusa", "zainetto"],
            "Mare": ["calotta", "costume", "crema solare", "salviettone"],
            "Cibo": ["biscotti", "caffè", "frutta", "latte", "marmellata", "muesli", "olio", "pane", "pasta", "sale", "sughi", "zucchero"]
        };

        async function caricaDati() {
            try {
                const resCat = await fetch(`${URL_SUPA}/categorie_valigia?email_utente=eq.${userEmail}&order=nome.asc`, { headers });
                const categorie = await resCat.json();
                const resArt = await fetch(`${URL_SUPA}/catalogo_valigia?email_utente=eq.${userEmail}&order=nome.asc`, { headers });
                const articoli = await resArt.json();

                if (categorie.length === 0) {
                    renderizzaDati(Object.keys(DATI_DEFAULT).map(n => ({nome: n, id: n, isDefault: true})), []);
                } else {
                    renderizzaDati(categorie, articoli);
                }
            } catch (e) { console.error(e); }
        }

        function renderizzaDati(categorie, articoli) {
            const master = document.getElementById("contenitoreMaster");
            master.innerHTML = "";

            categorie.forEach(cat => {
                const card = document.createElement("div");
                card.className = "card";
                
                card.innerHTML = `
                    <div class="cat-title">
                        <span>${cat.nome}</span>
                        ${!cat.isDefault ? `<span class="btn-del-cat" onclick="eliminaCategoria(${cat.id})">×</span>` : ''}
                    </div>
                    <div class="input-group" style="margin-bottom:15px">
                        <input type="text" id="input-cat-${cat.id}" placeholder="Aggiungi cosa...">
                        <button class="btn-action-main" onclick="aggiungiArticolo('${cat.id}', ${cat.isDefault || false})">
                            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        </button>
                    </div>
                    <div id="lista-${cat.id}"></div>
                `;

                const listDiv = card.querySelector(`#lista-${cat.id}`);
                const prods = cat.isDefault ? DATI_DEFAULT[cat.nome] : articoli.filter(a => a.categoria_id == cat.id);
                
                prods.forEach(p => {
                    const nomeProdotto = cat.isDefault ? p : p.nome;
                    const idProdotto = cat.isDefault ? `def-${nomeProdotto.replace(/\s+/g, '')}` : p.id;
                    
                    const item = document.createElement("div");
                    item.className = "item";
                    item.innerHTML = `
                        <span class="testo-prodotto">${nomeProdotto}</span>
                        <div class="btn-actions">
                            <button class="btn-small plus" id="btn-${idProdotto}" onclick="mettiInValigia('${idProdotto}', '${nomeProdotto.replace(/'/g, "\\'")}')">
                                <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                            </button>
                            ${!cat.isDefault ? `
                            <button class="btn-small delete" onclick="eliminaArticolo(${p.id})">
                                <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                            </button>` : ''}
                        </div>
                    `;
                    listDiv.appendChild(item);
                });
                master.appendChild(card);
            });
        }

        async function mettiInValigia(btnId, nome) {
            const btn = document.getElementById(`btn-${btnId}`);
            const res = await fetch(`${URL_SUPA}/cose_valigia?nome=eq.${nome}&email_utente=eq.${userEmail}`, { headers });
            const esistente = await res.json();

            if (esistente.length > 0) {
                aggiornaBottone(btn, "ESISTE", "var(--yellow)", "white");
                return;
            }

            const add = await fetch(`${URL_SUPA}/cose_valigia`, {
                method: "POST", headers,
                body: JSON.stringify({ nome: nome, email_utente: userEmail, completato: false })
            });

            if (add.ok) aggiornaBottone(btn, "OK!", "var(--green)", "white");
        }

        function aggiornaBottone(btn, testo, sfondo, coloreTesto) {
            const originalHTML = btn.innerHTML;
            btn.innerHTML = `<span class="btn-feedback">${testo}</span>`;
            btn.style.backgroundColor = sfondo;
            btn.style.color = coloreTesto;
            btn.classList.add('btn-feedback');
            setTimeout(() => {
                btn.innerHTML = originalHTML;
                btn.style.backgroundColor = "";
                btn.style.color = "";
                btn.classList.remove('btn-feedback');
            }, 1200);
        }

        async function creaCategoria() {
            const nome = document.getElementById("nuovaCategoria").value.trim();
            if (!nome) return;
            await fetch(`${URL_SUPA}/categorie_valigia`, {
                method: "POST", headers,
                body: JSON.stringify({ nome: nome, email_utente: userEmail })
            });
            document.getElementById("nuovaCategoria").value = "";
            caricaDati();
        }

        async function aggiungiArticolo(catId, isDefault) {
            const input = document.getElementById(`input-cat-${catId}`);
            const nome = input.value.trim();
            if (!nome) return;

            if (isDefault) {
                await fetch(`${URL_SUPA}/categorie_valigia`, {
                    method: "POST", headers,
                    body: JSON.stringify({ nome: catId, email_utente: userEmail })
                });
                const nuovaCat = await fetch(`${URL_SUPA}/categorie_valigia?nome=eq.${catId}&email_utente=eq.${userEmail}`, { headers }).then(r => r.json());
                catId = nuovaCat[0].id;
            }

            await fetch(`${URL_SUPA}/catalogo_valigia`, {
                method: "POST", headers,
                body: JSON.stringify({ nome: nome, categoria_id: catId, email_utente: userEmail })
            });
            input.value = "";
            caricaDati();
        }

        async function eliminaCategoria(id) {
            if(confirm("Eliminare categoria e prodotti contenuti?")) {
                await fetch(`${URL_SUPA}/categorie_valigia?id=eq.${id}`, { method: "DELETE", headers });
                caricaDati();
            }
        }

        async function eliminaArticolo(id) {
            await fetch(`${URL_SUPA}/catalogo_valigia?id=eq.${id}`, { method: "DELETE", headers });
            caricaDati();
        }

        function logout() { localStorage.clear(); window.location.href = 'login.html'; }
        if (!userEmail) window.location.href = 'login.html';
        caricaDati();
    </script>
</body>
</html>
