<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Listando - Le mie cose</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --green: #0fba8d;
            --blue: #3384d4;
            --yellow: #feb310;
            --red: #ff4d4d;
            --grey: #d8dddc;
            --grey-light: #f2f2f7;
            --dark: #111111;
            --bg: #f5f6f8;
            --white: #ffffff;
            --shadow: 0 4px 20px rgba(0,0,0,0.07);
        }

        * { box-sizing: border-box; }

        html, body { overflow-x: hidden; max-width: 100%; }

        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--dark);
            display: flex;
            justify-content: center;
        }

        .app {
            width: 100%;
            max-width: 420px;
            padding: 24px 20px 120px;
        }

        .page-title {
            font-weight: 900;
            font-size: 26px;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            margin: 0 0 20px 0;
        }

        /* ── Input categoria ── */
        .input-card {
            background: var(--white);
            padding: 16px;
            border-radius: 24px;
            border: 3px solid var(--grey);
            margin-bottom: 16px;
            box-shadow: var(--shadow);
        }
        .input-row { display: flex; gap: 10px; align-items: center; }
        .input-card input {
            flex: 1;
            min-width: 0;
            padding: 12px 16px;
            border-radius: 14px;
            border: 2.5px solid var(--grey);
            outline: none;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            color: var(--dark);
            background: var(--bg);
            transition: border-color 0.2s;
        }
        .input-card input:focus { border-color: var(--yellow); }

        .btn-save {
            flex-shrink: 0;
            padding: 12px 18px;
            border-radius: 14px;
            background: var(--yellow);
            color: white;
            border: none;
            font-weight: 800;
            font-size: 13px;
            cursor: pointer;
            text-transform: uppercase;
            white-space: nowrap;
            font-family: inherit;
            transition: opacity 0.15s;
        }
        .btn-save:active { opacity: 0.85; }

        /* ── Card categoria ── */
        .card {
            background: var(--white);
            border-radius: 28px;
            border: 3px solid var(--grey);
            overflow: hidden;
            box-shadow: var(--shadow);
            margin-bottom: 16px;
        }

        .card-cat-header {
            padding: 14px 20px 12px;
            border-bottom: 2px solid var(--grey-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .cat-title {
            font-weight: 900;
            font-size: 12px;
            color: var(--yellow);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .btn-del-cat {
            color: var(--red);
            cursor: pointer;
            font-size: 20px;
            line-height: 1;
            background: none;
            border: none;
            padding: 0;
            font-family: inherit;
        }

        .card-add-row {
            display: flex;
            gap: 8px;
            padding: 10px 16px;
            border-bottom: 2px solid var(--grey-light);
        }
        .card-add-row input {
            flex: 1;
            min-width: 0;
            padding: 10px 14px;
            border-radius: 12px;
            border: 2px solid var(--grey);
            outline: none;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            color: var(--dark);
            background: var(--bg);
            transition: border-color 0.2s;
        }
        .card-add-row input:focus { border-color: var(--yellow); }
        .btn-add-row {
            flex-shrink: 0;
            padding: 10px 14px;
            border-radius: 12px;
            background: var(--yellow);
            color: white;
            border: none;
            font-weight: 800;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            font-family: inherit;
            transition: opacity 0.15s;
        }
        .btn-add-row:active { opacity: 0.85; }

        /* ── Righe articolo ── */
        .item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 13px 20px;
            border-bottom: 2px solid var(--grey-light);
        }
        .item:last-child { border-bottom: none; }

        .testo-prodotto {
            flex: 1;
            font-weight: 700;
            font-size: 15px;
            line-height: 1.3;
        }

        .btn-actions { display: flex; gap: 7px; }

        .btn-ic {
            width: 44px; height: 44px;
            border-radius: 12px;
            border: 2.5px solid var(--grey);
            background: white;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
            flex-shrink: 0;
            font-family: inherit;
        }
        .btn-ic:active { transform: scale(0.9); }
        .btn-ic svg { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 2.5; }

        .btn-ic.add { border-color: var(--yellow); color: var(--yellow); font-size: 22px; font-weight: 900; line-height: 1; }
        .btn-ic.del { border-color: var(--red);    color: var(--red);    }

        .btn-ic.add:active { background: #fff8e6; }
        .btn-ic.del:active { background: #fff0f0; }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: 105px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: var(--dark); color: white;
            padding: 12px 22px; border-radius: 20px;
            font-size: 13px; font-weight: 700;
            opacity: 0; pointer-events: none;
            transition: all 0.3s ease;
            z-index: 3000;
            max-width: calc(100vw - 40px);
            white-space: normal;
            text-align: center;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ── Tab Bar ── */
        .tab-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 88px;
            background: white;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 3px solid var(--grey);
            z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom, 0);
        }
        .tab-item {
            flex: 1; text-align: center;
            font-size: 10px; color: #aaa;
            text-decoration: none;
            font-weight: 800;
            display: flex; flex-direction: column;
            align-items: center; gap: 5px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            transition: color 0.15s;
        }
        .tab-active { color: var(--yellow); }
        .icon-tab { width: 24px; height: 24px; stroke-width: 2.5; stroke: currentColor; fill: none; }

        /* ── Safe areas ── */
        .app {
            padding-left: max(20px, env(safe-area-inset-left, 20px));
            padding-right: max(20px, env(safe-area-inset-right, 20px));
        }

        /* ── Focus styles ── */
        button:focus-visible, a:focus-visible {
            outline: 3px solid var(--blue);
            outline-offset: 2px;
        }

        /* ── Tablet portrait (≥600px) ── */
        @media (min-width: 600px) {
            .app { max-width: 640px; padding-left: 28px; padding-right: 28px; }
        }

        /* ── iPad / tablet landscape (≥768px) ── */
        @media (min-width: 768px) {
            .app { max-width: 760px; padding-left: 36px; padding-right: 36px; }
        }

        /* ── Desktop (≥1024px): sidebar navigation ── */
        @media (min-width: 1024px) {
            body { display: block; }

            .app {
                margin-left: 240px;
                max-width: 900px;
                padding: 48px 56px 60px;
            }

            .tab-bar {
                top: 0; bottom: 0; right: auto;
                width: 240px;
                height: 100vh;
                flex-direction: column;
                justify-content: flex-start;
                align-items: stretch;
                border-top: none;
                border-right: 3px solid var(--grey);
                padding: 28px 12px 24px;
                overflow-y: auto;
            }

            .tab-bar::before {
                content: "LISTANDO";
                display: block;
                font-weight: 900;
                font-size: 20px;
                letter-spacing: -0.8px;
                color: var(--green);
                padding: 0 8px 28px;
                font-family: 'Segoe UI', system-ui, sans-serif;
            }

            .tab-item {
                flex: none;
                flex-direction: row;
                justify-content: flex-start;
                padding: 13px 16px;
                font-size: 13px;
                gap: 12px;
                text-align: left;
                border-radius: 14px;
                letter-spacing: 0;
                min-height: 44px;
                margin-bottom: 2px;
            }

            .tab-active { background: rgba(254, 179, 16, 0.1); }

            .icon-tab { width: 20px; height: 20px; flex-shrink: 0; }

            .modal-overlay { align-items: center; padding-bottom: 0; }
            .modal-box { border-radius: 28px; }
        }

        /* ── Wide desktop (≥1280px) ── */
        @media (min-width: 1280px) {
            .tab-bar { width: 260px; }
            .app { margin-left: 260px; max-width: 940px; }
        }

        /* ── Small mobile overflow fix (≤400px) ── */
        @media (max-width: 400px) {
            .item { padding: 12px 14px; }
            .testo-prodotto { word-break: break-word; min-width: 0; }
            /* stack input + button vertically */
            .input-row { flex-direction: column; align-items: stretch; }
            .btn-save { width: 100%; text-align: center; }
            .card-add-row { flex-direction: column; align-items: stretch; padding: 10px 12px; }
            .btn-add-row { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

<div class="app">
    <h2 class="page-title">Le mie cose</h2>

    <div class="input-card">
        <div class="input-row">
            <input type="text" id="nuovaCategoria" placeholder="Nuova categoria..."
                   onkeydown="if(event.key==='Enter') creaCategoria()">
            <button class="btn-save" onclick="creaCategoria()">+ Categoria</button>
        </div>
    </div>

    <div id="contenitoreMaster">
        <div style="text-align:center; padding:40px 20px; color:#aaa; font-weight:700;">Caricamento…</div>
    </div>
</div>

<div class="toast" id="toast"></div>

<!-- Tab Bar -->
<nav class="tab-bar">
    <a href="index.html" class="tab-item">
        <svg class="icon-tab" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        Home
    </a>
    <a href="valigia.html" class="tab-item">
        <svg class="icon-tab" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        Valigia
    </a>
    <a href="valigia_elencocose.html" class="tab-item tab-active">
        <svg class="icon-tab" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        Cose
    </a>
    <a href="#" class="tab-item" onclick="logout()">
        <svg class="icon-tab" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/></svg>
        Esci
    </a>
</nav>

<script>
    const URL_SUPA = "https://eejdpophfxsrqdvsucye.supabase.co/rest/v1";
    const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlamRwb3BoZnhzcnFkdnN1Y3llIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NTMzMDQsImV4cCI6MjA5MzIyOTMwNH0.mpxbwlJyIdZgqKIdutHbLd85JR1P11yiglbYeApi17k";
    const headers = {
        "apikey": KEY,
        "Content-Type": "application/json",
        "Authorization": "Bearer " + KEY,
        "Prefer": "return=minimal"
    };
    const headersRead = {
        "apikey": KEY,
        "Authorization": "Bearer " + KEY
    };
    const userEmail = localStorage.getItem('userEmail');
    if (!userEmail) window.location.href = 'login.html';

    const DATI_DEFAULT = {
        "Abbigliamento": ["t-shirt", "stivali per pioggia", "spazzola scarpe", "sciarpa", "scarpe trakking", "scarpe da ballo", "scarpe", "poncho", "pigiama", "pantaloni", "pantaloncini", "pail", "mutande", "monospalla", "maglioni", "giubbino catarifrangente", "giaccone", "giacca a vento", "felpe", "detergente scarpe", "costume", "cinture", "ciabatte", "cappello", "camicie", "calze antiscivolo", "calze", "bretelle"],
        "Igiene": ["accappatoio", "asciugamano", "bagnodoccia", "carta igienica", "cera", "cerotti", "cotton fioc", "dentifricio", "deodorante", "disinfettante mani", "fazzolettini", "filo interdentale", "mascherina", "pettine", "preservativi", "rasoio", "salviette", "salviette umide", "sapone marsiglia", "spazzolino"],
        "Campeggio": ["antizanzare", "borraccia", "cuscino", "federa", "forbici", "lenzuolo", "materassino", "pile", "plaid", "pompetta", "sacchi spazzatura", "sacco a pelo", "scatola plastica", "scopettino tenda", "telo", "tenda", "torcia"],
        "Cucina": ["accendino", "bicchieri", "bombola", "colino", "detersivo", "fornellino", "moka", "pentola", "piatti", "posate", "spugnetta", "vaschetta"],
        "Extra": ["arnica", "auricolari", "caricabatterie", "carta identità", "carta imbarco", "cavigliera", "cellulare", "chiavi di casa", "coltellino svizzero", "comped", "cuffie audio", "cuscino aereo", "custodia occhiali", "guaranà", "ketoprofene", "kit contenitori x aereo", "lasonil", "lenti contatto", "libri", "magnesio potassio", "ombrello", "portafoglio", "powerbank", "prenotazione hotel", "prenotazione parcheggio", "quaderno", "sveglia", "tenda cambusa", "zainetto"],
        "Mare": ["calotta", "costume", "crema solare", "salviettone"],
        "Cibo": ["biscotti", "caffè", "frutta", "latte", "marmellata", "muesli", "olio", "pane", "pasta", "sale", "sughi", "zucchero"]
    };

    async function caricaDati() {
        try {
            const resCat = await fetch(`${URL_SUPA}/categorie_valigia?email_utente=eq.${userEmail}&order=nome.asc`, { headers: headersRead });
            const categorie = await resCat.json();
            const resArt = await fetch(`${URL_SUPA}/catalogo_valigia?email_utente=eq.${userEmail}&order=nome.asc`, { headers: headersRead });
            const articoli = await resArt.json();

            if (categorie.length === 0) {
                renderizzaDati(Object.keys(DATI_DEFAULT).map(n => ({ nome: n, id: n, isDefault: true })), []);
            } else {
                renderizzaDati(categorie, articoli);
            }
        } catch (e) { console.error(e); }
    }

    function renderizzaDati(categorie, articoli) {
        const master = document.getElementById("contenitoreMaster");
        master.innerHTML = "";

        categorie.forEach(cat => {
            const card = document.createElement("div");
            card.className = "card";

            card.innerHTML = `
                <div class="card-cat-header">
                    <span class="cat-title">${cat.nome}</span>
                    ${!cat.isDefault ? `<button class="btn-del-cat" onclick="eliminaCategoria(${cat.id})" aria-label="Elimina categoria">×</button>` : ''}
                </div>
                <div class="card-add-row">
                    <input type="text" id="input-cat-${cat.id}" placeholder="Aggiungi cosa..."
                           onkeydown="if(event.key==='Enter') aggiungiArticolo('${cat.id}', ${cat.isDefault || false})">
                    <button class="btn-add-row" onclick="aggiungiArticolo('${cat.id}', ${cat.isDefault || false})">+ Aggiungi</button>
                </div>
                <div id="lista-${cat.id}"></div>
            `;

            const listDiv = card.querySelector(`#lista-${cat.id}`);
            const prods = cat.isDefault ? DATI_DEFAULT[cat.nome] : articoli.filter(a => a.categoria_id == cat.id);

            prods.forEach(p => {
                const nomeProdotto = cat.isDefault ? p : p.nome;
                const idProdotto = cat.isDefault ? `def-${nomeProdotto.replace(/\s+/g, '')}` : p.id;

                const item = document.createElement("div");
                item.className = "item";
                item.innerHTML = `
                    <span class="testo-prodotto">${nomeProdotto}</span>
                    <div class="btn-actions">
                        <button class="btn-ic add" id="btn-${idProdotto}"
                                onclick="mettiInValigia('${idProdotto}', '${nomeProdotto.replace(/'/g, "\\'")}')"
                                aria-label="Aggiungi alla valigia">+</button>
                        ${!cat.isDefault ? `
                        <button class="btn-ic del" onclick="eliminaArticolo(${p.id})" aria-label="Elimina">
                            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                        </button>` : ''}
                    </div>`;
                listDiv.appendChild(item);
            });

            master.appendChild(card);
        });
    }

    async function mettiInValigia(btnId, nome) {
        const btn = document.getElementById(`btn-${btnId}`);
        btn.disabled = true;

        try {
            const res = await fetch(
                `${URL_SUPA}/cose_valigia?nome=eq.${encodeURIComponent(nome)}&email_utente=eq.${userEmail}`,
                { headers: headersRead }
            );
            const esistente = await res.json();

            if (esistente.length > 0) {
                mostraFeedbackBottone(btn, "GIÀ IN LISTA", "var(--grey)", "var(--dark)");
                return;
            }

            const add = await fetch(`${URL_SUPA}/cose_valigia`, {
                method: "POST",
                headers,
                body: JSON.stringify({ nome, email_utente: userEmail, completato: false })
            });

            if (add.ok || add.status === 201 || add.status === 204) {
                mostraFeedbackBottone(btn, "✓", "var(--yellow)", "white");
                mostraToast("✓ Aggiunto alla valigia!");
            } else {
                btn.disabled = false;
                mostraToast("Errore nell'aggiunta");
            }
        } catch (e) {
            console.error("mettiInValigia:", e);
            btn.disabled = false;
            mostraToast("Errore di rete");
        }
    }

    function mostraFeedbackBottone(btn, testo, sfondo, colore) {
        const testoOriginale = btn.textContent;
        btn.textContent = testo;
        btn.style.background = sfondo;
        btn.style.color = colore;
        btn.style.borderColor = sfondo;
        setTimeout(() => {
            btn.textContent = testoOriginale;
            btn.style.background = "";
            btn.style.color = "";
            btn.style.borderColor = "";
            btn.disabled = false;
        }, 1400);
    }

    async function creaCategoria() {
        const nome = document.getElementById("nuovaCategoria").value.trim();
        if (!nome) return;
        await fetch(`${URL_SUPA}/categorie_valigia`, {
            method: "POST",
            headers,
            body: JSON.stringify({ nome, email_utente: userEmail })
        });
        document.getElementById("nuovaCategoria").value = "";
        caricaDati();
    }

    async function aggiungiArticolo(catId, isDefault) {
        const input = document.getElementById(`input-cat-${catId}`);
        const nome = input.value.trim();
        if (!nome) return;

        if (isDefault) {
            await fetch(`${URL_SUPA}/categorie_valigia`, {
                method: "POST",
                headers,
                body: JSON.stringify({ nome: catId, email_utente: userEmail })
            });
            const r = await fetch(`${URL_SUPA}/categorie_valigia?nome=eq.${encodeURIComponent(catId)}&email_utente=eq.${userEmail}`, { headers: headersRead });
            const nuovaCat = await r.json();
            catId = nuovaCat[0].id;
        }

        await fetch(`${URL_SUPA}/catalogo_valigia`, {
            method: "POST",
            headers,
            body: JSON.stringify({ nome, categoria_id: catId, email_utente: userEmail })
        });
        input.value = "";
        caricaDati();
    }

    async function eliminaCategoria(id) {
        if (confirm("Eliminare categoria e prodotti contenuti?")) {
            await fetch(`${URL_SUPA}/categorie_valigia?id=eq.${id}`, { method: "DELETE", headers });
            caricaDati();
        }
    }

    async function eliminaArticolo(id) {
        await fetch(`${URL_SUPA}/catalogo_valigia?id=eq.${id}`, { method: "DELETE", headers });
        caricaDati();
    }

    let toastTimer;
    function mostraToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
    }

    function logout() { localStorage.clear(); window.location.href = 'login.html'; }

    caricaDati();
</script>
</body>
</html>
