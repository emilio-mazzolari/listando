<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Cose Viaggio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body { margin: 0; font-family: -apple-system, Helvetica, Arial, sans-serif; background: #f2f2f7; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 420px; padding: 20px; padding-bottom: 100px; }
        .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        
        /* Stile Categorie */
        .categoria-container { margin-bottom: 20px; }
        .categoria-titolo { 
            background: #aec6cf; color: white; padding: 10px 15px; 
            border-radius: 12px 12px 0 0; font-weight: bold; text-transform: uppercase; font-size: 14px;
        }
        .card { background: white; border-radius: 0 0 16px 16px; padding: 10px 15px; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

        .item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .item:last-child { border-bottom: none; }
        .testo-prodotto { flex-grow: 1; font-size: 16px; color: #1c1c1e; text-transform: capitalize; }
        
        .btn-small { border: none; border-radius: 8px; width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-left: 4px; font-size: 16px; transition: all 0.2s; }
        .plus { background-color: #779ecb; color: white; } 

        /* Input */
        .input-group { display: flex; gap: 10px; margin-bottom: 12px; }
        input { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #ddd; font-size: 16px; outline: none; height: 45px; box-sizing: border-box; }
        .btn-main { width: 100px; height: 45px; border-radius: 12px; border: none; background: #aec6cf; color: white; font-weight: bold; cursor: pointer; }

        /* Tab Bar */
        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: #aec6cf; display: flex; justify-content: space-around; align-items: center; z-index: 1000; border-top: 1px solid rgba(0,0,0,0.1); }
        .tab-item { flex: 1; text-align: center; font-size: 14px; color: black; text-decoration: none; text-transform: uppercase; font-weight: 600; }
        .tab-active { font-weight: 900; color: white; }
    </style>
</head>
<body>

    <div class="app">
        <div class="header-box"><h1 style="margin:0; font-size: 24px;">🧳 Cose da Viaggio</h1></div>
        
        <!-- Ricerca rapida -->
        <div class="input-group">
            <input type="text" id="cercaCosa" placeholder="Cerca tra le categorie..." onkeyup="filtraCose()">
        </div>

        <div id="listaCategorie">
            <!-- Qui verranno generate le categorie dello screenshot -->
        </div>
    </div>

    <div class="tab-bar">
        <a href="index.html" class="tab-item">🏠 LISTE</a>
        <a href="prodotti.html" class="tab-item">🛒 SPESA</a>
        <a href="coseviaggio.html" class="tab-item tab-active">🧳 VIAGGIO</a>
        <a href="#" class="tab-item" onclick="logout()">🚪 ESCI</a>
    </div>

    <script>
        const URL = "https://eejdpophfxsrqdvsucye.supabase.co/rest/v1";
        const KEY = "sb_publishable_A7ZE5MzG6TtUrTKNo3SebA_qOk3_n4v";
        const headers = { "apikey": KEY, "Content-Type": "application/json", "Authorization": "Bearer " + KEY };
        const userEmail = localStorage.getItem('userEmail');

        // Database delle cose basato sul tuo screenshot
        const databaseCose = {
            "Abbigliamento": ["t-shirt", "stivali per pioggia", "spazzola scarpe", "sciarpa", "scarpe trekking", "scarpe da ballo", "scarpe", "poncho", "pigiama", "pantaloni", "pantaloncini", "pail", "mutande", "monospalla", "maglioni", "giubbino catarifrangente", "giaccone", "giacca a vento", "felpe", "detergente scarpe", "costume", "cinture", "ciabatte", "cappello", "camicie", "calze antiscivolo", "calze", "bretelle"],
            "Igiene": ["accappatoio", "asciugamano", "bagnodoccia", "carta igienica", "cera", "cerotti", "cotton fioc", "dentifricio", "deodorante", "disinfettante mani", "fazzolettini", "filo interdentale", "mascherina", "pettine", "preservativi", "rasoio", "salviette", "salviette umide", "sapone marsiglia", "spazzolino"],
            "Campeggio": ["antizanzare", "borraccia", "cuscino", "federa", "forbici", "lenzuolo", "materassino", "pile", "plaid", "pompetta", "sacchi spazzatura", "sacco a pelo", "scatola plastica", "scopettino tenda", "telo", "tenda", "torcia"],
            "Cucina": ["accendino", "bicchieri", "bombola", "colino", "detersivo", "fornellino", "moka", "pentola", "piatti", "posate", "spugnetta", "vaschetta"],
            "Extra": ["arnica", "auricolari", "caricabatterie", "carta identità", "carta imbarco", "cavigliera", "cellulare", "chiavi di casa", "coltellino svizzero", "comped", "cuffie audio", "cuscino aereo", "custodia occhiali", "guaranà", "ketoprofene", "kit contenitori x aereo", "lasonil", "lenti contatto", "libri", "magnesio potassio", "ombrello", "portafoglio", "powerbank", "prenotazione hotel", "prenotazione parcheggio", "quaderno", "sveglia", "tenda cambusa", "zainetto"],
            "Mare": ["calotta", "costume", "crema solare", "salviettone"],
            "Cibo": ["biscotti", "caffè", "frutta", "latte", "marmellata", "muesli", "olio", "pane", "pasta", "sale", "sughi", "zucchero"]
        };

        function renderizzaCose(filtro = "") {
            const container = document.getElementById("listaCategorie");
            container.innerHTML = "";

            for (const [categoria, oggetti] of Object.entries(databaseCose)) {
                const oggettiFiltrati = oggetti.filter(o => o.toLowerCase().includes(filtro.toLowerCase()));
                
                if (oggettiFiltrati.length > 0) {
                    const catDiv = document.createElement("div");
                    catDiv.className = "categoria-container";
                    
                    let html = `<div class="categoria-titolo">${categoria}</div><div class="card">`;
                    
                    oggettiFiltrati.forEach(obj => {
                        html += `
                            <div class="item">
                                <span class="testo-prodotto">${obj}</span>
                                <button class="btn-small plus" id="btn-${categoria}-${obj.replace(/\s/g, '')}" onclick="aggiungiAlista('${obj}', '${categoria}')">+</button>
                            </div>`;
                    });
                    
                    html += `</div>`;
                    catDiv.innerHTML = html;
                    container.appendChild(catDiv);
                }
            }
        }

        function filtraCose() {
            const query = document.getElementById("cercaCosa").value;
            renderizzaCose(query);
        }

        async function aggiungiAlista(nome, categoria) {
            const btnId = `btn-${categoria}-${nome.replace(/\s/g, '')}`;
            const btn = document.getElementById(btnId);

            // Verifica se già presente
            const check = await fetch(`${URL}/lista_viaggio?nome=eq.${nome}&email_utente=eq.${userEmail}`, { headers });
            const data = await check.json();

            if (data.length > 0) {
                aggiornaBottone(btn, "GIÀ C'È", "#db5151");
                return;
            }

            // Inserimento
            await fetch(`${URL}/lista_viaggio`, {
                method: "POST", headers,
                body: JSON.stringify({ 
                    nome: nome, 
                    categoria: categoria, 
                    email_utente: userEmail, 
                    completato: false 
                })
            });

            aggiornaBottone(btn, "OK", "#45a049");
        }

        function aggiornaBottone(btn, testo, colore) {
            const originale = btn.innerHTML;
            btn.innerText = testo;
            btn.style.backgroundColor = colore;
            btn.style.width = "auto";
            btn.style.padding = "0 8px";
            setTimeout(() => {
                btn.innerHTML = originale;
                btn.style.backgroundColor = "";
                btn.style.width = "32px";
                btn.style.padding = "0";
            }, 1500);
        }

        function logout() { localStorage.removeItem('userEmail'); window.location.href = 'login.html'; }

        // Avvio
        if (!userEmail) window.location.href = 'login.html';
        renderizzaCose();
    </script>
</body>
</html>
