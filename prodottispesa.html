<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Listando - Prodotti</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --green: #0fba8d; --blue: #3384d4; --yellow: #feb310;
            --red: #ff4d4d; --grey: #d8dddc; --dark: #000000; --bg: #fdfdfd;
        }

        body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--dark); display: flex; justify-content: center; }
        .app { width: 100%; max-width: 420px; padding: 20px; padding-bottom: 110px; }

        h2 { font-weight: 900; font-size: 24px; margin: 10px 0 20px 0; }

        .category-box { 
            background: rgba(216, 221, 220, 0.3); 
            padding: 15px; 
            border-radius: 28px; 
            margin-bottom: 25px;
            border: 1px solid rgba(216, 221, 220, 0.5);
        }
        .filter-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-filter { 
            padding: 14px; border-radius: 20px; border: 3px solid var(--grey); 
            background: white; font-weight: 800; font-size: 12px; cursor: pointer;
            transition: all 0.2s; text-transform: uppercase;
        }
        .btn-filter.active { background: var(--blue); color: white; border-color: var(--blue); }

        .input-group { background: white; padding: 18px; border-radius: 28px; border: 3px solid var(--grey); margin-bottom: 20px; }
        .add-row { display: grid; grid-template-columns: 1.2fr 0.8fr 50px; gap: 8px; margin-bottom: 12px; }
        .search-row { display: flex; gap: 8px; }

        input, select { padding: 12px; border-radius: 16px; border: 2px solid var(--grey); outline: none; font-size: 14px; width: 100%; box-sizing: border-box; background: white; }
        input:focus, select:focus { border-color: var(--blue); }
        
        .btn-action-main { 
            background: var(--blue); color: white; border: none; border-radius: 16px; 
            width: 50px; height: 50px; font-weight: 900; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .btn-action-main svg { width: 22px; height: 22px; stroke-width: 3.5; stroke: currentColor; fill: none; }

        .card { background: white; border-radius: 28px; padding: 5px 18px; border: 3px solid var(--grey); min-height: 100px; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 2px solid #f2f2f7; }
        .item:last-child { border-bottom: none; }
        .testo-prodotto { font-weight: 700; font-size: 16px; flex: 1; margin-right: 10px; }
        
        .btn-actions { display: flex; gap: 6px; }
        .btn-small { border: 2.5px solid var(--grey); border-radius: 12px; width: 38px; height: 38px; cursor: pointer; display: flex; align-items: center; justify-content: center; background: white; }
        .btn-small svg { width: 16px; height: 16px; stroke-width: 3; stroke: currentColor; fill: none; }
        
        .btn-small.plus { border-color: var(--blue); color: var(--blue); }
        .btn-small.edit { border-color: var(--yellow); color: var(--yellow); }
        .btn-small.delete { border-color: var(--red); color: var(--red); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(5px); }
        .modal-box { background: white; padding: 30px; border-radius: 32px; width: 85%; max-width: 380px; text-align: center; border: 4px solid var(--grey); box-sizing: border-box;}
        .modal-box input, .modal-box select { margin-bottom: 15px; display: block; width: 100%; }
        .btn-modal { width: 100%; padding: 16px; margin-top: 10px; border-radius: 18px; border: none; font-weight: 800; cursor: pointer; font-size: 16px; }

        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 3px solid var(--grey); z-index: 1000; }
        .tab-item { flex: 1; text-align: center; font-size: 10px; color: var(--dark); text-decoration: none; font-weight: 800; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .tab-active { color: var(--green); }
        .icon-tab { width: 26px; height: 26px; stroke-width: 2.5; stroke: currentColor; fill: none; }
    </style>
</head>
<body>

    <div class="app">
        <h2>Prodotti</h2>

        <div class="category-box">
            <div class="filter-container">
                <button class="btn-filter active" id="btn-Cibo" onclick="setFilter('Cibo', this)">Cibo</button>
                <button class="btn-filter" id="btn-Igiene" onclick="setFilter('Igiene Persona', this)">Igiene</button>
                <button class="btn-filter" id="btn-Casa" onclick="setFilter('Cura Casa', this)">Casa</button>
                <button class="btn-filter" id="btn-Altro" onclick="setFilter('Altro', this)">Altro</button>
            </div>
        </div>

        <div class="input-group">
            <div class="add-row">
                <input type="text" id="nuovoProdotto" placeholder="Inserisci nuovo prodotto">
                <select id="nuovaCategoria">
                    <option value="" disabled selected>Scegli categoria</option>
                    <option value="Cibo">Cibo</option>
                    <option value="Igiene Persona">Igiene</option>
                    <option value="Cura Casa">Casa</option>
                    <option value="Altro">Altro</option>
                </select>
                <button class="btn-action-main" onclick="gestisciInserimento()">
                    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
            </div>
            
            <div class="search-row">
                <input type="text" id="cercaProdotto" placeholder="Cerca tra i prodotti..." onkeyup="renderizzaProdotti()">
                <button class="btn-action-main">
                    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
            </div>
        </div>

        <div class="card" id="listaProdotti">Caricamento prodotti...</div>
    </div>

    <div id="editModal" class="modal-overlay">
        <div class="modal-box">
            <h3 style="margin-top:0">Modifica Prodotto</h3>
            <input type="text" id="inputModifica">
            <select id="selectModificaCat">
                <option value="Cibo">Cibo</option>
                <option value="Igiene Persona">Igiene Persona</option>
                <option value="Cura Casa">Cura Casa</option>
                <option value="Altro">Altro</option>
            </select>
            <button class="btn-modal" style="background:var(--blue); color:white;" onclick="salvaModifica()">SALVA</button>
            <button class="btn-modal" style="background:var(--grey);" onclick="chiudiModal()">CHIUDI</button>
        </div>
    </div>

    <div class="tab-bar">
        <a href="index.html" class="tab-item"><svg class="icon-tab" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>HOME</a>
        <a href="spesa.html" class="tab-item"><svg class="icon-tab" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>SPESA</a>
        <a href="prodottispesa.html" class="tab-item tab-active"><svg class="icon-tab" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>PRODOTTI</a>
        <a href="#" class="tab-item" onclick="logout()"><svg class="icon-tab" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline></svg>ESCI</a>
    </div>

    <script>
        const URL = "https://eejdpophfxsrqdvsucye.supabase.co/rest/v1";
        const KEY = "sb_publishable_A7ZE5MzG6TtUrTKNo3SebA_qOk3_n4v";
        const headers = { "apikey": KEY, "Content-Type": "application/json", "Authorization": "Bearer " + KEY };
        const userEmail = localStorage.getItem('userEmail');
        
        let prodottiBase = [];
        let categoriaCorrente = 'Cibo';
        let idInModifica = null;

        function setFilter(cat, btn) {
            categoriaCorrente = cat;
            document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderizzaProdotti();
        }

        async function caricaProdotti() {
            try {
                const response = await fetch(`${URL}/prodotti?select=*&order=nome.asc`, { headers });
                prodottiBase = await response.json();
                renderizzaProdotti();
            } catch (e) { 
                console.error(e);
                document.getElementById("listaProdotti").innerHTML = "Errore nel caricamento.";
            }
        }

        function renderizzaProdotti() {
            const query = document.getElementById("cercaProdotto").value.toLowerCase();
            const div = document.getElementById("listaProdotti");
            div.innerHTML = "";

            const filtrati = prodottiBase.filter(p => {
                let cat = p.categoria;
                if (!cat || cat === "" || cat === "null") cat = "Cibo";
                return cat === categoriaCorrente && p.nome.toLowerCase().includes(query);
            });

            if(filtrati.length === 0) {
                div.innerHTML = "<p style='text-align:center;color:#888;padding:20px;'>Nessun prodotto trovato</p>";
                return;
            }

            filtrati.forEach(p => {
                const riga = document.createElement("div");
                riga.className = "item";
                riga.innerHTML = `
                    <span class="testo-prodotto">${p.nome}</span>
                    <div class="btn-actions">
                        <button class="btn-small plus" onclick="mettiInLista(${p.id}, '${p.nome.replace(/'/g, "\\'")}')" title="Aggiungi alla spesa">
                            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        </button>
                        <button class="btn-small edit" onclick="apriModalModifica(${p.id}, '${p.nome.replace(/'/g, "\\'")}', '${p.categoria}')" title="Modifica">
                            <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4L18.5 2.5z"></path></svg>
                        </button>
                        <button class="btn-small delete" onclick="eliminaProdotto(${p.id}, '${p.nome.replace(/'/g, "\\'")}')" title="Elimina">
                            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                        </button>
                    </div>`;
                div.appendChild(riga);
            });
        }

        async function eliminaProdotto(id, nome) {
            if (!confirm(`Sei sicuro di voler eliminare definitivamente "${nome}"?`)) return;
            
            try {
                const res = await fetch(`${URL}/prodotti?id=eq.${id}`, {
                    method: "DELETE",
                    headers: headers
                });
                if (res.ok) {
                    caricaProdotti();
                } else {
                    alert("Errore durante l'eliminazione.");
                }
            } catch (e) {
                console.error(e);
            }
        }

        async function gestisciInserimento() {
            const nomeInput = document.getElementById("nuovoProdotto");
            const catSelect = document.getElementById("nuovaCategoria");
            const nome = nomeInput.value.trim();
            const categoria = catSelect.value;

            if(!nome) { alert("Inserisci il nome del prodotto"); return; }
            if(!categoria) { alert("Scegli una categoria"); return; }

            const res = await fetch(`${URL}/prodotti`, { 
                method: "POST", headers, 
                body: JSON.stringify({ nome, categoria, email: userEmail }) 
            });

            if(res.ok) {
                nomeInput.value = "";
                catSelect.selectedIndex = 0;
                caricaProdotti();
            }
        }

        async function mettiInLista(id) {
    const userEmail = localStorage.getItem('userEmail');
    
    if (!userEmail) {
        alert("Errore: effettua di nuovo il login.");
        return;
    }

    // Inviamo SOLO le colonne che esistono davvero nella tabella 'lista_spesa'
    const payload = { 
        prodotto_id: id, 
        email_utente: userEmail, 
        completato: false 
    };

    const res = await fetch(`${URL}/lista_spesa`, { 
        method: "POST", 
        headers: headers, 
        body: JSON.stringify(payload) 
    });

    if (res.ok) {
        alert("Aggiunto alla lista!");
    } else {
        const error = await res.json();
        console.error("Errore dettagliato:", error);
        alert("Errore: " + error.message);
    }
}
        function apriModalModifica(id, nome, cat) {
            idInModifica = id;
            document.getElementById("inputModifica").value = nome;
            document.getElementById("selectModificaCat").value = cat || "Cibo";
            document.getElementById("editModal").style.display = "flex";
        }

        async function salvaModifica() {
            const nome = document.getElementById("inputModifica").value;
            const cat = document.getElementById("selectModificaCat").value;
            await fetch(`${URL}/prodotti?id=eq.${idInModifica}`, { 
                method: "PATCH", headers, 
                body: JSON.stringify({ nome, categoria: cat }) 
            });
            chiudiModal(); 
            caricaProdotti();
        }

        function chiudiModal() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }
        function logout() { localStorage.clear(); window.location.href = 'login.html'; }

        caricaProdotti();
    </script>
</body>
</html>
