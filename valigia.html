<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Listando - Valigia</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --green: #0fba8d; --blue: #3384d4; --yellow: #feb310;
            --grey: #d8dddc; --dark: #000000; --bg: #fdfdfd;
            --soft-blue: #aec6cf;
        }

        body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--dark); display: flex; justify-content: center; }
        .app { width: 100%; max-width: 420px; padding: 20px; padding-bottom: 110px; }

        h2 { font-weight: 900; font-size: 24px; margin: 10px 0 20px 0; text-transform: uppercase; }

        /* Lista Card principale */
        .card { background: white; border-radius: 28px; padding: 5px 18px; border: 3px solid var(--grey); min-height: 100px; margin-bottom: 20px; }
        
        .item { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 2px solid #f2f2f7; }
        .item:last-child { border-bottom: none; }
        
        .testo-prodotto { font-weight: 700; font-size: 16px; }
        .testo-prodotto.barrato { text-decoration: line-through; color: #8e8e93; opacity: 0.5; }

        /* Bottoni Azione Piccoli (V, Ritorna, X) */
        .btn-actions { display: flex; gap: 8px; }
        .btn-small { border: 2.5px solid var(--grey); border-radius: 14px; width: 42px; height: 42px; cursor: pointer; display: flex; align-items: center; justify-content: center; background: white; transition: transform 0.1s; }
        .btn-small:active { transform: scale(0.9); }
        .btn-small svg { width: 20px; height: 20px; stroke-width: 3; stroke: currentColor; fill: none; }
        
        .btn-small.check { border-color: var(--green); color: var(--green); }
        .btn-small.restore { border-color: var(--blue); color: var(--blue); }
        .btn-small.delete { border-color: #ff4d4d; color: #ff4d4d; }

        /* Gruppo Bottoni Inferiori */
        .controlli-gruppo { display: flex; flex-direction: column; gap: 10px; }
        .btn-main { 
            width: 100%; padding: 16px; border-radius: 20px; border: 3px solid var(--grey); 
            background: white; font-weight: 800; font-size: 13px; cursor: pointer;
            text-transform: uppercase; transition: all 0.2s;
        }
        .btn-main:hover { background: #f9f9f9; }
        .btn-main.primary { background: var(--blue); color: white; border-color: var(--blue); }

        /* Messaggio Vuoto */
        .empty-msg { text-align: center; padding: 40px 10px; color: #888; font-weight: 600; }
        .btn-empty { 
            display: inline-block; margin-top: 15px; padding: 12px 25px; 
            background: var(--blue); color: white; border-radius: 18px; 
            text-decoration: none; font-weight: 800; font-size: 14px;
        }

        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(5px); }
        .modal-box { background: white; padding: 30px; border-radius: 32px; width: 85%; max-width: 350px; text-align: center; border: 4px solid var(--grey); }
        .modal-box h3 { font-weight: 900; margin-top: 0; }
        
        /* Tab Bar */
        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 3px solid var(--grey); z-index: 1000; }
        .tab-item { flex: 1; text-align: center; font-size: 10px; color: var(--dark); text-decoration: none; font-weight: 800; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .tab-active { color: var(--soft-blue); }
        .icon-tab { width: 26px; height: 26px; stroke-width: 2.5; stroke: currentColor; fill: none; }
    </style>
</head>
<body>

    <div class="app">
        <h2>Lista Valigia</h2>
        
        <div class="card" id="contenitoreLista">
            <p style="text-align:center; padding:20px; font-weight:700;">Caricamento...</p>
        </div>

        <div id="controlliLista" class="controlli-gruppo">
            <button class="btn-main" onclick="eliminaMessi()">Elimina messi in valigia</button>
            <button class="btn-main" onclick="ripristinaValigia()">Ripristina tutto</button>
            <button class="btn-main" onclick="apriModalSvuota()" style="color:#ff4d4d;">Svuota tutta la lista</button>
        </div>
    </div>

    <div id="svuotaModal" class="modal-overlay">
        <div class="modal-box">
            <h3>Svuota Valigia?</h3>
            <p style="font-weight: 600; color: #666;">Sei sicuro di voler cancellare definitivamente tutti gli oggetti?</p>
            <button class="btn-main primary" style="margin-bottom:10px;" onclick="confermaSvuota()">SÌ, CANCELLA TUTTO</button>
            <button class="btn-main" onclick="chiudiModal()">ANNULLA</button>
        </div>
    </div>

    <div class="tab-bar">
        <a href="index.html" class="tab-item"><svg class="icon-tab" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>HOME</a>
        <a href="valigia.html" class="tab-item tab-active"><svg class="icon-tab" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>VALIGIA</a>
        <a href="cosevaligia.html" class="tab-item"><svg class="icon-tab" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>COSE</a>
        <a href="#" class="tab-item" onclick="logout()"><svg class="icon-tab" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline></svg>ESCI</a>
    </div>

    <script>
        const URL_SUPA = "https://eejdpophfxsrqdvsucye.supabase.co/rest/v1/cose_valigia";
        const KEY = "sb_publishable_A7ZE5MzG6TtUrTKNo3SebA_qOk3_n4v";
        const headers = { 
            "apikey": KEY, 
            "Content-Type": "application/json", 
            "Authorization": "Bearer " + KEY 
        };
        const userEmail = localStorage.getItem('userEmail');

        async function caricaLista() {
            try {
                const res = await fetch(`${URL_SUPA}?email_utente=eq.${userEmail}&order=nome.asc`, { headers });
                const dati = await res.json();
                const div = document.getElementById("contenitoreLista");
                const controlli = document.getElementById("controlliLista");

                if (!dati || dati.length === 0) {
                    div.innerHTML = `
                        <div class="empty-msg">
                            La valigia è vuota<br>
                            <a href="cosevaligia.html" class="btn-empty">AGGIUNGI OGGETTI</a>
                        </div>`;
                    controlli.style.display = "none";
                    return;
                }

                controlli.style.display = "flex";
                div.innerHTML = "";
                
                dati.forEach(item => {
                    const riga = document.createElement("div");
                    riga.className = "item";
                    
                    const btnStatus = item.completato 
                        ? `<button class="btn-small restore" onclick="toggleStatus(${item.id}, ${item.completato})">
                             <svg viewBox="0 0 24 24"><path d="M9 14l-4-4 4-4M5 10h11a4 4 0 110 8h-1"/></svg>
                           </button>`
                        : `<button class="btn-small check" onclick="toggleStatus(${item.id}, ${item.completato})">
                             <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
                           </button>`;

                    riga.innerHTML = `
                        <span class="testo-prodotto ${item.completato ? 'barrato' : ''}">${item.nome}</span>
                        <div class="btn-actions">
                            ${btnStatus}
                            <button class="btn-small delete" onclick="eliminaSingolo(${item.id})">
                                <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                            </button>
                        </div>
                    `;
                    div.appendChild(riga);
                });
            } catch (e) { console.error("Errore caricamento:", e); }
        }

        async function toggleStatus(id, stato) {
            await fetch(`${URL_SUPA}?id=eq.${id}`, {
                method: "PATCH", headers,
                body: JSON.stringify({ completato: !stato })
            });
            caricaLista();
        }

        async function eliminaSingolo(id) {
            if(!confirm("Eliminare questo oggetto?")) return;
            await fetch(`${URL_SUPA}?id=eq.${id}`, { method: "DELETE", headers });
            caricaLista();
        }

        async function eliminaMessi() {
            if (confirm("Eliminare gli oggetti già messi in valigia?")) {
                await fetch(`${URL_SUPA}?email_utente=eq.${userEmail}&completato=eq.true`, { method: "DELETE", headers });
                caricaLista();
            }
        }

        async function ripristinaValigia() {
            if (confirm("Rimettere tutto come da preparare?")) {
                await fetch(`${URL_SUPA}?email_utente=eq.${userEmail}`, {
                    method: "PATCH", headers,
                    body: JSON.stringify({ completato: false })
                });
                caricaLista();
            }
        }

        function apriModalSvuota() { document.getElementById('svuotaModal').style.display = 'flex'; }
        function chiudiModal() { document.getElementById('svuotaModal').style.display = 'none'; }
        
        async function confermaSvuota() {
            await fetch(`${URL_SUPA}?email_utente=eq.${userEmail}`, { method: "DELETE", headers });
            chiudiModal();
            caricaLista();
        }

        function logout() { localStorage.clear(); window.location.href = 'login.html'; }
        
        if (!userEmail) { 
            window.location.href = 'login.html'; 
        } else { 
            caricaLista(); 
        }
    </script>
</body>
</html>
