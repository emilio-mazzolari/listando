<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Il Mio Viaggio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; font-family: -apple-system, Helvetica, Arial, sans-serif; background: #f2f2f7; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 420px; padding: 20px; padding-bottom: 100px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-clear { background: #db5151; color: white; border: none; padding: 8px 12px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 12px; }

        .card { background: white; border-radius: 16px; padding: 5px 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #f2f2f7; }
        .item:last-child { border-bottom: none; }
        
        .testo { flex-grow: 1; font-size: 17px; cursor: pointer; transition: 0.2s; }
        .completato { text-decoration: line-through; color: #8e8e93; }
        
        .btn-del { background: none; border: none; font-size: 18px; cursor: pointer; padding: 5px; }

        /* Tab Bar Corretta */
        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: #aec6cf; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(0,0,0,0.1); }
        .tab-item { flex: 1; text-align: center; font-size: 12px; color: #333; text-decoration: none; font-weight: 600; display: flex; flex-direction: column; }
        .tab-item span { font-size: 20px; }
        .tab-active { color: white; font-weight: 900; }
    </style>
</head>
<body>

    <div class="app">
        <div class="header">
            <h2 style="margin:0;">✈️ In Valigia</h2>
            <button class="btn-clear" onclick="svuotaLista()">SVUOTA TUTTO</button>
        </div>

        <div id="listaEffettiva" class="card">
            <p style="text-align:center; color:#888;">La tua valigia è vuota...</p>
        </div>
    </div>

    <!-- Barra di Navigazione -->
    <div class="tab-bar">
        <a href="index.html" class="tab-item"><span>🏠</span>HOME</a>
        <a href="viaggi.html" class="tab-item tab-active"><span>✈️</span>VIAGGI</a>
        <a href="coseviaggio.html" class="tab-item"><span>🧳</span>COSE</a>
        <a href="#" class="tab-item" onclick="logout()"><span>🚪</span>ESCI</a>
    </div>

    <script>
        const URL = "https://eejdpophfxsrqdvsucye.supabase.co/rest/v1/lista_viaggio";
        const KEY = "sb_publishable_A7ZE5MzG6TtUrTKNo3SebA_qOk3_n4v";
        const headers = { "apikey": KEY, "Content-Type": "application/json", "Authorization": "Bearer " + KEY };
        const userEmail = localStorage.getItem('userEmail');

        async function caricaLista() {
            const res = await fetch(`${URL}?email_utente=eq.${userEmail}&order=nome.asc`, { headers });
            const dati = await res.json();
            const container = document.getElementById("listaEffettiva");
            
            if (dati.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#888; padding:20px;">Niente in lista. Vai su "COSE" per aggiungere.</p>';
                return;
            }

            container.innerHTML = "";
            dati.forEach(item => {
                const riga = document.createElement("div");
                riga.className = "item";
                riga.innerHTML = `
                    <span class="testo ${item.completato ? 'completato' : ''}" onclick="toggleCheck(${item.id}, ${item.completato})">
                        ${item.completato ? '✅' : '⬜'} ${item.nome}
                    </span>
                    <button class="btn-del" onclick="eliminaDallaLista(${item.id})">🗑️</button>
                `;
                container.appendChild(riga);
            });
        }

        async function toggleCheck(id, statoAttuale) {
            await fetch(`${URL}?id=eq.${id}`, {
                method: "PATCH", headers,
                body: JSON.stringify({ completato: !statoAttuale })
            });
            caricaLista();
        }

        async function eliminaDallaLista(id) {
            await fetch(`${URL}?id=eq.${id}`, { method: "DELETE", headers });
            caricaLista();
        }

        async function svuotaLista() {
            if(confirm("Vuoi svuotare tutta la lista viaggio?")) {
                await fetch(`${URL}?email_utente=eq.${userEmail}`, { method: "DELETE", headers });
                caricaLista();
            }
        }

        function logout() { localStorage.clear(); window.location.href = 'login.html'; }

        // Inizializzazione
        if (!userEmail) window.location.href = 'login.html';
        caricaLista();
    </script>
</body>
</html>
