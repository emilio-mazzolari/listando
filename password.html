<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Listando - Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --green: #0fba8d; --blue: #3384d4; --red: #ff3b30; --purple: #7c5cbf;
            --grey: #d8dddc; --grey-light: #f2f2f7;
            --dark: #111; --bg: #f5f6f8; --white: #fff;
        }
        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; max-width: 100%; margin: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--dark); }

        .page-header {
            position: sticky; top: 0; z-index: 100;
            background: var(--white); border-bottom: 2px solid var(--grey-light);
            padding: 14px 16px; padding-top: max(14px, env(safe-area-inset-top, 14px));
        }
        .header-row1 { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .btn-back { width: 40px; height: 40px; border-radius: 12px; border: 2.5px solid var(--grey); background: var(--white); display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn-back svg { width: 18px; height: 18px; stroke: var(--dark); fill: none; stroke-width: 2.5; }
        .header-title { font-weight: 900; font-size: 18px; flex: 1; }
        .btn-add-hdr { width: 40px; height: 40px; border-radius: 12px; border: none; background: var(--purple); color: white; font-size: 22px; font-weight: 300; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .search-bar {
            display: flex; align-items: center; gap: 8px;
            background: var(--grey-light); border-radius: 14px; padding: 10px 14px;
        }
        .search-bar svg { width: 16px; height: 16px; stroke: #aaa; fill: none; stroke-width: 2.5; flex-shrink: 0; }
        .search-bar input { border: none; background: none; flex: 1; font-size: 15px; font-family: inherit; outline: none; color: var(--dark); }

        /* Category chips */
        .cats-scroll { overflow-x: auto; white-space: nowrap; padding: 12px 16px 0; scrollbar-width: none; }
        .cats-scroll::-webkit-scrollbar { display: none; }
        .chip-cat {
            display: inline-block; padding: 7px 14px; border-radius: 20px;
            border: 2.5px solid var(--grey); background: var(--white);
            font-weight: 800; font-size: 13px; cursor: pointer; margin-right: 6px;
            transition: all 0.15s;
        }
        .chip-cat.active { border-color: var(--purple); background: var(--purple); color: white; }

        /* List */
        .list-body { padding: 10px 16px 100px; }
        .group-label { font-size: 11px; font-weight: 800; color: #aaa; text-transform: uppercase; letter-spacing: 0.8px; margin: 16px 0 6px; }

        .entry-card {
            background: var(--white); border-radius: 18px;
            margin-bottom: 8px; overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .entry-head {
            display: flex; align-items: center; gap: 12px; padding: 14px 16px;
            cursor: pointer;
        }
        .entry-icon {
            width: 42px; height: 42px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 17px; color: white; flex-shrink: 0;
        }
        .entry-info { flex: 1; min-width: 0; }
        .entry-title { font-weight: 800; font-size: 15px; }
        .entry-username { font-size: 13px; color: #888; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .entry-chevron { color: #ccc; font-size: 18px; transition: transform 0.2s; }
        .entry-card.open .entry-chevron { transform: rotate(180deg); }

        .entry-details { display: none; padding: 0 16px 14px; border-top: 1.5px solid var(--grey-light); }
        .entry-card.open .entry-details { display: block; }

        .detail-row { display: flex; align-items: center; gap: 8px; padding: 10px 0; border-bottom: 1px solid var(--grey-light); }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { font-size: 11px; font-weight: 800; color: #aaa; text-transform: uppercase; width: 80px; flex-shrink: 0; }
        .detail-val { flex: 1; font-size: 14px; font-weight: 600; word-break: break-all; }
        .detail-val.pwd { letter-spacing: 3px; font-family: monospace; color: var(--dark); }
        .detail-val.pwd.shown { letter-spacing: 0; }
        .btn-copy { padding: 5px 10px; border-radius: 8px; border: none; background: var(--grey-light); font-size: 12px; font-weight: 800; cursor: pointer; color: var(--dark); white-space: nowrap; }
        .btn-show { padding: 5px 10px; border-radius: 8px; border: none; background: var(--grey-light); font-size: 12px; font-weight: 800; cursor: pointer; color: var(--dark); }
        .entry-actions { display: flex; gap: 8px; margin-top: 12px; }
        .btn-edit-entry { flex: 1; padding: 10px; border-radius: 14px; border: 2px solid var(--grey); background: white; font-weight: 800; font-size: 14px; cursor: pointer; }
        .btn-open-url { flex: 1; padding: 10px; border-radius: 14px; border: none; background: var(--blue); color: white; font-weight: 800; font-size: 14px; cursor: pointer; }
        .empty-msg { text-align: center; padding: 64px 24px; color: #bbb; font-weight: 700; font-size: 15px; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.5); align-items: flex-end; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal-box { background: var(--white); border-radius: 28px 28px 0 0; padding: 24px 20px; padding-bottom: max(24px, env(safe-area-inset-bottom, 24px)); width: 100%; max-width: 500px; max-height: 92vh; overflow-y: auto; }
        .modal-handle { width: 40px; height: 4px; background: var(--grey); border-radius: 4px; margin: 0 auto 20px; }
        .modal-title { font-weight: 900; font-size: 18px; margin-bottom: 18px; }
        .form-group { margin-bottom: 12px; }
        .form-label { font-size: 12px; font-weight: 800; color: #666; margin-bottom: 5px; display: block; text-transform: uppercase; letter-spacing: 0.4px; }
        .form-input { width: 100%; padding: 12px 14px; border-radius: 14px; border: 2.5px solid var(--grey); font-size: 15px; font-family: inherit; outline: none; transition: border-color 0.2s; }
        .form-input:focus { border-color: var(--purple); }
        .pwd-row { display: flex; gap: 8px; }
        .pwd-row .form-input { flex: 1; font-family: monospace; }
        .btn-gen { padding: 0 14px; border-radius: 14px; border: 2.5px solid var(--grey); background: white; font-size: 13px; font-weight: 800; cursor: pointer; white-space: nowrap; }
        .btn-togshow { padding: 0 12px; border-radius: 14px; border: 2.5px solid var(--grey); background: white; font-size: 16px; cursor: pointer; }

        .custom-fields { margin-top: 4px; }
        .custom-field-row { display: flex; gap: 6px; margin-bottom: 8px; }
        .custom-field-row input { flex: 1; padding: 10px 12px; border-radius: 12px; border: 2px solid var(--grey); font-size: 14px; font-family: inherit; outline: none; }
        .custom-field-row input:focus { border-color: var(--purple); }
        .btn-rm-field { padding: 0 10px; border-radius: 10px; border: none; background: var(--grey-light); font-size: 18px; cursor: pointer; color: #999; }
        .btn-add-field { padding: 9px 14px; border-radius: 12px; border: 2px dashed var(--grey); background: none; font-weight: 700; font-size: 13px; cursor: pointer; color: #888; width: 100%; margin-top: 2px; }

        .btn-save-modal { width: 100%; padding: 16px; border-radius: 18px; border: none; background: var(--purple); color: white; font-weight: 900; font-size: 16px; cursor: pointer; font-family: inherit; margin-top: 8px; }
        .btn-delete-modal { width: 100%; padding: 14px; border-radius: 18px; border: none; background: #fff0f0; color: var(--red); font-weight: 800; font-size: 14px; cursor: pointer; font-family: inherit; margin-top: 8px; }

        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 70px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 2px solid var(--grey-light); padding-bottom: env(safe-area-inset-bottom); z-index: 100; }
        .tab-item { flex: 1; text-align: center; font-size: 11px; color: var(--dark); text-decoration: none; font-weight: 800; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .icon-tab { width: 24px; height: 24px; stroke-width: 2.5px; stroke: var(--dark); fill: none; }
        .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--dark); color: white; padding: 12px 20px; border-radius: 14px; font-weight: 700; font-size: 14px; opacity: 0; transition: all 0.25s; white-space: nowrap; z-index: 999; pointer-events: none; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div class="page-header">
    <div class="header-row1">
        <button class="btn-back" onclick="history.back()">
            <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="header-title">PASSWORD</div>
        <button class="btn-add-hdr" onclick="apriModale()">+</button>
    </div>
    <div class="search-bar">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="search" id="searchInput" placeholder="Cerca…" oninput="render()">
    </div>
</div>

<div class="cats-scroll" id="catsScroll"></div>
<div class="list-body" id="listBody"></div>

<!-- Modal -->
<div class="modal-overlay" id="modaleEntry">
    <div class="modal-box">
        <div class="modal-handle"></div>
        <div class="modal-title" id="modalTitle">Nuova voce</div>

        <div class="form-group">
            <label class="form-label">Categoria</label>
            <select class="form-input" id="fCat">
                <option>Login</option>
                <option>Email</option>
                <option>Carte</option>
                <option>WiFi</option>
                <option>App</option>
                <option>Altro</option>
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">Titolo *</label>
            <input class="form-input" id="fTitolo" placeholder="es. Gmail, Netflix…" type="text">
        </div>
        <div class="form-group">
            <label class="form-label">Username / Email</label>
            <input class="form-input" id="fUsername" placeholder="utente@email.com" type="text" autocomplete="off">
        </div>
        <div class="form-group">
            <label class="form-label">Password</label>
            <div class="pwd-row">
                <input class="form-input" id="fPassword" placeholder="••••••••" type="password" autocomplete="new-password">
                <button class="btn-togshow" onclick="toggleShowPwd()" id="btnTogShow">👁</button>
                <button class="btn-gen" onclick="generaPassword()">Genera</button>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">URL / Sito</label>
            <input class="form-input" id="fUrl" placeholder="https://…" type="url">
        </div>
        <div class="form-group">
            <label class="form-label">Note</label>
            <textarea class="form-input" id="fNote" placeholder="Note aggiuntive…" rows="2" style="resize:none"></textarea>
        </div>

        <div class="form-group">
            <label class="form-label">Campi personalizzati</label>
            <div class="custom-fields" id="customFields"></div>
            <button class="btn-add-field" onclick="addCampo()">+ Aggiungi campo</button>
        </div>

        <button class="btn-save-modal" onclick="salva()">SALVA</button>
        <button class="btn-delete-modal" id="btnElimina" style="display:none" onclick="elimina()">ELIMINA</button>
    </div>
</div>

<div class="tab-bar">
    <a href="index.html" class="tab-item">
        <svg class="icon-tab" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 15 22"/></svg>
        HOME
    </a>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = "https://eejdpophfxsrqdvsucye.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlamRwb3BoZnhzcnFkdnN1Y3llIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NTMzMDQsImV4cCI6MjA5MzIyOTMwNH0.mpxbwlJyIdZgqKIdutHbLd85JR1P11yiglbYeApi17k";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const userEmail = localStorage.getItem('userEmail');
if (!userEmail) location.href = 'login.html';

const CAT_COLORS = { Login: '#3384d4', Email: '#ff9500', Carte: '#0fba8d', WiFi: '#7c5cbf', App: '#ff3b30', Altro: '#8e8e93' };
const ALL_CATS = ['Tutti', 'Login', 'Email', 'Carte', 'WiFi', 'App', 'Altro'];

let voci = [];
let catFiltro = 'Tutti';
let editId = null;

async function carica() {
    const { data } = await sb.from('password_vault').select('*').eq('email_utente', userEmail).order('titolo');
    voci = data || [];
    renderCats();
    render();
}

function renderCats() {
    const usedCats = [...new Set(voci.map(v => v.categoria))];
    const cats = ['Tutti', ...ALL_CATS.slice(1).filter(c => usedCats.includes(c))];
    document.getElementById('catsScroll').innerHTML = cats.map(c =>
        `<button class="chip-cat${catFiltro === c ? ' active' : ''}" onclick="setCat('${c}')">${c}</button>`
    ).join('');
}

function setCat(c) { catFiltro = c; renderCats(); render(); }

function render() {
    const q = document.getElementById('searchInput').value.toLowerCase().trim();
    let filtered = voci.filter(v => {
        if (catFiltro !== 'Tutti' && v.categoria !== catFiltro) return false;
        if (q && !v.titolo.toLowerCase().includes(q) && !(v.username || '').toLowerCase().includes(q) && !(v.url || '').toLowerCase().includes(q)) return false;
        return true;
    });

    const body = document.getElementById('listBody');
    if (!filtered.length) {
        body.innerHTML = '<div class="empty-msg">🔐 Nessuna voce trovata</div>';
        return;
    }

    // Group by category
    const groups = {};
    filtered.forEach(v => {
        if (!groups[v.categoria]) groups[v.categoria] = [];
        groups[v.categoria].push(v);
    });

    body.innerHTML = Object.entries(groups).map(([cat, items]) => `
        <div class="group-label">${cat}</div>
        ${items.map(v => entryHtml(v)).join('')}
    `).join('');
}

function entryHtml(v) {
    const color = CAT_COLORS[v.categoria] || '#8e8e93';
    const initiale = (v.titolo || '?')[0].toUpperCase();
    const hasUrl = v.url && v.url.startsWith('http');
    const campiExtra = Array.isArray(v.campi_extra) ? v.campi_extra : [];
    return `<div class="entry-card" id="card-${v.id}">
        <div class="entry-head" onclick="toggleCard(${v.id})">
            <div class="entry-icon" style="background:${color}">${initiale}</div>
            <div class="entry-info">
                <div class="entry-title">${v.titolo}</div>
                <div class="entry-username">${v.username || '—'}</div>
            </div>
            <div class="entry-chevron">▾</div>
        </div>
        <div class="entry-details">
            ${v.username ? `<div class="detail-row">
                <div class="detail-label">Username</div>
                <div class="detail-val">${v.username}</div>
                <button class="btn-copy" onclick="copia('${v.username.replace(/'/g,"\\'")}')">Copia</button>
            </div>` : ''}
            ${v.password_enc ? `<div class="detail-row">
                <div class="detail-label">Password</div>
                <div class="detail-val pwd" id="pwd-${v.id}">••••••••</div>
                <button class="btn-show" onclick="mostraPwd(${v.id}, '${v.password_enc.replace(/'/g,"\\'")}')">👁</button>
                <button class="btn-copy" onclick="copia('${v.password_enc.replace(/'/g,"\\'")}')">Copia</button>
            </div>` : ''}
            ${v.url ? `<div class="detail-row">
                <div class="detail-label">URL</div>
                <div class="detail-val" style="color:var(--blue);word-break:break-all">${v.url}</div>
            </div>` : ''}
            ${v.note ? `<div class="detail-row">
                <div class="detail-label">Note</div>
                <div class="detail-val">${v.note}</div>
            </div>` : ''}
            ${campiExtra.map(cf => `<div class="detail-row">
                <div class="detail-label">${cf.k}</div>
                <div class="detail-val">${cf.v}</div>
                <button class="btn-copy" onclick="copia('${(cf.v||'').replace(/'/g,"\\'")}')">Copia</button>
            </div>`).join('')}
            <div class="entry-actions">
                <button class="btn-edit-entry" onclick="apriModifica(${v.id})">✏️ Modifica</button>
                ${hasUrl ? `<button class="btn-open-url" onclick="window.open('${v.url}','_blank')">🔗 Apri</button>` : ''}
            </div>
        </div>
    </div>`;
}

function toggleCard(id) {
    const c = document.getElementById('card-' + id);
    if (c) c.classList.toggle('open');
}

function mostraPwd(id, pwd) {
    const el = document.getElementById('pwd-' + id);
    if (!el) return;
    if (el.classList.contains('shown')) {
        el.textContent = '••••••••'; el.classList.remove('shown');
    } else {
        el.textContent = pwd; el.classList.add('shown');
    }
}

function copia(testo) {
    navigator.clipboard.writeText(testo).then(() => toast('✓ Copiato!'));
}

function apriModale() {
    editId = null;
    document.getElementById('modalTitle').textContent = 'Nuova voce';
    document.getElementById('fCat').value = 'Login';
    document.getElementById('fTitolo').value = '';
    document.getElementById('fUsername').value = '';
    document.getElementById('fPassword').value = '';
    document.getElementById('fUrl').value = '';
    document.getElementById('fNote').value = '';
    document.getElementById('customFields').innerHTML = '';
    document.getElementById('btnElimina').style.display = 'none';
    document.getElementById('modaleEntry').classList.add('open');
}

function apriModifica(id) {
    const v = voci.find(x => x.id === id);
    if (!v) return;
    editId = id;
    document.getElementById('modalTitle').textContent = 'Modifica';
    document.getElementById('fCat').value = v.categoria || 'Login';
    document.getElementById('fTitolo').value = v.titolo || '';
    document.getElementById('fUsername').value = v.username || '';
    document.getElementById('fPassword').value = v.password_enc || '';
    document.getElementById('fUrl').value = v.url || '';
    document.getElementById('fNote').value = v.note || '';
    document.getElementById('btnElimina').style.display = '';
    const cf = Array.isArray(v.campi_extra) ? v.campi_extra : [];
    document.getElementById('customFields').innerHTML = '';
    cf.forEach(c => addCampo(c.k, c.v));
    document.getElementById('modaleEntry').classList.add('open');
}

function toggleShowPwd() {
    const inp = document.getElementById('fPassword');
    inp.type = inp.type === 'password' ? 'text' : 'password';
}

function generaPassword() {
    const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%&*?';
    let pwd = '';
    const arr = new Uint8Array(16);
    crypto.getRandomValues(arr);
    arr.forEach(b => { pwd += chars[b % chars.length]; });
    document.getElementById('fPassword').value = pwd;
    document.getElementById('fPassword').type = 'text';
    copia(pwd);
    toast('✓ Password generata e copiata');
}

function addCampo(k = '', v = '') {
    const cf = document.getElementById('customFields');
    const idx = cf.children.length;
    const div = document.createElement('div');
    div.className = 'custom-field-row';
    div.innerHTML = `<input placeholder="Campo" value="${k}" data-cf-k>
                     <input placeholder="Valore" value="${v}" data-cf-v>
                     <button class="btn-rm-field" onclick="this.parentNode.remove()">×</button>`;
    cf.appendChild(div);
}

async function salva() {
    const titolo = document.getElementById('fTitolo').value.trim();
    if (!titolo) { toast('Inserisci il titolo'); return; }
    const campiEl = document.getElementById('customFields').querySelectorAll('.custom-field-row');
    const campi_extra = Array.from(campiEl).map(row => ({
        k: row.querySelector('[data-cf-k]').value.trim(),
        v: row.querySelector('[data-cf-v]').value.trim()
    })).filter(c => c.k);

    const row = {
        email_utente: userEmail,
        categoria: document.getElementById('fCat').value,
        titolo,
        username: document.getElementById('fUsername').value.trim() || null,
        password_enc: document.getElementById('fPassword').value || null,
        url: document.getElementById('fUrl').value.trim() || null,
        note: document.getElementById('fNote').value.trim() || null,
        campi_extra: campi_extra.length ? campi_extra : []
    };

    if (editId) {
        const { error } = await sb.from('password_vault').update(row).eq('id', editId);
        if (error) { toast('Errore: ' + error.message); return; }
        toast('✓ Aggiornato');
    } else {
        const { error } = await sb.from('password_vault').insert(row);
        if (error) { toast('Errore: ' + error.message); return; }
        toast('✓ Aggiunto');
    }
    document.getElementById('modaleEntry').classList.remove('open');
    await carica();
}

async function elimina() {
    if (!editId || !confirm('Eliminare questa voce?')) return;
    await sb.from('password_vault').delete().eq('id', editId);
    document.getElementById('modaleEntry').classList.remove('open');
    toast('Eliminato');
    await carica();
}

document.getElementById('modaleEntry').addEventListener('click', e => {
    if (e.target === document.getElementById('modaleEntry')) document.getElementById('modaleEntry').classList.remove('open');
});

let toastTimer;
function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

carica();
</script>
</body>
</html>
