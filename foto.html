<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Listando - Album</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            color-scheme: light;
            --green: #0fba8d;
            --blue: #3384d4;
            --yellow: #feb310;
            --purple: #7c5cbf;
            --red: #ff4d4d;
            --grey: #d8dddc;
            --grey-light: #f2f2f7;
            --dark: #111111;
            --bg: #f5f6f8;
            --white: #ffffff;
            --shadow: 0 4px 20px rgba(0,0,0,0.07);
        }
        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; max-width: 100%; }
        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--dark);
            display: flex;
            justify-content: center;
        }
        .app {
            width: 100%;
            max-width: 420px;
            padding: 24px 20px 120px;
            padding-left: max(20px, env(safe-area-inset-left, 20px));
            padding-right: max(20px, env(safe-area-inset-right, 20px));
        }
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .page-title { font-weight: 900; font-size: 26px; text-transform: uppercase; letter-spacing: -0.5px; margin: 0; }
        .btn-new {
            background: var(--purple); color: white; border: none;
            border-radius: 16px; padding: 10px 18px;
            font-size: 13px; font-weight: 800; cursor: pointer;
            font-family: inherit; text-transform: uppercase; transition: opacity 0.15s;
        }
        .btn-new:active { opacity: 0.85; }

        /* Storage bar */
        .storage-card {
            background: var(--white); border-radius: 20px;
            border: 3px solid var(--grey); padding: 14px 18px;
            margin-bottom: 16px; box-shadow: var(--shadow);
        }
        .storage-label {
            display: flex; justify-content: space-between;
            font-size: 12px; font-weight: 700; color: #999; margin-bottom: 8px;
        }
        .storage-label span { color: var(--purple); }
        .storage-bar-bg { background: var(--grey-light); border-radius: 8px; height: 8px; overflow: hidden; }
        .storage-bar-fill {
            height: 100%; border-radius: 8px;
            background: linear-gradient(90deg, var(--purple), #a07de0);
            transition: width 0.6s ease; width: 0%;
        }

        /* Filter chips */
        .chips-row {
            display: flex; gap: 8px; overflow-x: auto;
            padding-bottom: 4px; margin-bottom: 12px; scrollbar-width: none;
        }
        .chips-row::-webkit-scrollbar { display: none; }
        .chip {
            flex-shrink: 0; padding: 8px 16px; border-radius: 20px;
            border: 2.5px solid var(--grey); background: var(--white);
            font-size: 12px; font-weight: 800; cursor: pointer;
            text-transform: uppercase; font-family: inherit; transition: all 0.15s;
        }
        .chip.active { background: var(--purple); color: white; border-color: var(--purple); }

        .filter-input-wrap { display: none; margin-bottom: 14px; }
        .filter-input {
            width: 100%; padding: 12px 16px; border-radius: 16px;
            border: 2.5px solid var(--purple); outline: none;
            font-size: 15px; font-weight: 600; font-family: inherit; background: var(--white);
        }

        /* Album grid */
        .album-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .album-card {
            background: var(--white); border-radius: 22px;
            border: 3px solid var(--grey); overflow: hidden;
            box-shadow: var(--shadow); cursor: pointer;
            transition: transform 0.15s; text-decoration: none;
            color: inherit; display: block;
        }
        .album-card:active { transform: scale(0.97); }

        .album-cover-empty {
            width: 100%; aspect-ratio: 1;
            background: linear-gradient(135deg, #e8e0f5, #d4c8ed);
            display: flex; align-items: center; justify-content: center;
        }
        .album-cover-empty svg { width: 36px; height: 36px; stroke: #9b86d0; fill: none; stroke-width: 1.5; }
        .album-cover-img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }

        .album-info { padding: 11px 13px 13px; }
        .album-name { font-weight: 900; font-size: 14px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .album-meta { font-size: 11px; color: #999; font-weight: 600; line-height: 1.6; }
        .album-count { font-size: 11px; color: var(--purple); font-weight: 800; margin-top: 5px; }

        /* Toggle vista */
        .btn-view {
            width: 38px; height: 38px; border-radius: 12px;
            border: 2.5px solid var(--grey); background: var(--white);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: background 0.15s; flex-shrink: 0;
        }
        .btn-view:active { background: var(--grey-light); }

        /* Lista album */
        .album-list { display: flex; flex-direction: column; gap: 8px; }
        .album-list-item {
            background: var(--white); border-radius: 18px;
            border: 3px solid var(--grey); overflow: hidden;
            box-shadow: var(--shadow); cursor: pointer;
            transition: transform 0.15s; text-decoration: none; color: inherit;
            display: flex; align-items: center; gap: 12px; padding: 10px;
        }
        .album-list-item:active { transform: scale(0.98); }
        .album-list-thumb {
            width: 56px; height: 56px; border-radius: 12px; flex-shrink: 0; overflow: hidden;
            background: linear-gradient(135deg, #e8e0f5, #d4c8ed);
            display: flex; align-items: center; justify-content: center;
        }
        .album-list-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .album-list-thumb svg { width: 24px; height: 24px; stroke: #9b86d0; fill: none; stroke-width: 1.5; }
        .album-list-info { flex: 1; min-width: 0; }
        .album-list-name { font-weight: 900; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
        .album-list-meta { font-size: 11px; color: #999; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
        .album-list-count { font-size: 11px; color: var(--purple); font-weight: 800; }
        .album-list-arrow { flex-shrink: 0; color: #ccc; font-size: 20px; line-height: 1; }

        /* Empty state */
        .empty-state { grid-column: 1/-1; text-align: center; padding: 50px 20px; }
        .empty-icon {
            width: 64px; height: 64px; background: var(--grey-light); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;
        }
        .empty-icon svg { width: 30px; height: 30px; stroke: #aaa; fill: none; stroke-width: 2; }
        .empty-title { font-weight: 900; font-size: 17px; margin-bottom: 6px; }
        .empty-sub { color: #999; font-size: 14px; font-weight: 600; }

        /* Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; align-items: flex-end;
            justify-content: center; z-index: 2000; backdrop-filter: blur(6px); padding-bottom: 30px;
        }
        .modal-box {
            background: white; padding: 28px 24px 20px;
            border-radius: 32px 32px 24px 24px; width: 92%; max-width: 400px;
            border: 3px solid var(--grey); animation: slideUp 0.25s ease;
            max-height: 88vh; overflow-y: auto;
        }
        @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-title { font-weight: 900; font-size: 20px; margin: 0 0 20px; text-align: center; }
        .field-group { margin-bottom: 13px; }
        .field-label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; color: #888; margin-bottom: 6px; }
        .modal-input {
            width: 100%; padding: 12px 16px; border-radius: 14px;
            border: 2.5px solid var(--grey); font-size: 15px; font-weight: 600;
            font-family: inherit; outline: none; transition: border-color 0.2s;
        }
        .modal-input:focus { border-color: var(--purple); }
        .btn-modal {
            width: 100%; padding: 15px; margin-top: 8px; border-radius: 18px; border: none;
            font-weight: 800; cursor: pointer; font-size: 15px; font-family: inherit; transition: opacity 0.15s;
        }
        .btn-modal:active { opacity: 0.85; }

        /* Tab Bar */
        .tab-bar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 88px;
            background: white; display: flex; justify-content: space-around; align-items: center;
            border-top: 3px solid var(--grey); z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom, 0);
        }
        .tab-item {
            flex: 1; text-align: center; font-size: 10px; color: #aaa;
            text-decoration: none; font-weight: 800;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
            text-transform: uppercase; letter-spacing: 0.3px;
        }
        .tab-active { color: var(--purple); }
        .icon-tab { width: 24px; height: 24px; stroke-width: 2.5; stroke: currentColor; fill: none; }

        /* Toast */
        .toast {
            position: fixed; bottom: 105px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: var(--dark); color: white; padding: 12px 22px; border-radius: 20px;
            font-size: 13px; font-weight: 700; opacity: 0; pointer-events: none;
            transition: all 0.3s ease; z-index: 3000; max-width: calc(100vw - 40px); text-align: center;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        button:focus-visible, a:focus-visible { outline: 3px solid var(--purple); outline-offset: 2px; }

        @media (min-width: 600px) { .app { max-width: 640px; } }
        @media (min-width: 768px) { .app { max-width: 760px; } }
        @media (min-width: 1024px) {
            body { display: block; }
            .app { margin-left: 240px; max-width: 900px; padding: 48px 56px 60px; }
            .tab-bar {
                top: 0; bottom: 0; right: auto; width: 240px; height: 100vh;
                flex-direction: column; justify-content: flex-start; align-items: stretch;
                border-top: none; border-right: 3px solid var(--grey);
                padding: 28px 12px 24px; overflow-y: auto;
            }
            .tab-bar::before {
                content: "LISTANDO"; display: block; font-weight: 900; font-size: 20px;
                letter-spacing: -0.8px; color: var(--green); padding: 0 8px 28px;
                font-family: 'Segoe UI', system-ui, sans-serif;
            }
            .tab-item {
                flex: none; flex-direction: row; justify-content: flex-start;
                padding: 13px 16px; font-size: 13px; gap: 12px;
                text-align: left; border-radius: 14px; min-height: 44px; margin-bottom: 2px;
            }
            .tab-active { background: rgba(124, 92, 191, 0.1); }
            .icon-tab { width: 20px; height: 20px; flex-shrink: 0; }
            .modal-overlay { align-items: center; padding-bottom: 0; }
            .modal-box { border-radius: 28px; }
            .album-grid { grid-template-columns: 1fr 1fr 1fr; }
        }
        @media (min-width: 1280px) {
            .tab-bar { width: 260px; }
            .app { margin-left: 260px; max-width: 940px; }
            .album-grid { grid-template-columns: 1fr 1fr 1fr 1fr; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="page-header">
        <h2 class="page-title">Album</h2>
        <div style="display:flex;gap:8px;align-items:center">
            <button class="btn-view" id="btnView" onclick="toggleView()"></button>
            <button class="btn-new" onclick="apriModalAlbum()">+ Album</button>
        </div>
    </div>

    <div class="storage-card">
        <div class="storage-label">
            <span id="storageUsed">Calcolo spazio…</span>
            <span id="storagePct"></span>
        </div>
        <div class="storage-bar-bg">
            <div class="storage-bar-fill" id="storageFill"></div>
        </div>
    </div>

    <div class="chips-row">
        <button class="chip active" onclick="setFilter('tutti', this)">Tutti</button>
        <button class="chip" onclick="setFilter('data', this)">Data</button>
        <button class="chip" onclick="setFilter('persone', this)">Persone</button>
        <button class="chip" onclick="setFilter('luogo', this)">Luogo</button>
        <button class="chip" onclick="setFilter('argomento', this)">Argomento</button>
    </div>

    <div class="filter-input-wrap" id="filterWrap">
        <input class="filter-input" id="filterInput" type="text" placeholder="Cerca…" oninput="renderAlbum()">
    </div>

    <div class="album-grid" id="albumGrid">
        <div class="empty-state">
            <div class="empty-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg></div>
            <div class="empty-title">Caricamento…</div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<!-- Modal nuovo album -->
<div id="modalAlbum" class="modal-overlay">
    <div class="modal-box">
        <p class="modal-title">📸 Nuovo Album</p>
        <div class="field-group">
            <div class="field-label">Nome album *</div>
            <input type="text" class="modal-input" id="inNome" placeholder="Es. Vacanza Roma 2025"
                   onkeydown="if(event.key==='Enter') creaAlbum()">
        </div>
        <div class="field-group">
            <div class="field-label">Data</div>
            <input type="date" class="modal-input" id="inData">
        </div>
        <div class="field-group">
            <div class="field-label">Luogo</div>
            <input type="text" class="modal-input" id="inLuogo" placeholder="Es. Roma, Italia">
        </div>
        <div class="field-group">
            <div class="field-label">Argomento</div>
            <input type="text" class="modal-input" id="inArgomento" placeholder="Es. Compleanno, Vacanza…">
        </div>
        <div class="field-group">
            <div class="field-label">Persone (separate da virgola)</div>
            <input type="text" class="modal-input" id="inPersone" placeholder="Es. Marco, Giulia, Anna">
        </div>
        <button class="btn-modal" style="background:var(--purple);color:white;" onclick="creaAlbum()">Crea Album</button>
        <button class="btn-modal" style="background:var(--grey-light);" onclick="chiudiModal()">Annulla</button>
    </div>
</div>

<nav class="tab-bar">
    <a href="index.html" class="tab-item">
        <svg class="icon-tab" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        Home
    </a>
    <a href="foto.html" class="tab-item tab-active">
        <svg class="icon-tab" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        Album
    </a>
    <a href="#" class="tab-item" onclick="logout()">
        <svg class="icon-tab" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/></svg>
        Esci
    </a>
</nav>

<script>
    const SUPABASE_URL = "https://eejdpophfxsrqdvsucye.supabase.co";
    const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlamRwb3BoZnhzcnFkdnN1Y3llIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NTMzMDQsImV4cCI6MjA5MzIyOTMwNH0.mpxbwlJyIdZgqKIdutHbLd85JR1P11yiglbYeApi17k";
    const supabaseClient = supabase.createClient(SUPABASE_URL, KEY);
    const userEmail = localStorage.getItem('userEmail');
    if (!userEmail) window.location.href = 'login.html';

    const STORAGE_MAX_MB = 1000;
    let tuttiAlbum = [];
    let countMap = {};
    let subCountMap = {};
    let filtroCorrente = 'tutti';
    let viewMode = localStorage.getItem('albumView') || 'grid';

    const COVERS = {
        viaggio:    { emoji: '✈️',  g: '#667eea,#764ba2' },
        famiglia:   { emoji: '👪',  g: '#f093fb,#f5576c' },
        natura:     { emoji: '🌿',  g: '#43e97b,#38f9d7' },
        sport:      { emoji: '⚽',  g: '#1d976c,#93f9b9' },
        musica:     { emoji: '🎵',  g: '#fa709a,#fee140' },
        compleanno: { emoji: '🎂',  g: '#ee9ca7,#ffdde1' },
        lavoro:     { emoji: '💼',  g: '#2c3e50,#4ca1af' },
        mare:       { emoji: '🏖️', g: '#00b4db,#0083b0' },
        montagna:   { emoji: '⛰️', g: '#134e5e,#71b280' },
        città:      { emoji: '🏙️', g: '#373b44,#4286f4' },
        cibo:       { emoji: '🍕',  g: '#f7971e,#ffd200' },
        amici:      { emoji: '👫',  g: '#ee0979,#ff6a00' },
        arte:       { emoji: '🎨',  g: '#fc466b,#3f5efb' },
        inverno:    { emoji: '❄️',  g: '#83a4d4,#b6fbff' },
        primavera:  { emoji: '🌸',  g: '#f9d423,#ff4e50' },
        notte:      { emoji: '🌙',  g: '#0f0c29,#302b63' },
    };
    const EMPTY_SVG = `<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`;
    function coverCardHtml(a) {
        if (!a.cover_url) return `<div class="album-cover-empty">${EMPTY_SVG}</div>`;
        if (a.cover_url.startsWith('cover:')) {
            const c = COVERS[a.cover_url.slice(6)];
            return c ? `<div class="album-cover-empty" style="background:linear-gradient(135deg,${c.g});font-size:40px">${c.emoji}</div>` : `<div class="album-cover-empty">${EMPTY_SVG}</div>`;
        }
        return `<img class="album-cover-img" src="${a.cover_url}" alt="${a.nome}" loading="lazy">`;
    }
    function coverThumbHtml(a) {
        if (!a.cover_url) return `<div class="album-list-thumb">${EMPTY_SVG}</div>`;
        if (a.cover_url.startsWith('cover:')) {
            const c = COVERS[a.cover_url.slice(6)];
            return c ? `<div class="album-list-thumb" style="background:linear-gradient(135deg,${c.g});font-size:26px;display:flex;align-items:center;justify-content:center">${c.emoji}</div>` : `<div class="album-list-thumb">${EMPTY_SVG}</div>`;
        }
        return `<div class="album-list-thumb"><img src="${a.cover_url}" alt="" loading="lazy"></div>`;
    }

    async function caricaAlbum() {
        try {
            const [{ data: albums }, { data: fotoRows }, { data: subRows }] = await Promise.all([
                supabaseClient.from('foto_album').select('*').eq('email_utente', userEmail).is('parent_id', null).order('created_at', { ascending: false }),
                supabaseClient.from('foto').select('album_id, size_bytes').eq('email_utente', userEmail),
                supabaseClient.from('foto_album').select('id, parent_id').eq('email_utente', userEmail).not('parent_id', 'is', null)
            ]);

            tuttiAlbum = albums || [];
            countMap = {};
            subCountMap = {};
            let totalBytes = 0;
            (fotoRows || []).forEach(f => {
                countMap[f.album_id] = (countMap[f.album_id] || 0) + 1;
                totalBytes += f.size_bytes || 0;
            });
            (subRows || []).forEach(a => {
                subCountMap[a.parent_id] = (subCountMap[a.parent_id] || 0) + 1;
            });

            const usedMB = (totalBytes / (1024 * 1024)).toFixed(1);
            const pct = Math.min(100, (totalBytes / (STORAGE_MAX_MB * 1024 * 1024)) * 100).toFixed(1);
            document.getElementById('storageUsed').innerHTML = `<span>${usedMB} MB</span> di ${STORAGE_MAX_MB} MB usati`;
            document.getElementById('storagePct').textContent = `${pct}%`;
            document.getElementById('storageFill').style.width = `${pct}%`;

            renderAlbum();
        } catch(e) {
            console.error(e);
            document.getElementById('albumGrid').innerHTML = `<div class="empty-state"><div class="empty-title">Errore di caricamento</div><div class="empty-sub"><a href="">Riprova</a></div></div>`;
        }
    }

    function setFilter(filtro, btn) {
        filtroCorrente = filtro;
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        const wrap = document.getElementById('filterWrap');
        const input = document.getElementById('filterInput');
        if (filtro === 'tutti') {
            wrap.style.display = 'none';
            input.value = '';
        } else {
            const ph = { data: 'Es. 2025, Luglio…', persone: 'Es. Marco, Giulia', luogo: 'Es. Roma, Parigi', argomento: 'Es. Vacanza, Compleanno' };
            input.placeholder = ph[filtro] || 'Cerca…';
            wrap.style.display = 'block';
            input.focus();
        }
        renderAlbum();
    }

    function renderAlbum() {
        const grid = document.getElementById('albumGrid');
        const q = document.getElementById('filterInput').value.trim().toLowerCase();
        let filtrati = tuttiAlbum;

        if (filtroCorrente !== 'tutti' && q) {
            filtrati = tuttiAlbum.filter(a => {
                if (filtroCorrente === 'data')      return (a.data_album || '').includes(q);
                if (filtroCorrente === 'persone')   return (a.persone || '').toLowerCase().includes(q);
                if (filtroCorrente === 'luogo')     return (a.luogo || '').toLowerCase().includes(q);
                if (filtroCorrente === 'argomento') return (a.argomento || '').toLowerCase().includes(q);
                return true;
            });
        }

        if (filtrati.length === 0) {
            grid.className = 'album-grid';
            grid.innerHTML = `<div class="empty-state">
                <div class="empty-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>
                <div class="empty-title">${tuttiAlbum.length === 0 ? 'Nessun album' : 'Nessun risultato'}</div>
                <div class="empty-sub">${tuttiAlbum.length === 0 ? 'Crea il tuo primo album' : 'Prova con un\'altra ricerca'}</div>
            </div>`;
            return;
        }

        grid.innerHTML = '';

        if (viewMode === 'list') {
            grid.className = 'album-list';
            filtrati.forEach(a => {
                const data = a.data_album
                    ? new Date(a.data_album + 'T00:00:00').toLocaleDateString('it', { day: '2-digit', month: 'short', year: 'numeric' })
                    : '';
                const count = countMap[a.id] || 0;
                const subCount = subCountMap[a.id] || 0;
                const metaParts = [data ? `📅 ${data}` : '', a.luogo ? `📍 ${a.luogo}` : '', a.persone ? `👤 ${a.persone}` : ''].filter(Boolean);
                const el = document.createElement('a');
                el.href = `foto_album.html?id=${a.id}`;
                el.className = 'album-list-item';
                el.innerHTML = `
                    ${coverThumbHtml(a)}
                    <div class="album-list-info">
                        <div class="album-list-name">${a.nome}</div>
                        ${metaParts.length ? `<div class="album-list-meta">${metaParts.join('  ·  ')}</div>` : ''}
                        <div class="album-list-count">${count} foto${subCount > 0 ? ` · ${subCount} sub-album` : ''}</div>
                    </div>
                    <span class="album-list-arrow">›</span>`;
                grid.appendChild(el);
            });
        } else {
            grid.className = 'album-grid';
            filtrati.forEach(album => {
                const data = album.data_album
                    ? new Date(album.data_album + 'T00:00:00').toLocaleDateString('it', { day: '2-digit', month: 'short', year: 'numeric' })
                    : '';
                const count = countMap[album.id] || 0;
                const card = document.createElement('a');
                card.href = `foto_album.html?id=${album.id}`;
                card.className = 'album-card';
                card.innerHTML = `
                    ${coverCardHtml(album)}
                    <div class="album-info">
                        <div class="album-name">${album.nome}</div>
                        <div class="album-meta">
                            ${data ? `<span>📅 ${data}</span>` : ''}
                            ${album.luogo ? `<span>📍 ${album.luogo}</span>` : ''}
                            ${album.persone ? `<span>👤 ${album.persone}</span>` : ''}
                        </div>
                        <div class="album-count">${count} foto${(subCountMap[album.id] || 0) > 0 ? ` · ${subCountMap[album.id]} sub-album` : ''}</div>
                    </div>`;
                grid.appendChild(card);
            });
        }
    }

    function toggleView() {
        viewMode = viewMode === 'grid' ? 'list' : 'grid';
        localStorage.setItem('albumView', viewMode);
        updateViewBtn();
        renderAlbum();
    }

    function updateViewBtn() {
        const btn = document.getElementById('btnView');
        if (viewMode === 'grid') {
            btn.title = 'Vista elenco';
            btn.innerHTML = `<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1" fill="#666" stroke="none"/><circle cx="3" cy="12" r="1" fill="#666" stroke="none"/><circle cx="3" cy="18" r="1" fill="#666" stroke="none"/></svg>`;
        } else {
            btn.title = 'Vista griglia';
            btn.innerHTML = `<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>`;
        }
    }

    function apriModalAlbum() { document.getElementById('modalAlbum').style.display = 'flex'; }
    function chiudiModal()    { document.getElementById('modalAlbum').style.display = 'none'; }
    document.getElementById('modalAlbum').addEventListener('click', e => { if (e.target === document.getElementById('modalAlbum')) chiudiModal(); });

    async function creaAlbum() {
        const nome = document.getElementById('inNome').value.trim();
        if (!nome) { mostraToast('⚠️ Inserisci un nome'); return; }
        const { data, error } = await supabaseClient.from('foto_album').insert({
            email_utente: userEmail,
            nome,
            data_album:  document.getElementById('inData').value || null,
            luogo:       document.getElementById('inLuogo').value.trim() || null,
            argomento:   document.getElementById('inArgomento').value.trim() || null,
            persone:     document.getElementById('inPersone').value.trim() || null,
        }).select().single();
        if (error) { mostraToast('Errore nella creazione'); console.error(error); return; }
        chiudiModal();
        ['inNome','inData','inLuogo','inArgomento','inPersone'].forEach(id => document.getElementById(id).value = '');
        window.location.href = `foto_album.html?id=${data.id}`;
    }

    let toastTimer;
    function mostraToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
    }

    function logout() { localStorage.removeItem('userEmail'); window.location.href = 'login.html'; }

    updateViewBtn();
    caricaAlbum();
    document.addEventListener('visibilitychange', () => { if (!document.hidden) caricaAlbum(); });
</script>
</body>
</html>
