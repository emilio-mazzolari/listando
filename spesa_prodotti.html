<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Listando - Prodotti Spesa</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --green: #0fba8d; --blue: #3384d4; --yellow: #feb310;
            --red: #ff4d4d; --grey: #d8dddc; --dark: #000000; --bg: #fdfdfd;
        }
        body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--dark); display: flex; justify-content: center; }
        .app { width: 100%; max-width: 420px; padding: 20px; padding-bottom: 110px; }
        h2 { font-weight: 900; font-size: 24px; margin: 10px 0 20px 0; text-transform: uppercase; }
        
        /* Filtri Categorie */
        .category-box { background: rgba(216, 221, 220, 0.3); padding: 15px; border-radius: 28px; margin-bottom: 25px; border: 1px solid rgba(216, 221, 220, 0.5); }
        .filter-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-filter { padding: 14px; border-radius: 20px; border: 3px solid var(--grey); background: white; font-weight: 800; font-size: 11px; cursor: pointer; transition: all 0.2s; text-transform: uppercase; }
        .btn-filter.active { background: var(--blue); color: white; border-color: var(--blue); }

        /* Struttura Inserimento e Ricerca (2 Righe) */
        .input-group-main { background: white; padding: 20px; border-radius: 28px; border: 3px solid var(--grey); margin-bottom: 20px; display: flex; flex-direction: column; gap: 15px; }
        .input-row { display: flex; align-items: center; gap: 10px; }
        input { flex: 1; padding: 14px 18px; border-radius: 18px; border: 2px solid var(--grey); outline: none; font-size: 15px; background: #f9f9f9; }
        
        .btn-action-main { background: var(--blue); color: white; border: none; border-radius: 18px; width: 52px; height: 52px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .btn-action-main svg { width: 22px; height: 22px; stroke-width: 3.5; stroke: currentColor; fill: none; }

        /* Lista Prodotti */
        .card { background: white; border-radius: 28px; padding: 5px 18px; border: 3px solid var(--grey); min-height: 100px; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 2px solid #f2f2f7; }
        .testo-prodotto { font-weight: 700; font-size: 16px; flex: 1; }
        .btn-actions { display: flex; gap: 8px; }
        
        .btn-small { border: 2.5px solid var(--grey); border-radius: 12px; width: 42px; height: 42px; cursor: pointer; display: flex; align-items: center; justify-content: center; background: white; transition: all 0.2s; }
        .btn-small svg { width: 18px; height: 18px; stroke-width: 3; stroke: currentColor; fill: none; }
        .btn-small.plus { border-color: var(--blue); color: var(--blue); }
        .btn-small.delete { border-color: var(--red); color: var(--red); }

        /* FEEDBACK STILE VALIGIA */
        .btn-feedback { font-size: 9px !important; font-weight: 900; text-transform: uppercase; width: auto !important; padding: 0 10px; min-width: 60px; }

        /* Modali */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(4px); }
        .modal-box { background: white; padding: 25px; border-radius: 30px; width: 85%; max-width: 350px; text-align: center; border: 4px solid var(--grey); }
        select { width: 100%; padding: 12px; border-radius: 15px; border: 2px solid var(--grey); margin: 15px 0; font-size: 16px; }

        /* Tab Bar */
        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 3px solid var(--grey); }
        .tab-item { flex: 1; text-align: center; font-size: 10px; color: var(--dark); text-decoration: none; font-weight: 800; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .tab-active { color: var(--green); }
        .icon-tab { width: 26px; height: 26px; stroke-width: 2.5; stroke: currentColor; fill: none; }
    </style>
</head>
<body>

    <div class="app">
        <h2>Prodotti Spesa</h2>
        
        <div class="category-box">
            <div class="filter-container">
                <button class="btn-filter active" onclick="setFilter('Cibo', this)">Cibo</button>
                <button class="btn-filter" onclick="setFilter('Igiene', this)">Igiene</button>
                <button class="btn-filter" onclick="setFilter('Casa', this)">Casa</button>
                <button class="btn-filter" onclick="setFilter('Altro', this)">Altro</button>
            </div>
        </div>

        <div class="input-group-main">
            <div class="input-row">
                <input type="text" id="nuovoProdotto" placeholder="Inserisci nuovo prodotto...">
                <button class="btn-action-main" id="btn-add-main" onclick="apriModalCategoria()">
                    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
            </div>
            <div class="input-row">
                <input type="text" id="cercaProdotto" placeholder="Cerca prodotto..." onkeyup="renderizzaProdotti()">
                <button class="btn-action-main">
                    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
            </div>
        </div>

        <div class="card" id="listaProdotti">Caricamento...</div>
    </div>

    <div id="catModal" class="modal-overlay">
        <div class="modal-box">
            <h3>Scegli Categoria</h3>
            <select id="selectCatNuovo">
                <option value="Cibo">Cibo</option>
                <option value="Igiene">Igiene</option>
                <option value="Casa">Casa</option>
                <option value="Altro">Altro</option>
            </select>
            <button class="btn-action-main" style="width:100%; border-radius:15px; margin-bottom:10px" onclick="confermaInserimento()">CONFERMA</button>
            <button class="btn-action-main" style="width:100%; border-radius:15px; background:var(--grey); color:black" onclick="chiudiModal()">ANNULLA</button>
        </div>
    </div>

    <div class="tab-bar">
        <a href="index.html" class="tab-item"><svg class="icon-tab" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>HOME</a>
        <a href="spesa.html" class="tab-item"><svg class="icon-tab" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>SPESA</a>
        <a href="spesa_prodotti.html" class="tab-item tab-active"><svg class="icon-tab" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>PRODOTTI</a>
        <a href="#" class="tab-item" onclick="logout()"><svg class="icon-tab" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline></svg>ESCI</a>
    </div>

    <script>
        const URL = "https://eejdpophfxsrqdvsucye.supabase.co/rest/v1";
        const KEY = "sb_publishable_A7ZE5MzG6TtUrTKNo3SebA_qOk3_n4v";
        const headers = { "apikey": KEY, "Content-Type": "application/json", "Authorization": "Bearer " + KEY };
        const userEmail = localStorage.getItem('userEmail');
        
        let prodottiBase = [];
        let categoriaCorrente = 'Cibo';

        window.onload = () => { if(!userEmail) window.location.href = 'login.html'; caricaProdotti(); };

        async function caricaProdotti() {
            try {
                const res = await fetch(`${URL}/spesa_prodotti?select=*,spesa_prodottinascosti!left(prodotto_id)&or=(email.is.null,email.eq.${userEmail})&spesa_prodottinascosti.prodotto_id=is.null&order=nome.asc`, { headers });
                prodottiBase = await res.json();
                renderizzaProdotti();
            } catch (e) { console.error(e); }
        }

        window.setFilter = (cat, btn) => {
            categoriaCorrente = cat;
            document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderizzaProdotti();
        }

        window.renderizzaProdotti = () => {
            const query = document.getElementById("cercaProdotto").value.toLowerCase();
            const div = document.getElementById("listaProdotti");
            div.innerHTML = "";
            const filtrati = prodottiBase.filter(p => p.categoria === categoriaCorrente && p.nome.toLowerCase().includes(query));
            
            filtrati.forEach(p => {
                const riga = document.createElement("div");
                riga.className = "item";
                riga.innerHTML = `
                    <span class="testo-prodotto">${p.nome}</span>
                    <div class="btn-actions">
                        <button class="btn-small plus" id="btn-p-${p.id}" onclick="mettiInLista(${p.id})">
                            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        </button>
                        <button class="btn-small delete" onclick="eliminaProdotto(${p.id}, '${p.email}')">
                            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                    </div>`;
                div.appendChild(riga);
            });
        }

        async function mettiInLista(idProdotto) {
    const btn = document.getElementById(`btn-p-${idProdotto}`);
    
    // Recuperiamo il nome del prodotto dal DOM per cercarlo nella lista spesa
    // Questo serve per il controllo "esistente" come fai nella valigia
    const nomeProdotto = btn.closest('.item').querySelector('.testo-prodotto').innerText;

    // 1. Controllo se il prodotto è già presente nella lista spesa (non completato)
    const res = await fetch(`${URL}/spesa_lista?prodotto_id=eq.${idProdotto}&email_utente=eq.${userEmail}&completato=eq.false`, { headers });
    const esistente = await res.json();

    if (esistente.length > 0) {
        // Se esiste, rosso e scritta "GIÀ IN LISTA"
        aggiornaBottone(btn, "GIÀ IN LISTA", "var(--red)", "white");
        return;
    }

    // 2. Se non esiste, lo aggiungiamo
    const add = await fetch(`${URL}/spesa_lista`, { 
        method: "POST", 
        headers, 
        body: JSON.stringify({ 
            prodotto_id: idProdotto, 
            email_utente: userEmail, 
            completato: false 
        }) 
    });

    if (add.ok) {
        // Se l'aggiunta va a buon fine, blu e scritta "AGGIUNTO"
        aggiornaBottone(btn, "AGGIUNTO", "var(--blue)", "white");
    }
}

// Assicurati che la funzione aggiornaBottone sia presente nel tuo script:
function aggiornaBottone(btn, testo, sfondo, coloreTesto) {
    const originalHTML = btn.innerHTML;
    btn.innerHTML = `<span class="btn-feedback">${testo}</span>`;
    btn.style.backgroundColor = sfondo;
    btn.style.color = coloreTesto;
    btn.style.borderColor = sfondo;
    btn.classList.add('btn-feedback');
    
    setTimeout(() => {
        btn.innerHTML = originalHTML;
        btn.style.backgroundColor = "";
        btn.style.color = "";
        btn.style.borderColor = "";
        btn.classList.remove('btn-feedback');
    }, 1200);
}

        window.apriModalCategoria = () => {
            if(!document.getElementById("nuovoProdotto").value.trim()) return;
            document.getElementById("catModal").style.display = "flex";
        }

        window.confermaInserimento = async () => {
            const nome = document.getElementById("nuovoProdotto").value.trim();
            const categoria = document.getElementById("selectCatNuovo").value;
            const btnMain = document.getElementById("btn-add-main");
            
            const res = await fetch(`${URL}/spesa_prodotti`, { 
                method: "POST", headers, 
                body: JSON.stringify({ nome, categoria, email: userEmail }) 
            });
            if(res.ok) {
                document.getElementById("nuovoProdotto").value = "";
                chiudiModal();
                aggiornaBottone(btnMain, "CREATO", "var(--green)", "white");
                caricaProdotti();
            }
        }

        window.eliminaProdotto = async (id, emailP) => {
            if (!confirm("Nascondere o eliminare questo prodotto?")) return;
            if (!emailP || emailP === "null") {
                await fetch(`${URL}/spesa_prodottinascosti`, { method: "POST", headers, body: JSON.stringify({ prodotto_id: id, email_utente: userEmail }) });
            } else {
                await fetch(`${URL}/spesa_prodotti?id=eq.${id}`, { method: "DELETE", headers });
            }
            caricaProdotti();
        }

        window.chiudiModal = () => { document.getElementById('catModal').style.display = 'none'; };
        window.logout = () => { localStorage.clear(); window.location.href = 'login.html'; };
    </script>
</body>
</html>
