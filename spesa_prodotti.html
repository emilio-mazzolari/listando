<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Listando - Catalogo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --green: #0fba8d; --blue: #3384d4; --yellow: #feb310; --red: #ff4d4d; --grey: #d8dddc; --dark: #000000; --bg: #fdfdfd; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; }
        .app { width: 100%; max-width: 420px; padding: 20px; padding-bottom: 110px; }
        h2 { font-weight: 900; text-transform: uppercase; }
        .filter-container { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
        .btn-filter { padding: 12px; border-radius: 15px; border: 3px solid var(--grey); background: white; font-weight: 800; cursor: pointer; }
        .btn-filter.active { background: var(--blue); color: white; border-color: var(--blue); }
        .input-box { background: white; padding: 15px; border-radius: 25px; border: 3px solid var(--grey); margin-bottom: 20px; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border-radius: 10px; border: 2px solid var(--grey); outline: none; }
        .card { background: white; border-radius: 28px; padding: 15px; border: 3px solid var(--grey); }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 2px solid #f2f2f7; }
        .btn-add-p { background: var(--blue); color: white; border: none; border-radius: 10px; width: 35px; height: 35px; cursor: pointer; font-weight: bold; }
        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 3px solid var(--grey); }
        .tab-item { text-decoration: none; color: var(--dark); font-size: 10px; font-weight: 800; }
        .tab-active { color: var(--green); }
    </style>
</head>
<body>
    <div class="app">
        <h2>Prodotti</h2>
        <div class="filter-container">
            <button class="btn-filter active" onclick="setFilter('Cibo', this)">Cibo</button>
            <button class="btn-filter" onclick="setFilter('Igiene', this)">Igiene</button>
            <button class="btn-filter" onclick="setFilter('Casa', this)">Casa</button>
            <button class="btn-filter" onclick="setFilter('Altro', this)">Altro</button>
        </div>
        <div class="input-box">
            <input type="text" id="nuovoNome" placeholder="Nuovo prodotto...">
            <button onclick="salvaNuovo()" style="padding:10px 20px; border-radius:10px; background:var(--green); color:white; border:none; font-weight:bold;">SALVA</button>
        </div>
        <div class="card" id="listaCard">Caricamento...</div>
    </div>

    <div class="tab-bar">
        <a href="index.html" class="tab-item">HOME</a>
        <a href="spesa.html" class="tab-item">SPESA</a>
        <a href="spesa_prodotti.html" class="tab-item tab-active">PRODOTTI</a>
    </div>

    <script>
        const URL = "https://eejdpophfxsrqdvsucye.supabase.co/rest/v1";
        const KEY = "sb_publishable_A7ZE5MzG6TtUrTKNo3SebA_qOk3_n4v";
        const headers = { "apikey": KEY, "Content-Type": "application/json", "Authorization": "Bearer " + KEY };
        const userEmail = localStorage.getItem('userEmail');
        let prodottiBase = [];
        let categoriaCorrente = 'Cibo';

        async function caricaProdotti() {
            try {
                // Notare email_utente nella query
                const res = await fetch(`${URL}/spesa_prodotti?select=*,spesa_prodottinascosti!left(prodotto_id)&or=(email_utente.is.null,email_utente.eq.${userEmail})&spesa_prodottinascosti.prodotto_id=is.null&order=nome.asc`, { headers });
                prodottiBase = await res.json();
                render();
            } catch (e) { console.error(e); }
        }

        function setFilter(cat, btn) {
            categoriaCorrente = cat;
            document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function render() {
            const div = document.getElementById("listaCard");
            div.innerHTML = "";
            const filtrati = prodottiBase.filter(p => p.categoria === categoriaCorrente);
            filtrati.forEach(p => {
                const riga = document.createElement("div");
                riga.className = "item";
                riga.innerHTML = `<span>${p.nome}</span><button class="btn-add-p" onclick="mettiInLista(${p.id})">+</button>`;
                div.appendChild(riga);
            });
        }

        async function mettiInLista(id) {
            await fetch(`${URL}/spesa_lista`, { 
                method: "POST", headers, 
                body: JSON.stringify({ prodotto_id: id, email_utente: userEmail, completato: false }) 
            });
            alert("Aggiunto!");
        }

        async function salvaNuovo() {
            const nome = document.getElementById("nuovoNome").value;
            if (!nome) return;
            await fetch(`${URL}/spesa_prodotti`, { 
                method: "POST", headers, 
                body: JSON.stringify({ nome, categoria: categoriaCorrente, email_utente: userEmail }) 
            });
            document.getElementById("nuovoNome").value = "";
            caricaProdotti();
        }

        window.onload = caricaProdotti;
    </script>
</body>
</html>
