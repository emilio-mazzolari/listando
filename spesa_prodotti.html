<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Listando - Catalogo Prodotti</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --green: #0fba8d; --blue: #3384d4; --yellow: #feb310; --red: #ff4d4d; --grey: #d8dddc; --dark: #000000; --bg: #fdfdfd; }
        body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); display: flex; justify-content: center; }
        .app { width: 100%; max-width: 420px; padding: 20px; padding-bottom: 110px; }
        h2 { font-weight: 900; font-size: 24px; text-transform: uppercase; }
        .category-box { background: rgba(216,221,220,0.3); padding: 15px; border-radius: 28px; margin-bottom: 20px; }
        .filter-container { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn-filter { padding: 12px; border-radius: 15px; border: 3px solid var(--grey); background: white; font-weight: 800; cursor: pointer; }
        .btn-filter.active { background: var(--blue); color: white; border-color: var(--blue); }
        .input-group { background: white; padding: 15px; border-radius: 25px; border: 3px solid var(--grey); margin-bottom: 20px; }
        input { width: 75%; padding: 12px; border-radius: 15px; border: 2px solid var(--grey); outline: none; }
        .btn-add { background: var(--blue); color: white; border: none; border-radius: 15px; width: 45px; height: 45px; cursor: pointer; float: right; }
        .card { background: white; border-radius: 28px; padding: 10px 20px; border: 3px solid var(--grey); }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 2px solid #f2f2f7; }
        .btn-small { border: 2px solid var(--grey); border-radius: 10px; width: 35px; height: 35px; cursor: pointer; background: white; margin-left: 4px; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal-box { background: white; padding: 25px; border-radius: 30px; width: 80%; text-align: center; border: 4px solid var(--grey); }
        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 3px solid var(--grey); }
        .tab-item { flex: 1; text-align: center; font-size: 10px; text-decoration: none; font-weight: 800; color: var(--dark); display: flex; flex-direction: column; align-items: center; }
        .tab-active { color: var(--green); }
    </style>
</head>
<body>
    <div class="app">
        <h2>Prodotti</h2>
        <div class="category-box">
            <div class="filter-container">
                <button class="btn-filter active" onclick="setFilter('Cibo', this)">Cibo</button>
                <button class="btn-filter" onclick="setFilter('Igiene', this)">Igiene</button>
                <button class="btn-filter" onclick="setFilter('Casa', this)">Casa</button>
                <button class="btn-filter" onclick="setFilter('Altro', this)">Altro</button>
            </div>
        </div>
        <div class="input-group">
            <input type="text" id="nuovoProdotto" placeholder="Aggiungi nuovo...">
            <button class="btn-add" onclick="apriModalCategoria()">+</button>
            <input type="text" id="cercaProdotto" placeholder="Cerca..." onkeyup="renderizza()" style="width: 100%; margin-top: 10px;">
        </div>
        <div class="card" id="listaProdotti">Caricamento...</div>
    </div>

    <div id="catModal" class="modal-overlay">
        <div class="modal-box">
            <h3>Categoria?</h3>
            <select id="selectCat" style="width:100%; padding:10px; margin-bottom:15px; border-radius:10px;">
                <option value="Cibo">Cibo</option><option value="Igiene">Igiene</option><option value="Casa">Casa</option><option value="Altro">Altro</option>
            </select>
            <button class="btn-filter active" style="width:100%; margin-bottom:10px" onclick="confermaInserimento()">SALVA</button>
            <button class="btn-filter" style="width:100%" onclick="chiudiModal()">ANNULLA</button>
        </div>
    </div>

    <div class="tab-bar">
        <a href="index.html" class="tab-item">HOME</a>
        <a href="spesa.html" class="tab-item">SPESA</a>
        <a href="spesa_prodotti.html" class="tab-item tab-active">PRODOTTI</a>
    </div>

    <script>
        const URL = "https://eejdpophfxsrqdvsucye.supabase.co/rest/v1";
        const KEY = "sb_publishable_A7ZE5MzG6TtUrTKNo3SebA_qOk3_n4v";
        const headers = { "apikey": KEY, "Content-Type": "application/json", "Authorization": "Bearer " + KEY };
        const userEmail = localStorage.getItem('userEmail');
        let prodottiBase = [];
        let categoriaCorrente = 'Cibo';

        async function caricaProdotti() {
            try {
                const res = await fetch(`${URL}/spesa_prodotti?select=*,spesa_prodottinascosti!left(prodotto_id)&or=(email_utente.is.null,email_utente.eq.${userEmail})&spesa_prodottinascosti.prodotto_id=is.null&order=nome.asc`, { headers });
                prodottiBase = await res.json();
                renderizza();
            } catch (e) { console.error(e); }
        }

        function setFilter(cat, btn) {
            categoriaCorrente = cat;
            document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderizza();
        }

        function renderizza() {
            const query = document.getElementById("cercaProdotto").value.toLowerCase();
            const div = document.getElementById("listaProdotti");
            div.innerHTML = "";
            const filtrati = prodottiBase.filter(p => p.categoria === categoriaCorrente && p.nome.toLowerCase().includes(query));
            filtrati.forEach(p => {
                const riga = document.createElement("div");
                riga.className = "item";
                riga.innerHTML = `
                    <span>${p.nome}</span>
                    <div>
                        <button class="btn-small" style="color:var(--blue)" onclick="mettiInLista(${p.id})">+</button>
                        <button class="btn-small" style="color:var(--red)" onclick="eliminaProdotto(${p.id}, '${p.email_utente}')">🗑</button>
                    </div>`;
                div.appendChild(riga);
            });
        }

        async function mettiInLista(id) {
            const check = await fetch(`${URL}/spesa_lista?prodotto_id=eq.${id}&email_utente=eq.${userEmail}&completato=eq.false`, { headers });
            const esistente = await check.json();
            if (esistente.length > 0) { alert("Già in lista!"); return; }
            await fetch(`${URL}/spesa_lista`, { method: "POST", headers, body: JSON.stringify({ prodotto_id: id, email_utente: userEmail, completato: false }) });
            alert("Aggiunto!");
        }

        async function eliminaProdotto(id, emailP) {
            if (!confirm("Eliminare?")) return;
            if (!emailP || emailP === "null") {
                await fetch(`${URL}/spesa_prodottinascosti`, { method: "POST", headers, body: JSON.stringify({ prodotto_id: id, email_utente: userEmail }) });
            } else {
                await fetch(`${URL}/spesa_prodotti?id=eq.${id}`, { method: "DELETE", headers });
            }
            caricaProdotti();
        }

        function apriModalCategoria() { if(document.getElementById("nuovoProdotto").value.trim()) document.getElementById("catModal").style.display = "flex"; }
        function chiudiModal() { document.getElementById('catModal').style.display = 'none'; }
        async function confermaInserimento() {
            const nome = document.getElementById("nuovoProdotto").value.trim();
            const categoria = document.getElementById("selectCat").value;
            await fetch(`${URL}/spesa_prodotti`, { method: "POST", headers, body: JSON.stringify({ nome, categoria, email_utente: userEmail }) });
            document.getElementById("nuovoProdotto").value = ""; chiudiModal(); caricaProdotti();
        }
        window.onload = caricaProdotti;
    </script>
</body>
</html>
