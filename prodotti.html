<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Prodotti</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; font-family: -apple-system, sans-serif; background: #f2f2f7; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 420px; padding: 20px; padding-bottom: 90px; }
        .card { background: white; border-radius: 16px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 10px; box-sizing: border-box; font-size: 16px; }
        .btn-main { width: 100%; padding: 12px; border-radius: 12px; border: none; background: #aec6cf; color: white; font-weight: 600; cursor: pointer; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee; gap: 4px; }
        .item span { flex-grow: 1; font-size: 15px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .btn-small { flex-shrink: 0; border: none; border-radius: 8px; width: 32px; height: 32px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
        .plus { background-color: #779ecb; color: white; }
        .edit { background-color: #fdfd96; color: #3a3a3c; } 
        .delete { background-color: #add8e6; color: #1c1c1e; }
        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 65px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-top: 1px solid #ddd; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .tab-item { flex: 1; text-align: center; font-size: 12px; color: #8e8e93; text-decoration: none; }
    </style>
</head>
<body>
<div class="app">
    <div class="header-box"><h1>📦 Prodotti</h1></div>
    <div class="card">
        <input id="nomeProdotto" placeholder="Nome nuovo prodotto...">
        <button class="btn-main" onclick="aggiungi()">Salva Nuovo</button>
    </div>
    <div class="card"><div id="listaProdotti">Caricamento...</div></div>
</div>
<div class="tab-bar">
    <a href="index.html" class="tab-item">🛒 Lista</a>
    <a href="prodotti.html" class="tab-item" style="color:#5ac8fa; font-weight:bold;">📦 Prodotti</a>
</div>
<script>
    const URL = "https://eejdpophfxsrqdvsucye.supabase.co/rest/v1";
    const KEY = "sb_publishable_A7ZE5MzG6TtUrTKNo3SebA_qOk3_n4v";
    const headers = { "apikey": KEY, "Content-Type": "application/json" };
    const userEmail = localStorage.getItem('userEmail');

    // Protezione: se non c'è email torna a login
    if (!userEmail) { window.location.href = 'index.html'; }

    async function carica() {
        try {
            // Carica prodotti pubblici o creati dall'utente
            const res = await fetch(`${URL}/prodotti?select=*&or=(email.is.null,email.eq.${userEmail})`, { headers });
            const data = await res.json();
            
            // ORDINE ALFABETICO
            data.sort((a, b) => a.nome.localeCompare(b.nome));
            
            const div = document.getElementById("listaProdotti"); div.innerHTML = "";
            data.forEach(p => {
                const el = document.createElement("div"); el.className = "item";
                el.innerHTML = `<span>${p.nome}</span>
                <div>
                    <button class="btn-small plus" title="Aggiungi alla spesa" onclick="aggiungiLista(${p.id})">+</button>
                    <button class="btn-small edit" title="Modifica nome" onclick="modifica(${p.id})">✏️</button>
                    <button class="btn-small delete" title="Elimina dal database" onclick="elimina(${p.id})">🗑</button>
                </div>`;
                div.appendChild(el);
            });
        } catch(e) { console.error("Errore caricamento prodotti:", e); }
    }

    async function aggiungi() {
        const nome = document.getElementById("nomeProdotto").value.trim(); 
        if (!nome) return;
        await fetch(URL + "/prodotti", { method: "POST", headers, body: JSON.stringify({ nome, email: userEmail }) });
        document.getElementById("nomeProdotto").value = ""; 
        carica();
    }

    async function modifica(id) { 
        const nuovo = prompt("Modifica il nome del prodotto:"); 
        if (!nuovo) return; 
        await fetch(URL + "/prodotti?id=eq." + id, { method: "PATCH", headers, body: JSON.stringify({ nome: nuovo }) }); 
        carica(); 
    }

    async function elimina(id) { 
        if(!confirm("Vuoi eliminare definitivamente questo prodotto dal database?")) return; 
        await fetch(URL + "/prodotti?id=eq." + id, { method: "DELETE", headers }); 
        carica(); 
    }

    async function aggiungiLista(id) {
        // CONTROLLO DUPLICATI: verifica se il prodotto_id esiste già per questa email_utente
        const check = await fetch(`${URL}/lista_spesa?prodotto_id=eq.${id}&email_utente=eq.${userEmail}`, { headers });
        const esistenti = await check.json();
        
        if (esistenti && esistenti.length > 0) { 
            alert("⚠️ Prodotto già in lista!"); 
            return; 
        }

        const res = await fetch(URL + "/lista_spesa", { 
            method: "POST", 
            headers, 
            body: JSON.stringify({ 
                prodotto_id: id, 
                completato: false, 
                email_utente: userEmail 
            }) 
        });
        if(res.ok) alert("✅ Aggiunto alla lista spesa!");
    }
    carica();
</script>
</body>
</html>
