<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Prodotti</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body { margin: 0; font-family: -apple-system, Helvetica, Arial, sans-serif; background: #f2f2f7; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 420px; padding: 20px; padding-bottom: 90px; }
        .card { background: white; border-radius: 16px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        
        .testo-prodotto { flex-grow: 1; font-size: 16px; color: #1c1c1e; font-weight: 400; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        
        .btn-small { border: none; border-radius: 8px; width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-left: 4px; font-size: 16px; transition: all 0.3s; }
        .plus { background-color: #779ecb; color: white; } 
        .edit { background-color: #fdfd96; color: #3a3a3c; } 
        .delete { background-color: #add8e6; color: #1c1c1e; }

        .input-group { display: flex; gap: 10px; margin-bottom: 12px; }
        input { 
            flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #ddd; 
            font-size: 16px; outline: none; height: 45px; box-sizing: border-box; background: white;
        }
        .btn-main { 
            width: 100px; height: 45px; border-radius: 12px; border: none; 
            background: #aec6cf; color: white; font-weight: bold; cursor: pointer; 
            font-size: 14px; display: flex; align-items: center; justify-content: center;
        }

        .tab-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; height: 70px; 
            background: #aec6cf; border-top: 1px solid #99b3bc; 
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .tab-item { flex: 1; text-align: center; font-size: 14px; color: black; text-decoration: none; text-transform: uppercase; font-weight: 600; }
        .tab-active { font-weight: 900; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal-box { background: white; padding: 25px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; }
        .btn-modal { width: 100%; padding: 15px; margin-top: 10px; border-radius: 12px; border: none; background: #aec6cf; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-cancel { background: #e5e5ea; color: #8e8e93; margin-top: 15px; }
        .modal-box input { width: 100%; margin-bottom: 15px; text-align: center; }
        .alert-icon { font-size: 40px; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

    <div class="app">
        <div class="header-box"><h1 style="margin:0;">📦 Elenco prodotti</h1></div>
        
        <div class="input-group">
            <input type="text" id="nuovoProdotto" placeholder="Inserisci nuovo prodotto...">
            <button class="btn-main" onclick="aggiungiProdotto()">INSERISCI</button>
        </div>

        <div class="input-group">
            <input type="text" id="cercaProdotto" placeholder="Cerca prodotto..." onkeyup="filtraProdotti()">
            <button class="btn-main" onclick="filtraProdotti()">TROVA</button>
        </div>

        <div class="card" id="listaProdotti">Caricamento...</div>
    </div>

    <div class="tab-bar">
        <a href="index.html" class="tab-item">🛒 LISTA</a>
        <a href="prodotti.html" class="tab-item tab-active">📦 PRODOTTI</a>
        <a href="#" class="tab-item" onclick="logout()">🚪 ESCI</a>
    </div>

    <!-- MODAL ELIMINA -->
    <div id="deleteModal" class="modal-overlay">
        <div class="modal-box">
            <h3>Cosa vuoi fare?</h3>
            <button class="btn-modal" id="btnTutti">ELIMINA PER TUTTI</button>
            <button class="btn-modal" id="btnSoloMe">NASCONDI SOLO A ME</button>
            <button class="btn-modal btn-cancel" onclick="chiudiModal()">ANNULLA</button>
        </div>
    </div>

    <!-- MODAL MODIFICA -->
    <div id="editModal" class="modal-overlay">
        <div class="modal-box">
            <h3>Modifica Nome</h3>
            <input type="text" id="inputModifica" placeholder="Nome prodotto">
            <button class="btn-modal" onclick="salvaModifica()">SALVA MODIFICA</button>
            <button class="btn-modal btn-cancel" onclick="chiudiModal()">ANNULLA</button>
        </div>
    </div>

    <!-- MODAL ALERT -->
    <div id="alertModal" class="modal-overlay">
        <div class="modal-box">
            <span class="alert-icon">⚠️</span>
            <h3 style="margin-top:0;">Attenzione</h3>
            <p id="alertMessage">Messaggio di avviso</p>
            <button class="btn-modal" onclick="chiudiModal()">HO CAPITO</button>
        </div>
    </div>

    <script>
        const URL = "https://eejdpophfxsrqdvsucye.supabase.co/rest/v1";
        const KEY = "sb_publishable_A7ZE5MzG6TtUrTKNo3SebA_qOk3_n4v";
        const headers = { 
            "apikey": KEY, 
            "Content-Type": "application/json",
            "Authorization": "Bearer " + KEY
        };
        const userEmail = localStorage.getItem('userEmail');
        const adminEmail = "emilio.mazzolari.shop@gmail.com"; // Email autorizzata

        let idDaRimuovere = null;
        let idInModifica = null;
        let tuttiIProdotti = [];

        if (!userEmail) { window.location.href = 'login.html'; }

        async function caricaProdotti() {
            try {
                const resNascosti = await fetch(`${URL}/prodotti_nascosti?email_utente=eq.${userEmail}`, { headers });
                const nascosti = await resNascosti.json();
                const idsNascosti = nascosti.map(n => n.prodotto_id);

                const res = await fetch(`${URL}/prodotti?select=*&order=nome.asc`, { headers });
                const data = await res.json();
                
                if (!Array.isArray(data)) return;

                tuttiIProdotti = data.filter(p => !idsNascosti.includes(p.id));
                renderizzaProdotti(tuttiIProdotti);
            } catch (e) { console.error(e); }
        }

        function renderizzaProdotti(prodotti) {
            const div = document.getElementById("listaProdotti");
            div.innerHTML = "";
            prodotti.forEach(p => {
                const riga = document.createElement("div");
                riga.className = "item";
                riga.innerHTML = `
                    <span class="testo-prodotto">${p.nome}</span>
                    <div style="display:flex;">
                        <button class="btn-small plus" id="btn-add-${p.id}" onclick="mettiInLista(${p.id})">+</button>
                        <button class="btn-small edit" onclick="apriModalModifica(${p.id}, '${p.nome.replace(/'/g, "\\'")}')">✏️</button>
                        <button class="btn-small delete" onclick="apriModalRimuovi(${p.id})">🗑</button>
                    </div>
                `;
                div.appendChild(riga);
            });
        }

        function filtraProdotti() {
            const query = document.getElementById("cercaProdotto").value.toLowerCase();
            const filtrati = tuttiIProdotti.filter(p => p.nome.toLowerCase().includes(query));
            renderizzaProdotti(filtrati);
        }

        async function aggiungiProdotto() {
            const input = document.getElementById("nuovoProdotto");
            const nome = input.value.trim();
            if (!nome) return;

            const esisteGia = tuttiIProdotti.some(p => p.nome.toLowerCase() === nome.toLowerCase());
            if (esisteGia) {
                mostraAlert("Prodotto già presente in elenco!");
                input.value = "";
                return;
            }

            await fetch(`${URL}/prodotti`, {
                method: "POST", headers,
                body: JSON.stringify({ nome: nome, email: userEmail })
            });
            input.value = "";
            caricaProdotti();
        }

        async function mettiInLista(idDelProdotto) {
            const btn = document.getElementById(`btn-add-${idDelProdotto}`);
            const originalText = "+";
            
            const applicaFeedback = (testo, coloreSfondo, coloreTesto) => {
                btn.innerText = testo;
                btn.style.backgroundColor = coloreSfondo;
                btn.style.color = coloreTesto;
                btn.style.width = "auto";
                btn.style.padding = "0 10px";

                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.backgroundColor = "";
                    btn.style.color = "";
                    btn.style.width = "32px";
                    btn.style.padding = "0";
                }, 2000);
            };

            try {
                const checkRes = await fetch(`${URL}/lista_spesa?prodotto_id=eq.${idDelProdotto}&email_utente=eq.${userEmail}&completato=eq.false`, { headers });
                const esistente = await checkRes.json();

                if (esistente.length > 0) {
                    applicaFeedback("GIÀ IN LISTA", "#db5151", "white");
                    return;
                }

                const res = await fetch(`${URL}/lista_spesa`, {
                    method: "POST", headers,
                    body: JSON.stringify({ prodotto_id: idDelProdotto, email_utente: userEmail, completato: false })
                });

                if(res.ok) { applicaFeedback("AGGIUNTO!", "#779ecb", "white"); }
            } catch (e) { console.error(e); }
        }

        function apriModalModifica(id, nomeVecchio) {
            idInModifica = id;
            document.getElementById("inputModifica").value = nomeVecchio;
            document.getElementById("editModal").style.display = "flex";
        }

        async function salvaModifica() {
            const nuovoNome = document.getElementById("inputModifica").value.trim();
            if (nuovoNome && idInModifica) {
                await fetch(`${URL}/prodotti?id=eq.${idInModifica}`, {
                    method: "PATCH", headers,
                    body: JSON.stringify({ nome: nuovoNome })
                });
                chiudiModal();
                caricaProdotti();
            }
        }

        function apriModalRimuovi(id) {
            idDaRimuovere = id;
            const btnTutti = document.getElementById('btnTutti');
            
            // SE NON SEI L'ADMIN, NASCONDI IL TASTO "ELIMINA PER TUTTI"
            if (userEmail !== adminEmail) {
                btnTutti.style.display = "none";
            } else {
                btnTutti.style.display = "block";
            }

            document.getElementById('deleteModal').style.display = 'flex';
        }

        function mostraAlert(msg) {
            document.getElementById("alertMessage").innerText = msg;
            document.getElementById("alertModal").style.display = "flex";
        }

        function chiudiModal() {
            document.getElementById('deleteModal').style.display = 'none';
            document.getElementById('editModal').style.display = 'none';
            document.getElementById('alertModal').style.display = 'none';
        }

        document.getElementById('btnTutti').onclick = async () => {
            // ULTERIORE BLOCCO DI SICUREZZA NEL CODICE
            if (userEmail !== adminEmail) {
                chiudiModal();
                mostraAlert("Non hai i permessi per eliminare globalmente.");
                return;
            }

            await fetch(`${URL}/prodotti?id=eq.${idDaRimuovere}`, { method: "DELETE", headers });
            chiudiModal();
            caricaProdotti();
        };

        document.getElementById('btnSoloMe').onclick = async () => {
            await fetch(`${URL}/prodotti_nascosti`, {
                method: "POST", headers,
                body: JSON.stringify({ prodotto_id: idDaRimuovere, email_utente: userEmail })
            });
            chiudiModal();
            caricaProdotti();
        };

        function logout() { localStorage.removeItem('userEmail'); window.location.href = 'login.html'; }

        caricaProdotti();
    </script>
</body>
</html>
