<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Prodotti</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin: 0; font-family: -apple-system, sans-serif; background: #f2f2f7; display: flex; justify-content: center; }
    .app { width: 100%; max-width: 420px; padding: 20px; padding-bottom: 90px; }
    .card { background: white; border-radius: 16px; padding: 15px; margin-bottom: 15px; }
    .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 10px; box-sizing: border-box; }
    .btn-main { width: 100%; padding: 12px; border-radius: 12px; border: none; background: #aec6cf; color: white; font-weight: 600; cursor: pointer; }
    .item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee; }
    .btn-small { border: none; border-radius: 8px; width: 32px; height: 32px; cursor: pointer; margin-left: 4px; display: inline-flex; align-items: center; justify-content: center; }
    .plus { background-color: #779ecb; color: white; }
    .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 65px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-top: 1px solid #ddd; display: flex; justify-content: space-around; align-items: center; }
    .tab-item { flex: 1; text-align: center; font-size: 12px; color: #8e8e93; text-decoration: none; }
  </style>
</head>
<body>
<div class="app">
  <div class="header-box"><h1>📦 Prodotti</h1></div>
  <div class="card">
    <input id="nomeProdotto" placeholder="Nuovo prodotto personalizzato...">
    <button class="btn-main" onclick="aggiungi()">Salva</button>
  </div>
  <div class="card"><div id="listaProdotti">Caricamento...</div></div>
</div>
<div class="tab-bar">
  <a href="index.html" class="tab-item">🛒 Lista</a>
  <a href="prodotti.html" class="tab-item" style="color:#5ac8fa; font-weight:bold;">📦 Prodotti</a>
</div>
<script>
const URL = "https://eejdpophfxsrqdvsucye.supabase.co/rest/v1";
const KEY = "sb_publishable_A7ZE5MzG6TtUrTKNo3SebA_qOk3_n4v";
const headers = { "apikey": KEY, "Content-Type": "application/json" };
const userEmail = localStorage.getItem('userEmail');

async function carica() {
  try {
    // CARICA TUTTO: Quelli con email NULL (base) e quelli con la TUA email
    const res = await fetch(`${URL}/prodotti?select=*&or=(email.is.null,email.eq.${userEmail})`, { headers });
    let data = await res.json();
    data.sort((a, b) => a.nome.localeCompare(b.nome));
    const div = document.getElementById("listaProdotti"); div.innerHTML = "";
    data.forEach(p => {
      const el = document.createElement("div"); el.className = "item";
      el.innerHTML = `<span>${p.nome}</span><button class="btn-small plus" onclick="aggiungiLista(${p.id})">+</button>`;
      div.appendChild(el);
    });
  } catch(e) { console.error(e); }
}

async function aggiungi() {
  const nome = document.getElementById("nomeProdotto").value.trim(); if (!nome) return;
  // Quando aggiungi un prodotto tu, viene salvato con la TUA email
  await fetch(URL + "/prodotti", { method: "POST", headers, body: JSON.stringify({ nome, email: userEmail }) });
  document.getElementById("nomeProdotto").value = ""; carica();
}

async function aggiungiLista(id) {
  await fetch(URL + "/lista_spesa", { method: "POST", headers, body: JSON.stringify({ prodotto_id: id, completato: false, email_utente: userEmail }) });
  alert("Aggiunto!");
}
carica();
</script>
</body>
</html>
