<!DOCTYPE html>
<html>
<head>
  <title>Prodotti</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f2f2f7;
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 15px;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #ddd;
      margin-bottom: 10px;
      box-sizing: border-box;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      background: #5ac8fa;
      color: white;
    }

    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
    }

    .btn-small {
      border: none;
      border-radius: 10px;
      padding: 6px 10px;
      cursor: pointer;
      margin-left: 5px;
    }

    .plus { background: #5ac8fa; color: white; }
    .edit { background: #ffeaa7; }
    .delete { background: #a7e3ff; }

  </style>
</head>

<body>

<div class="app">

  <h1>📦 Prodotti</h1>

  <!-- AGGIUNTA PRODOTTO -->
  <div class="card">
    <input id="nomeProdotto" placeholder="Nuovo prodotto">
    <button class="btn" onclick="aggiungi()">Aggiungi</button>
  </div>

  <!-- LISTA -->
  <div class="card">
    <div id="listaProdotti"></div>
  </div>

<div class="card">
  <button class="btn" onclick="vaiLista()">
    Vai alla lista
  </button>
</div>

</div>

<script>
const SUPABASE_URL = "https://eejdpophfxsrqdvsucye.supabase.co";
const SUPABASE_KEY = "sb_publishable_A7ZE5MzG6TtUrTKNo3SebA_qOk3_n4v";

/* ORDINE ALFABETICO */
function ordina(data) {
  return data.sort((a, b) =>
    (a.nome || "").localeCompare(b.nome || "")
  );
}

/* CARICA */
async function carica() {
  const res = await fetch(SUPABASE_URL + "/rest/v1/prodotti?select=*", {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY
    }
  });

  let data = await res.json();
  data = ordina(data);

  const div = document.getElementById("listaProdotti");
  div.innerHTML = "";

  data.forEach(p => {
    const el = document.createElement("div");
    el.className = "item";

    el.innerHTML = `
      <span>${p.nome}</span>

      <div>
        <button class="btn-small plus" onclick="aggiungiLista(${p.id})">+</button>
        <button class="btn-small edit" onclick="modifica(${p.id})">✏️</button>
        <button class="btn-small delete" onclick="elimina(${p.id})">🗑</button>
      </div>
    `;

    div.appendChild(el);
  });
}

/* AGGIUNGI PRODOTTO */
async function aggiungi() {
  const nome = document.getElementById("nomeProdotto").value.trim();
  if (!nome) return;

  await fetch(SUPABASE_URL + "/rest/v1/prodotti", {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ nome })
  });

  document.getElementById("nomeProdotto").value = "";
  carica();
}

/* ELIMINA */
async function elimina(id) {
  await fetch(SUPABASE_URL + "/rest/v1/prodotti?id=eq." + id, {
    method: "DELETE",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY
    }
  });

  carica();
}

/* MODIFICA */
function modifica(id) {
  const nuovo = prompt("Nuovo nome prodotto:");
  if (!nuovo) return;

  fetch(SUPABASE_URL + "/rest/v1/prodotti?id=eq." + id, {
    method: "PATCH",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ nome: nuovo })
  }).then(carica);
}

/* AGGIUNGI ALLA LISTA */
async function aggiungiLista(id) {
  await fetch(SUPABASE_URL + "/rest/v1/lista_spesa", {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      prodotto_id: id,
      completato: false
    })
  });
}

/* NAVIGAZIONE LISTA */
function vaiLista() {
  window.location.href = "/index.html";
}

/* INIT */
carica();
</script>

</body>
</html>
