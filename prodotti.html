<!DOCTYPE html>
<html>
<head>
  <title>Prodotti</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f2f2f7; display: flex; justify-content: center; }
    .app { width: 100%; max-width: 420px; padding: 20px; padding-bottom: 90px; }
    h1 { text-align: center; }
    .card { background: white; border-radius: 16px; padding: 15px; margin-bottom: 15px; }
    input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 10px; box-sizing: border-box; font-size: 16px; }
    
    .btn-main { width: 100%; padding: 12px; border-radius: 12px; border: none; cursor: pointer; background: #aec6cf; color: white; font-weight: 600; }
    .item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
    .btn-small { border: none; border-radius: 10px; padding: 6px 12px; cursor: pointer; margin-left: 5px; font-size: 16px; }

    /* COLORI PASTELLO PRODOTTI */
    .plus { background-color: #779ecb; color: white; } /* Blu Pastello */
    .edit { background-color: #fdfd96; color: #3a3a3c; } 
    .delete { background-color: #add8e6; color: #1c1c1e; } /* Azzurro Pastello (Cestino) */

    #toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      padding: 12px 25px; border-radius: 25px; color: white; font-weight: bold;
      display: none; z-index: 1000;
    }

    .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 65px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-top: 1px solid #ddd; display: flex; justify-content: space-around; align-items: center; }
    .tab-item { flex: 1; text-align: center; font-size: 12px; color: #8e8e93; text-decoration: none; }
    .tab-item.active { color: #5ac8fa; font-weight: 600; }
  </style>
</head>
<body>

<div id="toast"></div>

<div class="app">
  <h1>📦 Prodotti</h1>
  <div class="card">
    <input id="nomeProdotto" placeholder="Nuovo prodotto">
    <button class="btn-main" onclick="aggiungi()">Salva Prodotto</button>
  </div>
  <div class="card"><div id="listaProdotti">Caricamento...</div></div>
</div>

<div class="tab-bar">
  <a href="index.html" class="tab-item"><span class="tab-icon">🛒</span> Lista</a>
  <a href="prodotti.html" class="tab-item active"><span class="tab-icon">📦</span> Prodotti</a>
</div>

<script>
const URL = "https://eejdpophfxsrqdvsucye.supabase.co/rest/v1";
const KEY = "sb_publishable_A7ZE5MzG6TtUrTKNo3SebA_qOk3_n4v";

function showToast(txt, colorCode) {
  const t = document.getElementById("toast");
  t.innerText = txt;
  t.style.background = colorCode;
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 1500);
}

async function carica() {
  const res = await fetch(URL + "/prodotti?select=*", { headers: { "apikey": KEY } });
  let data = await res.json();
  data.sort((a, b) => a.nome.localeCompare(b.nome));
  const div = document.getElementById("listaProdotti");
  div.innerHTML = "";
  data.forEach(p => {
    const el = document.createElement("div");
    el.className = "item";
    el.innerHTML = `<span>${p.nome}</span>
      <div>
        <button class="btn-small plus" onclick="aggiungiLista(${p.id})">+</button>
        <button class="btn-small edit" onclick="modifica(${p.id})">✏️</button>
        <button class="btn-small delete" onclick="elimina(${p.id})">🗑</button>
      </div>`;
    div.appendChild(el);
  });
}

async function aggiungi() {
  const nome = document.getElementById("nomeProdotto").value.trim();
  if (!nome) return;
  const res = await fetch(URL + "/prodotti", { method: "POST", headers: { "apikey": KEY, "Content-Type": "application/json" }, body: JSON.stringify({ nome }) });
  if (res.ok) { showToast("Salvato!", "#aec6cf"); document.getElementById("nomeProdotto").value = ""; carica(); }
}

async function elimina(id) {
  if(!confirm("Eliminare?")) return;
  await fetch(URL + "/prodotti?id=eq." + id, { method: "DELETE", headers: { "apikey": KEY } });
  carica();
}

function modifica(id) {
  const nuovo = prompt("Nuovo nome:");
  if (!nuovo) return;
  fetch(URL + "/prodotti?id=eq." + id, { method: "PATCH", headers: { "apikey": KEY, "Content-Type": "application/json" }, body: JSON.stringify({ nome: nuovo }) }).then(carica);
}

async function aggiungiLista(id) {
  const check = await fetch(URL + "/lista_spesa?prodotto_id=eq." + id, { headers: { "apikey": KEY } });
  const esistenti = await check.json();
  if (esistenti.length > 0) { showToast("Già in lista!", "#ff6961"); return; }
  const res = await fetch(URL + "/lista_spesa", { method: "POST", headers: { "apikey": KEY, "Content-Type": "application/json" }, body: JSON.stringify({ prodotto_id: id, completato: false }) });
  if (res.ok) showToast("Inserito!", "#77dd77");
}

carica();
</script>
</body>
</html>
