<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Prodotti</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body { margin: 0; font-family: -apple-system, sans-serif; background: #f2f2f7; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 420px; padding: 20px; padding-bottom: 120px; }
        .card { background: white; border-radius: 16px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 10px; box-sizing: border-box; font-size: 16px; }
        .btn-main { width: 100%; padding: 12px; border-radius: 12px; border: none; background: #aec6cf; color: white; font-weight: 600; cursor: pointer; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .btn-small { border: none; border-radius: 8px; width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-left: 4px; font-size: 14px; }
        .plus { background-color: #779ecb; color: white; }
        .edit { background-color: #fdfd96; color: #3a3a3c; } 
        .delete { background-color: #add8e6; color: #1c1c1e; }
        
        .hidden-section { margin-top: 30px; border-top: 2px dashed #ccc; padding-top: 15px; }
        .hidden-title { font-size: 14px; color: #8e8e93; text-transform: uppercase; margin-bottom: 10px; }
        .hidden-item { opacity: 0.6; }
        .btn-restore { background-color: #77dd77; color: white; border: none; border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 12px; font-weight: bold; }

        #toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 15px 30px; border-radius: 12px; color: white; font-weight: bold; display: none; z-index: 2000; text-align: center; min-width: 200px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 65px; background: white; border-top: 1px solid #ddd; display: flex; justify-content: space-around; align-items: center; }
        .tab-item { flex: 1; text-align: center; font-size: 12px; color: #8e8e93; text-decoration: none; }
        .tab-active { color: #5ac8fa; font-weight: bold; }
    </style>
</head>
<body>
    <div id="toast"></div>
    <div class="app">
        <div class="header-box"><h1>📦 Prodotti</h1></div>
        <div class="card">
            <input id="nomeProdotto" placeholder="Nome nuovo prodotto...">
            <button class="btn-main" onclick="aggiungi()">SALVA NELL'ELENCO</button>
        </div>
        
        <div class="card">
            <div id="listaProdotti">Caricamento...</div>
        </div>

        <div id="sezioneNascosti" class="hidden-section" style="display:none;">
            <div class="hidden-title">Prodotti rimossi</div>
            <div id="listaNascosti"></div>
        </div>
    </div>

    <div class="tab-bar">
        <a href="index.html" class="tab-item">🛒 Lista</a>
        <a href="prodotti.html" class="tab-item tab-active">📦 Prodotti</a>
        <a href="#" class="tab-item" onclick="logout()">🚪 Esci</a>
    </div>

    <script>
        const URL = "https://eejdpophfxsrqdvsucye.supabase.co/rest/v1";
        const KEY = "sb_publishable_A7ZE5MzG6TtUrTKNo3SebA_qOk3_n4v";
        const headers = { "apikey": KEY, "Content-Type": "application/json", "Prefer": "return=representation" };
        const userEmail = localStorage.getItem('userEmail');
        const adminEmail = "emilio.mazzolari.shop@gmail.com";

        if (!userEmail) { window.location.href = 'login.html'; }

        function showToast(text, color) {
            const t = document.getElementById("toast");
            t.innerText = text; t.style.backgroundColor = color; t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 1500);
        }

        async function carica() {
            try {
                // 1. Carico prodotti nascosti dall'utente attuale
                const resNascosti = await fetch(`${URL}/prodotti_nascosti?email_utente=eq.${userEmail}`, { headers });
                const nascosti = await resNascosti.json() || [];
                const idsNascosti = nascosti.map(n => n.prodotto_id);

                // 2. Carico prodotti: Default (null) OR Emilio OR Utente attuale
                const res = await fetch(`${URL}/prodotti?select=*&or=(email.is.null,email.eq.${adminEmail},email.eq.${userEmail})`, { headers });
                let allData = await res.json();
                if (!Array.isArray(allData)) return;

                const visibili = allData.filter(p => !idsNascosti.includes(p.id));
                const daRipristinare = allData.filter(p => idsNascosti.includes(p.id));

                visibili.sort((a, b) => a.nome.localeCompare(b.nome));
                daRipristinare.sort((a, b) => a.nome.localeCompare(b.nome));

                // Render Visibili
                const div = document.getElementById("listaProdotti");
                div.innerHTML = visibili.length ? "" : "Nessun prodotto trovato.";
                visibili.forEach(p => {
                    const riga = document.createElement("div"); 
                    riga.className = "item";
                    // Passiamo l'email del proprietario alla funzione di rimozione
                    riga.innerHTML = `<span>${p.nome}</span>
                        <div style="display:flex;">
                            <button class="btn-small plus" onclick="mettiInLista(${p.id})">+</button>
                            <button class="btn-small edit" onclick="modifica(${p.id}, '${p.nome.replace(/'/g, "\\'")}')">✏️</button>
                            <button class="btn-small delete" onclick="gestisciRimozione(${p.id}, '${p.email}')">🗑</button>
                        </div>`;
                    div.appendChild(riga);
                });

                // Render Nascosti
                const divNascosti = document.getElementById("listaNascosti");
                const sezioneNascosti = document.getElementById("sezioneNascosti");
                if (daRipristinare.length > 0) {
                    sezioneNascosti.style.display = "block";
                    divNascosti.innerHTML = "";
                    daRipristinare.forEach(p => {
                        const riga = document.createElement("div");
                        riga.className = "item hidden-item";
                        riga.innerHTML = `<span>${p.nome}</span>
                            <button class="btn-restore" onclick="ripristina(${p.id})">RIPRISTINA</button>`;
                        divNascosti.appendChild(riga);
                    });
                } else {
                    sezioneNascosti.style.display = "none";
                }
            } catch(e) { console.error(e); }
        }

        async function aggiungi() {
            const n = document.getElementById("nomeProdotto");
            const nomeInserito = n.value.trim();
            if (!nomeInserito) return;

            // Cerco se esiste già tra i prodotti pubblici o dell'utente
            const check = await fetch(`${URL}/prodotti?nome=ilike.${nomeInserito}&or=(email.is.null,email.eq.${adminEmail},email.eq.${userEmail})`, { headers });
            const esistenti = await check.json();

            if (esistenti && esistenti.length > 0) {
                const prodId = esistenti[0].id;
                const checkNascosto = await fetch(`${URL}/prodotti_nascosti?prodotto_id=eq.${prodId}&email_utente=eq.${userEmail}`, { headers });
                const nascosto = await checkNascosto.json();

                if (nascosto && nascosto.length > 0) {
                    await ripristina(prodId, true);
                    showToast("Prodotto ripristinato!", "#77dd77");
                    n.value = "";
                    return;
                } else {
                    showToast("Già presente in elenco", "#ffb347");
                    return;
                }
            }

            await fetch(`${URL}/prodotti`, { 
                method: "POST", headers, 
                body: JSON.stringify({ nome: nomeInserito, email: userEmail }) 
            });
            n.value = ""; 
            carica();
        }

        async function gestisciRimozione(id, emailProprietario) {
            // Un prodotto è "Pubblico" se email è null o è di Emilio
            const isPublic = (emailProprietario === 'null' || emailProprietario === adminEmail);
            
            // Logica "Nascondi solo a me":
            // Se il prodotto è pubblico (e io non sono Emilio) lo nascondo.
            // Se sono Emilio, decido se nascondere o eliminare per tutti.
            if (isPublic && userEmail !== adminEmail) {
                await fetch(`${URL}/prodotti_nascosti`, {
                    method: "POST", headers,
                    body: JSON.stringify({ prodotto_id: id, email_utente: userEmail })
                });
                showToast("Nascosto dalla tua vista", "#aec6cf");
            } else {
                // Se è un prodotto creato dall'utente o se Emilio sta gestendo i suoi
                const scelta = confirm("Vuoi ELIMINARE PER TUTTI (OK) o solo NASCONDERE A TE (Annulla)?");
                if (scelta) {
                    await fetch(`${URL}/prodotti?id=eq.${id}`, { method: "DELETE", headers });
                    showToast("Eliminato definitivamente", "#ff6961");
                } else {
                    await fetch(`${URL}/prodotti_nascosti`, {
                        method: "POST", headers,
                        body: JSON.stringify({ prodotto_id: id, email_utente: userEmail })
                    });
                    showToast("Nascosto dalla tua vista", "#aec6cf");
                }
            }
            carica();
        }

        async function ripristina(id, silent = false) {
            await fetch(`${URL}/prodotti_nascosti?prodotto_id=eq.${id}&email_utente=eq.${userEmail}`, {
                method: "DELETE", headers
            });
            if (!silent) showToast("Ripristinato!", "#77dd77");
            carica();
        }

        async function mettiInLista(id) {
            const check = await fetch(`${URL}/lista_spesa?prodotto_id=eq.${id}&email_utente=eq.${userEmail}`, { headers });
            const esistenti = await check.json();
            if (esistenti && esistenti.length > 0) { showToast("Già in lista", "#ffb347"); return; }
            await fetch(`${URL}/lista_spesa`, { 
                method: "POST", headers, 
                body: JSON.stringify({ prodotto_id: id, email_utente: userEmail, completato: false }) 
            });
            showToast("Aggiunto!", "#77dd77");
        }

        async function modifica(id, vecchioNome) {
            const nuovoNome = prompt("Modifica nome:", vecchioNome);
            if (!nuovoNome || nuovoNome === vecchioNome) return;
            
            const res = await fetch(`${URL}/prodotti?id=eq.${id}&select=email`, { headers });
            const p = await res.json();
            const emailProp = p[0].email;

            // Se provo a modificare un prodotto pubblico non mio, ne creo una copia privata e nascondo l'originale
            if ((emailProp === null || emailProp === adminEmail) && userEmail !== adminEmail) {
                await fetch(`${URL}/prodotti`, { method: "POST", headers, body: JSON.stringify({ nome: nuovoNome, email: userEmail }) });
                await fetch(`${URL}/prodotti_nascosti`, { method: "POST", headers, body: JSON.stringify({ prodotto_id: id, email_utente: userEmail }) });
            } else {
                await fetch(`${URL}/prodotti?id=eq.${id}`, { method: "PATCH", headers, body: JSON.stringify({ nome: nuovoNome }) });
            }
            carica();
        }

        function logout() {
            localStorage.removeItem('userEmail');
            window.location.href = 'login.html';
        }

        carica();
    </script>
</body>
</html>
