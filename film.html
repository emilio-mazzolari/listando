<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Listando - Film</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            color-scheme: light;
            --accent: #8b5cf6;
            --accent-bg: rgba(139,92,246,0.08);
            --green: #0fba8d; --red: #ff3b30;
            --grey: #d8dddc; --grey-light: #f2f2f7;
            --dark: #111; --bg: #f5f6f8; --white: #fff;
        }
        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; max-width: 100%; margin: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--dark); }

        .page-header {
            position: sticky; top: 0; z-index: 100;
            background: var(--white); border-bottom: 2px solid var(--grey-light);
            padding: 14px 16px; padding-top: max(14px, env(safe-area-inset-top, 14px));
        }
        .header-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .btn-back { width: 40px; height: 40px; border-radius: 12px; border: 2.5px solid var(--grey); background: var(--white); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
        .btn-back svg { width: 18px; height: 18px; stroke: var(--dark); fill: none; stroke-width: 2.5; }
        .header-title { font-weight: 900; font-size: 18px; flex: 1; }
        .btn-add-hdr { width: 40px; height: 40px; border-radius: 12px; border: none; background: var(--accent); color: white; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .search-bar { padding: 0 0 10px; }
        .search-input { width: 100%; padding: 11px 14px; border-radius: 14px; border: 2.5px solid var(--grey); font-size: 15px; font-family: inherit; outline: none; }
        .search-input:focus { border-color: var(--accent); }

        .tabs-row { display: flex; gap: 8px; }
        .tab-pill { flex: 1; padding: 10px 8px; border-radius: 14px; border: 2.5px solid var(--grey); background: var(--white); font-weight: 800; font-size: 13px; cursor: pointer; text-align: center; transition: all 0.15s; color: #999; }
        .tab-pill.active { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

        .stats-bar { display: flex; gap: 6px; padding: 10px 0 0; align-items: center; }
        .stat-chip { font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 10px; background: var(--grey-light); color: #666; }

        .list-body { padding: 10px 16px 110px; }
        .genre-scroll { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; padding: 10px 0 0; }
        .genre-scroll::-webkit-scrollbar { display: none; }
        .genre-chip { flex-shrink: 0; padding: 6px 14px; border-radius: 20px; border: 2px solid var(--grey); background: white; font-weight: 800; font-size: 12px; cursor: pointer; color: #888; transition: all 0.15s; white-space: nowrap; }
        .genre-chip.active { border-color: var(--accent); background: var(--accent-bg); color: var(--accent); }

        .empty-msg { text-align: center; padding: 64px 24px; color: #bbb; font-weight: 700; font-size: 15px; }

        .film-card {
            background: var(--white); border-radius: 18px; margin-bottom: 8px;
            padding: 14px 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border-left: 5px solid var(--accent); display: flex; align-items: center; gap: 12px;
            cursor: pointer;
        }
        .film-card.visto { border-left-color: var(--green); opacity: 0.75; }

        .film-emoji { font-size: 28px; flex-shrink: 0; width: 44px; text-align: center; }
        .film-body { flex: 1; min-width: 0; }
        .film-title { font-weight: 900; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .film-meta { display: flex; gap: 6px; margin-top: 5px; flex-wrap: wrap; align-items: center; }
        .badge-genre { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 8px; background: var(--accent-bg); color: var(--accent); }
        .badge-anno { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 8px; background: var(--grey-light); color: #666; }
        .film-note { font-size: 13px; color: #888; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .stars { font-size: 14px; letter-spacing: -1px; }

        .btn-visto {
            flex-shrink: 0; padding: 7px 12px; border-radius: 12px;
            border: 2px solid var(--grey); background: white; cursor: pointer;
            font-size: 12px; font-weight: 800; color: #666; transition: all 0.15s;
            white-space: nowrap;
        }
        .btn-visto.visto { border-color: var(--green); color: var(--green); background: rgba(15,186,141,0.06); }

        /* Modal */
        .modal-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.5); align-items: flex-end; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal-box { background: var(--white); border-radius: 28px 28px 0 0; padding: 24px 20px; padding-bottom: max(24px, env(safe-area-inset-bottom, 24px)); width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
        .modal-handle { width: 40px; height: 4px; background: var(--grey); border-radius: 4px; margin: 0 auto 20px; }
        .modal-title { font-weight: 900; font-size: 18px; margin-bottom: 18px; }
        .form-group { margin-bottom: 12px; }
        .form-label { font-size: 12px; font-weight: 800; color: #666; margin-bottom: 5px; display: block; text-transform: uppercase; letter-spacing: 0.4px; }
        .form-input { width: 100%; padding: 12px 14px; border-radius: 14px; border: 2.5px solid var(--grey); font-size: 15px; font-family: inherit; outline: none; transition: border-color 0.2s; }
        .form-input:focus { border-color: var(--accent); }
        .form-row { display: flex; gap: 8px; }
        .form-row .form-group { flex: 1; }
        .form-section-sep { height: 1px; background: var(--grey-light); margin: 14px 0; }

        .star-picker { display: flex; gap: 6px; }
        .star-btn { font-size: 26px; background: none; border: none; cursor: pointer; padding: 4px; line-height: 1; opacity: 0.3; transition: opacity 0.15s, transform 0.1s; }
        .star-btn.active { opacity: 1; }
        .star-btn:active { transform: scale(1.2); }

        .visto-toggle { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 14px; border: 2.5px solid var(--grey); cursor: pointer; user-select: none; transition: all 0.15s; }
        .visto-toggle.on { border-color: var(--green); background: rgba(15,186,141,0.06); }
        .visto-toggle-label { font-weight: 800; font-size: 15px; flex: 1; }
        .visto-toggle-check { width: 26px; height: 26px; border-radius: 8px; border: 2.5px solid var(--grey); display: flex; align-items: center; justify-content: center; font-size: 15px; transition: all 0.15s; background: white; }
        .visto-toggle.on .visto-toggle-check { background: var(--green); border-color: var(--green); color: white; }

        .btn-save-modal { width: 100%; padding: 16px; border-radius: 18px; border: none; background: var(--accent); color: white; font-weight: 900; font-size: 16px; cursor: pointer; font-family: inherit; margin-top: 8px; }
        .btn-delete-modal { width: 100%; padding: 14px; border-radius: 18px; border: none; background: #fff0f0; color: var(--red); font-weight: 800; font-size: 14px; cursor: pointer; font-family: inherit; margin-top: 8px; }

        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 70px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 2px solid var(--grey-light); padding-bottom: env(safe-area-inset-bottom); z-index: 100; }
        .tab-item { flex: 1; text-align: center; font-size: 11px; color: var(--dark); text-decoration: none; font-weight: 800; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .icon-tab { width: 24px; height: 24px; stroke-width: 2.5px; stroke: var(--dark); fill: none; }
        .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--dark); color: white; padding: 12px 20px; border-radius: 14px; font-weight: 700; font-size: 14px; opacity: 0; transition: all 0.25s; white-space: nowrap; z-index: 999; pointer-events: none; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div class="page-header">
    <div class="header-row">
        <button class="btn-back" onclick="history.back()">
            <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="header-title">🎬 FILM DA VEDERE</div>
        <button class="btn-add-hdr" onclick="apriModale()">+</button>
    </div>
    <div class="search-bar">
        <input class="search-input" id="searchInput" placeholder="Cerca un film…" oninput="render()">
    </div>
    <div class="tabs-row">
        <button class="tab-pill active" id="tabDaVedere" onclick="setTab('da_vedere')">🎬 Da vedere</button>
        <button class="tab-pill"        id="tabVisti"    onclick="setTab('visti')">✅ Visti</button>
    </div>
    <div class="stats-bar" id="statsBar"></div>
</div>

<div style="padding: 0 16px">
    <div class="genre-scroll" id="genreScroll"></div>
</div>

<div class="list-body" id="listBody"></div>

<!-- Modal -->
<div class="modal-overlay" id="modale">
    <div class="modal-box">
        <div class="modal-handle"></div>
        <div class="modal-title" id="modalTitle">Nuovo film</div>

        <div class="form-group">
            <label class="form-label">Titolo *</label>
            <input class="form-input" id="fTitolo" placeholder="es. Inception…" type="text">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Anno</label>
                <input class="form-input" id="fAnno" placeholder="2024" type="number" min="1900" max="2099">
            </div>
            <div class="form-group">
                <label class="form-label">Genere</label>
                <select class="form-input" id="fGenere">
                    <option value="Azione">Azione</option>
                    <option value="Animazione">Animazione</option>
                    <option value="Avventura">Avventura</option>
                    <option value="Commedia">Commedia</option>
                    <option value="Documentario">Documentario</option>
                    <option value="Drammatico">Drammatico</option>
                    <option value="Fantasy">Fantasy</option>
                    <option value="Horror">Horror</option>
                    <option value="Romantico">Romantico</option>
                    <option value="Sci-Fi">Sci-Fi</option>
                    <option value="Thriller">Thriller</option>
                    <option value="Altro" selected>Altro</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Note</label>
            <textarea class="form-input" id="fNote" placeholder="Consigliato da, dove vederlo…" rows="2" style="resize:none"></textarea>
        </div>

        <div class="form-section-sep"></div>

        <div class="form-group">
            <div class="visto-toggle" id="vistoToggle" onclick="toggleVisto()">
                <span class="visto-toggle-label">✅ L'ho visto</span>
                <div class="visto-toggle-check" id="vistoCheck"></div>
            </div>
        </div>

        <div id="sezVisto" style="display:none">
            <div class="form-group">
                <label class="form-label">Voto</label>
                <div class="star-picker" id="starPicker">
                    <button class="star-btn" onclick="setVoto(1)">⭐</button>
                    <button class="star-btn" onclick="setVoto(2)">⭐</button>
                    <button class="star-btn" onclick="setVoto(3)">⭐</button>
                    <button class="star-btn" onclick="setVoto(4)">⭐</button>
                    <button class="star-btn" onclick="setVoto(5)">⭐</button>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Data visione</label>
                <input class="form-input" id="fDataVista" type="date">
            </div>
        </div>

        <button class="btn-save-modal" onclick="salva()">SALVA</button>
        <button class="btn-delete-modal" id="btnElimina" style="display:none" onclick="elimina()">ELIMINA</button>
    </div>
</div>

<div class="tab-bar">
    <a href="index.html" class="tab-item">
        <svg class="icon-tab" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 15 22"/></svg>
        HOME
    </a>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = "https://eejdpophfxsrqdvsucye.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlamRwb3BoZnhzcnFkdnN1Y3llIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NTMzMDQsImV4cCI6MjA5MzIyOTMwNH0.mpxbwlJyIdZgqKIdutHbLd85JR1P11yiglbYeApi17k";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const userEmail = localStorage.getItem('userEmail');
if (!userEmail) location.href = 'login.html';

const GENRE_EMOJI = {
    'Azione': '💥', 'Animazione': '🎨', 'Avventura': '🗺️', 'Commedia': '😂',
    'Documentario': '📹', 'Drammatico': '🎭', 'Fantasy': '🧙', 'Horror': '👻',
    'Romantico': '💕', 'Sci-Fi': '🚀', 'Thriller': '🔪', 'Altro': '🎬'
};

let film = [];
let tabCorrente = 'da_vedere';
let genreFiltro = 'Tutti';
let votoCorrente = 0;
let vistoCorrente = false;
let editId = null;

async function carica() {
    const { data, error } = await sb.from('film').select('*')
        .eq('email_utente', userEmail)
        .order('created_at', { ascending: false });
    if (error) { toast('Errore: ' + error.message); return; }
    film = data || [];
    renderGenres();
    render();
}

function getGenres() {
    const set = new Set(film.map(f => f.genere).filter(Boolean));
    return ['Tutti', ...set];
}

function renderGenres() {
    const genres = getGenres();
    document.getElementById('genreScroll').innerHTML = genres.map(g =>
        `<button class="genre-chip${genreFiltro === g ? ' active' : ''}" onclick="setGenre('${g.replace(/'/g,"\\'")}')">
            ${GENRE_EMOJI[g] || '🎬'} ${g}
         </button>`
    ).join('');
}

function setGenre(g) { genreFiltro = g; renderGenres(); render(); }
function setTab(t) {
    tabCorrente = t;
    document.getElementById('tabDaVedere').className = 'tab-pill' + (t === 'da_vedere' ? ' active' : '');
    document.getElementById('tabVisti').className    = 'tab-pill' + (t === 'visti'     ? ' active' : '');
    render();
}

function renderStars(voto) {
    if (!voto) return '';
    return '⭐'.repeat(voto) + '☆'.repeat(5 - voto);
}

function render() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const isVisti = tabCorrente === 'visti';

    let filtered = film.filter(f => f.visto === isVisti);
    if (genreFiltro !== 'Tutti') filtered = filtered.filter(f => f.genere === genreFiltro);
    if (q) filtered = filtered.filter(f => f.titolo.toLowerCase().includes(q) || (f.note || '').toLowerCase().includes(q));

    // Stats
    const totDaVedere = film.filter(f => !f.visto).length;
    const totVisti    = film.filter(f => f.visto).length;
    document.getElementById('statsBar').innerHTML =
        `<span class="stat-chip">🎬 ${totDaVedere} da vedere</span>` +
        (totVisti ? `<span class="stat-chip">✅ ${totVisti} visti</span>` : '');

    const body = document.getElementById('listBody');
    if (!filtered.length) {
        body.innerHTML = `<div class="empty-msg">${isVisti ? '🎬 Nessun film visto ancora' : '🍿 Lista vuota — aggiungi qualcosa!'}</div>`;
        return;
    }

    body.innerHTML = filtered.map(f => {
        const emoji = GENRE_EMOJI[f.genere] || '🎬';
        const annoHtml  = f.anno  ? `<span class="badge-anno">${f.anno}</span>` : '';
        const genreHtml = f.genere ? `<span class="badge-genre">${f.genere}</span>` : '';
        const starsHtml = f.visto && f.voto ? `<span class="stars">${renderStars(f.voto)}</span>` : '';
        const btnLabel  = f.visto ? '✅ Visto' : 'Segna visto';
        return `<div class="film-card${f.visto ? ' visto' : ''}" onclick="apriModifica(${f.id})">
            <div class="film-emoji">${emoji}</div>
            <div class="film-body">
                <div class="film-title">${f.titolo}</div>
                ${f.note ? `<div class="film-note">${f.note}</div>` : ''}
                <div class="film-meta">${annoHtml}${genreHtml}${starsHtml}</div>
            </div>
            <button class="btn-visto${f.visto ? ' visto' : ''}" onclick="event.stopPropagation(); toggleVistoDiretto(${f.id})">${btnLabel}</button>
        </div>`;
    }).join('');
}

async function toggleVistoDiretto(id) {
    const f = film.find(x => x.id === id);
    if (!f) return;
    const nuovoVisto = !f.visto;
    const { error } = await sb.from('film').update({ visto: nuovoVisto, data_vista: nuovoVisto ? new Date().toISOString().split('T')[0] : null }).eq('id', id);
    if (error) { toast('Errore: ' + error.message); return; }
    f.visto = nuovoVisto;
    f.data_vista = nuovoVisto ? new Date().toISOString().split('T')[0] : null;
    render();
    toast(nuovoVisto ? '✅ Segnato come visto!' : 'Rimesso in lista');
}

function setVoto(n) {
    votoCorrente = n;
    document.querySelectorAll('.star-btn').forEach((btn, i) => {
        btn.className = 'star-btn' + (i < n ? ' active' : '');
    });
}

function toggleVisto() {
    vistoCorrente = !vistoCorrente;
    const toggle = document.getElementById('vistoToggle');
    const check  = document.getElementById('vistoCheck');
    toggle.className = 'visto-toggle' + (vistoCorrente ? ' on' : '');
    check.textContent = vistoCorrente ? '✓' : '';
    document.getElementById('sezVisto').style.display = vistoCorrente ? '' : 'none';
    if (vistoCorrente && !document.getElementById('fDataVista').value) {
        document.getElementById('fDataVista').value = new Date().toISOString().split('T')[0];
    }
}

function apriModale() {
    editId = null;
    vistoCorrente = false; votoCorrente = 0;
    document.getElementById('modalTitle').textContent = 'Nuovo film';
    document.getElementById('fTitolo').value = '';
    document.getElementById('fAnno').value = '';
    document.getElementById('fGenere').value = 'Altro';
    document.getElementById('fNote').value = '';
    document.getElementById('fDataVista').value = '';
    document.getElementById('btnElimina').style.display = 'none';
    document.getElementById('vistoToggle').className = 'visto-toggle';
    document.getElementById('vistoCheck').textContent = '';
    document.getElementById('sezVisto').style.display = 'none';
    setVoto(0);
    document.getElementById('modale').classList.add('open');
}

function apriModifica(id) {
    const f = film.find(x => x.id === id);
    if (!f) return;
    editId = id;
    vistoCorrente = !!f.visto;
    votoCorrente = f.voto || 0;
    document.getElementById('modalTitle').textContent = 'Modifica film';
    document.getElementById('fTitolo').value = f.titolo || '';
    document.getElementById('fAnno').value = f.anno || '';
    document.getElementById('fGenere').value = f.genere || 'Altro';
    document.getElementById('fNote').value = f.note || '';
    document.getElementById('fDataVista').value = f.data_vista || '';
    document.getElementById('btnElimina').style.display = '';
    document.getElementById('vistoToggle').className = 'visto-toggle' + (vistoCorrente ? ' on' : '');
    document.getElementById('vistoCheck').textContent = vistoCorrente ? '✓' : '';
    document.getElementById('sezVisto').style.display = vistoCorrente ? '' : 'none';
    setVoto(votoCorrente);
    document.getElementById('modale').classList.add('open');
}

async function salva() {
    const titolo = document.getElementById('fTitolo').value.trim();
    if (!titolo) { toast('Inserisci il titolo'); return; }
    const row = {
        email_utente: userEmail,
        titolo,
        anno: parseInt(document.getElementById('fAnno').value) || null,
        genere: document.getElementById('fGenere').value || 'Altro',
        note: document.getElementById('fNote').value.trim() || null,
        visto: vistoCorrente,
        voto: vistoCorrente && votoCorrente > 0 ? votoCorrente : null,
        data_vista: vistoCorrente ? (document.getElementById('fDataVista').value || null) : null,
    };
    let err;
    if (editId) {
        ({ error: err } = await sb.from('film').update(row).eq('id', editId));
        if (err) { toast('Errore: ' + err.message); return; }
        toast('✓ Aggiornato');
    } else {
        ({ error: err } = await sb.from('film').insert(row));
        if (err) { toast('Errore: ' + err.message); return; }
        toast('✓ Aggiunto');
    }
    document.getElementById('modale').classList.remove('open');
    await carica();
}

async function elimina() {
    if (!editId || !confirm('Eliminare questo film?')) return;
    await sb.from('film').delete().eq('id', editId);
    document.getElementById('modale').classList.remove('open');
    toast('Eliminato');
    await carica();
}

document.getElementById('modale').addEventListener('click', e => {
    if (e.target === document.getElementById('modale')) document.getElementById('modale').classList.remove('open');
});

let toastTimer;
function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

carica();
</script>
</body>
</html>
