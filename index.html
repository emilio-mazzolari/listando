<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Lista Spesa</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f2f2f7;
      display: flex;
      justify-content: center;
    }
    .app {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      padding-bottom: 90px;
    }
    h1 { text-align: center; color: #1c1c1e; }
    .card {
      background: white;
      border-radius: 16px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #ddd;
      margin-bottom: 10px;
      box-sizing: border-box;
      font-size: 16px;
    }
    .btn {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      background: #5ac8fa;
      color: white;
      font-weight: 600;
      font-size: 16px;
    }
    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #eee;
    }
    .btn-small {
      border: none;
      border-radius: 10px;
      padding: 8px 12px;
      cursor: pointer;
      margin-left: 5px;
    }
    .check { background: #4caf82; color: white; }
    .restore { background: #d1d1d6; color: #3a3a3c; }
    .delete { background: #ff6b6b; color: white; }
    .tab-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 65px;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      border-top: 1px solid #ddd;
      display: flex;
      justify-content: space-around;
      align-items: center;
    }
    .tab-item {
      flex: 1;
      text-align: center;
      font-size: 12px;
      color: #8e8e93;
      text-decoration: none;
    }
    .tab-item.active { color: #5ac8fa; font-weight: 600; }
    .tab-icon { display: block; font-size: 20px; }
    #appBox { display:none; }
  </style>
</head>
<body>

<div class="app">
  <!-- 🔐 LOGIN -->
  <div id="loginBox" class="card">
    <h2>Accedi</h2>
    <p style="font-size: 14px; color: #666;">Inserisci la tua email per vedere la tua lista.</p>
    <input id="email" type="email" placeholder="esempio@email.com">
    <button class="btn" onclick="login()">Entra</button>
  </div>

  <!-- 📋 APP -->
  <div id="appBox">
    <h1>🛒 Lista Spesa</h1>
    <div class="card">
      <div id="lista">Caricamento...</div>
      <div style="margin-top: 20px;">
        <button class="btn" style="background: #ff9500;" onclick="svuotaLista()">Svuota lista</button>
      </div>
    </div>
  </div>
</div>

<!-- TAB BAR -->
<div class="tab-bar">
  <a href="index.html" class="tab-item active">
    <span class="tab-icon">🛒</span> Lista
  </a>
  <a href="prodotti.html" class="tab-item">
    <span class="tab-icon">🧾</span> Prodotti
  </a>
</div>

<script>
// CONFIGURAZIONE
const SUPABASE_URL = "https://eejdpophfxsrqdvsucye.supabase.co";
const SUPABASE_KEY = "sb_publishable_A7ZE5MzG6TtUrTKNo3SebA_qOk3_n4v";

let userEmail = localStorage.getItem("user-email");

/* 🔐 LOGIN SIMPLIFICATO */
function login() {
  const email = document.getElementById("email").value;
  if (email.includes("@")) {
    localStorage.setItem("user-email", email);
    location.reload();
  } else {
    alert("Inserisci un'email valida");
  }
}

/* 📋 CARICA DATI */
async function caricaLista() {
  if (!userEmail) return;

  try {
    // 1. Prendo i prodotti per avere i nomi
    const resProd = await fetch(`${SUPABASE_URL}/rest/v1/prodotti?select=*`, {
      headers: { "apikey": SUPABASE_KEY }
    });
    const prodotti = await resProd.json();

    // 2. Prendo la lista della spesa dell'utente
    // Uso l'email come filtro (assumendo che user_id contenga l'email o che tu filtri così)
    const resLista = await fetch(`${SUPABASE_URL}/rest/v1/lista_spesa?select=*`, {
      headers: { "apikey": SUPABASE_KEY }
    });
    const lista = await resLista.json();

    const div = document.getElementById("lista");
    div.innerHTML = "";

    if (lista.length === 0) {
      div.innerHTML = "<p style='text-align:center; color: #8e8e93;'>La lista è vuota</p>";
      return;
    }

    lista.forEach(item => {
      const prod = prodotti.find(p => p.id === item.prodotto_id);
      const nome = prod ? prod.nome : "Prodotto sconosciuto";

      const el = document.createElement("div");
      el.className = "item";
      el.innerHTML = `
        <span style="${item.completato ? 'text-decoration:line-through; opacity:0.5' : ''}">
          ${nome}
        </span>
        <div>
          <button class="btn-small ${item.completato ? 'restore' : 'check'}" 
                  onclick="toggle(${item.id}, ${!item.completato})">
            ${item.completato ? '↩' : '✔'}
          </button>
          <button class="btn-small delete" onclick="removeItem(${item.id})">✖</button>
        </div>
      `;
      div.appendChild(el);
    });
  } catch (err) {
    console.error("Errore:", err);
    document.getElementById("lista").innerHTML = "Errore nel caricamento.";
  }
}

/* ✔ AGGIORNA STATO */
async function toggle(id, value) {
  await fetch(`${SUPABASE_URL}/rest/v1/lista_spesa?id=eq.${id}`, {
    method: "PATCH",
    headers: {
      "apikey": SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ completato: value })
  });
  caricaLista();
}

/* ✖ ELIMINA */
async function removeItem(id) {
  if (!confirm("Vuoi eliminare questo elemento?")) return;
  await fetch(`${SUPABASE_URL}/rest/v1/lista_spesa?id=eq.${id}`, {
    method: "DELETE",
    headers: { "apikey": SUPABASE_KEY }
  });
  caricaLista();
}

/* 🧹 SVUOTA TUTTO */
async function svuotaLista() {
  if (!confirm("Sei sicuro di voler svuotare tutta la lista?")) return;
  await fetch(`${SUPABASE_URL}/rest/v1/lista_spesa?select=*`, {
    method: "DELETE",
    headers: { "apikey": SUPABASE_KEY }
  });
  caricaLista();
}

/* INIZIALIZZAZIONE */
if (userEmail) {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("appBox").style.display = "block";
  caricaLista();
}
</script>
</body>
</html>
