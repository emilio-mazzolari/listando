<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista Spesa</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000" />

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
    }

    input {
      width: 70%;
      padding: 10px;
    }

    button {
      padding: 10px;
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      display: flex;
      justify-content: space-between;
      padding: 8px;
      border-bottom: 1px solid #ddd;
    }

    .delete {
      color: red;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🛒 Lista Spesa</h1>

    <input id="itemInput" placeholder="Aggiungi elemento..." />
    <button onclick="addItem()">Aggiungi</button>

    <ul id="list"></ul>
  </div>

  <script>
    let list = JSON.parse(localStorage.getItem("lista")) || [];

    function render() {
      const ul = document.getElementById("list");
      ul.innerHTML = "";

      list.forEach((item, index) => {
        const li = document.createElement("li");
        li.innerHTML = `
          ${item}
          <span class="delete" onclick="removeItem(${index})">❌</span>
        `;
        ul.appendChild(li);
      });

      localStorage.setItem("lista", JSON.stringify(list));
    }

    function addItem() {
      const input = document.getElementById("itemInput");
      if (input.value.trim() === "") return;

      list.push(input.value.trim());
      input.value = "";
      render();
    }

    function removeItem(index) {
      list.splice(index, 1);
      render();
    }

    render();
  </script>

  <!-- Service Worker (OFFLINE) -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js');
    }
  </script>

</body>
</html>
