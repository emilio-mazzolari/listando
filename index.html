<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Le Mie Liste</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; font-family: -apple-system, Helvetica, Arial, sans-serif; background: #f2f2f7; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .app { width: 100%; max-width: 420px; padding: 20px; text-align: center; }
        
        h1 { font-size: 28px; color: #1c1c1e; margin-bottom: 40px; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }
        
        /* Bottoni Grandi Centrali */
        .menu-container { display: flex; flex-direction: column; gap: 20px; width: 100%; }
        
        .btn-big { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 15px;
            width: 100%; 
            padding: 35px 0; 
            border-radius: 24px; 
            border: none; 
            background: white; 
            color: #1c1c1e; 
            font-size: 22px; 
            font-weight: 800; 
            text-decoration: none; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-big:active { transform: scale(0.96); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .btn-big span { font-size: 30px; }

        /* Palette dedicata */
        .btn-spesa { border-left: 10px solid #aec6cf; }
        .btn-valigia { border-left: 10px solid #9fb8ad; }

        /* Tab Bar Bassa */
        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: #aec6cf; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(0,0,0,0.05); }
        .tab-item { flex: 1; text-align: center; font-size: 12px; color: #333; text-decoration: none; font-weight: 800; display: flex; flex-direction: column; gap: 4px; text-transform: uppercase; }
        .tab-active { color: white; }
    </style>
</head>
<body>

    <div class="app">
        <h1>Le Mie Liste</h1>

        <div class="menu-container">
            <a href="spesa.html" class="btn-big btn-spesa">
                <span>🛒</span> SPESA
            </a>
            
            <a href="valigia.html" class="btn-big btn-valigia">
                <span>🧳</span> VALIGIA
            </a>
        </div>
    </div>

    <!-- Barra di Navigazione Home -->
    <div class="tab-bar">
        <a href="index.html" class="tab-item tab-active"><span>🏠</span>HOME</a>
        <a href="#" class="tab-item" onclick="logout()"><span>🚪</span>ESCI</a>
    </div>

    <script>
        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        // Verifica login
        if (!localStorage.getItem('userEmail')) {
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
