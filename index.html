<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Listando - Le Mie Liste</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --green: #0fba8d;
            --blue: #3384d4;
            --yellow: #feb310;
            --grey: #d8dddc;
            --dark: #1c1c1e;
            --bg: #fdfdfd;
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: var(--bg); 
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
            color: var(--dark);
        }

        .app { 
            width: 100%; 
            max-width: 400px; 
            padding: 20px; 
            padding-bottom: 120px; /* Spazio per la tab bar */
            text-align: center;
        }
        
        .logo-header { margin-bottom: 30px; margin-top: 20px; }
        .logo-img { max-width: 150px; height: auto; border-radius: 20px; }

        .menu-container { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            width: 100%; 
        }
        
        /* Pulsante Base */
        .btn-big { 
            display: flex; 
            align-items: center; 
            gap: 20px;
            width: 100%; 
            padding: 18px 22px; 
            border-radius: 28px; 
            border: 4px solid var(--grey); 
            background: white; 
            color: var(--dark); 
            font-size: 18px; 
            font-weight: 800; 
            text-decoration: none; 
            transition: all 0.2s ease;
            box-sizing: border-box;
            position: relative;
        }

        .btn-big:active:not(.btn-locked) { 
            transform: scale(0.96);
            background-color: #fafafa;
        }

        /* Colori Liste Attive */
        .btn-spesa { border-color: var(--blue); }
        .btn-valigia { border-color: var(--yellow); }

        /* Stile Liste NON ATTIVE (Locked) */
        .btn-locked {
            opacity: 0.5;
            border-style: dashed;
            cursor: default;
        }

        .badge-soon {
            font-size: 10px;
            background: var(--grey);
            color: #777;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: auto;
            text-transform: uppercase;
        }

        .lock-icon {
            position: absolute;
            top: 10px;
            right: 15px;
            width: 14px;
            height: 14px;
            opacity: 0.5;
        }

        .icon-svg { width: 38px; height: 38px; flex-shrink: 0; }

        /* Tab Bar */
        .tab-bar { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            height: 85px; 
            background: white; 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            border-top: 3px solid var(--grey);
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 100;
        }
        
        .tab-item { 
            flex: 1; 
            text-align: center; 
            font-size: 11px; 
            color: var(--dark); 
            text-decoration: none; 
            font-weight: 800; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            gap: 6px; 
        }

        .tab-active { color: var(--green); }
        .tab-active .icon-tab { stroke: var(--green); }

        .icon-tab { width: 28px; height: 28px; stroke-width: 2.5px; stroke: var(--dark); fill: none; }
        .logout-btn { color: #eb445a; }
        .logout-btn .icon-tab { stroke: #eb445a; }
    </style>
</head>
<body>

            </div>
        </div>
    </div>

    <div class="tab-bar">

        if (!localStorage.getItem('userEmail')) {

        async function logout() {
            try { await supabaseClient.auth.signOut(); } catch (err) {}
