<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Lista Spesa</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; font-family: -apple-system, Helvetica, Arial, sans-serif; background: #f2f2f7; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 420px; padding: 20px; padding-bottom: 90px; }
        .card { background: white; border-radius: 16px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        
        .item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .testo-prodotto { flex-grow: 1; font-size: 16px; color: #1c1c1e; font-weight: 600; }
        .testo-prodotto.barrato { text-decoration: line-through; color: #8e8e93; opacity: 0.6; }
        
        .btn-small { border: none; border-radius: 8px; width: 32px; height: 32px; cursor: pointer; margin-left: 8px; display: inline-flex; align-items: center; justify-content: center; }
        .check { background-color: #45a049; } 
        .restore { background-color: #c7c7cc; } 
        .delete { background-color: #db5151; } 
        .icon { width: 22px; height: 22px; fill: none; stroke: white; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }

        .btn-orange { width: 100%; padding: 15px; border-radius: 12px; border: none; background: #aec6cf; color: white; font-weight: bold; margin-top: 15px; cursor: pointer; font-size: 16px; }
        .btn-secondary { background: #99b3bc; }
        .btn-outline { background: transparent; color: #99b3bc; border: 2px solid #99b3bc; margin-top: 10px; }

        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 70px; background: #aec6cf; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .tab-item { flex: 1; text-align: center; font-size: 14px; color: black; text-decoration: none; text-transform: uppercase; font-weight: 600; }
        .tab-active { font-weight: 900; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal-box { background: white; padding: 25px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; }
    </style>
</head>
<body>
    <div class="app">
        <div class="header-box"><h1 style="margin:0;">🛒 Lista della spesa</h1></div>
        <div class="card">
            <div id="contenitoreLista">Caricamento...</div>
            <button class="btn-orange btn-secondary" onclick="eliminaAcquistati()">ELIMINA PRODOTTI ACQUISTATI</button>
            <button class="btn-orange" onclick="apriModalSvuota()">SVUOTA TUTTA LA LISTA</button>
            <button id="btnRipristina" class="btn-orange btn-outline" style="display:none;" onclick="ripristinaUltimaLista()">RIPRISTINA ULTIMA LISTA</button>
        </div>
    </div>

    <div class="tab-bar">
        <a href="index.html" class="tab-item tab-active">🛒 LISTA</a>
        <a href="prodotti.html" class="tab-item">📦 PRODOTTI</a>
        <a href="#" class="tab-item" onclick="logout()">🚪 ESCI</a>
    </div>

    <div id="svuotaModal" class="modal-overlay">
        <div class="modal-box">
            <h3>Svuota Lista</h3>
            <p>Sei sicuro di voler cancellare tutto?</p>
            <button class="btn-orange" onclick="confermaSvuota()">SI, SVUOTA TUTTO</button>
            <button class="btn-orange" style="background:#e5e5ea; color:#8e8e93; margin-top:10px;" onclick="chiudiModal()">ANNULLA</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://eejdpophfxsrqdvsucye.supabase.co";
        const SUPABASE_KEY = "sb_publishable_A7ZE5MzG6TtUrTKNo3SebA_qOk3_n4v";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let userEmail = localStorage.getItem('userEmail');

        async function inizializza() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                userEmail = session.user.email;
                localStorage.setItem('userEmail', userEmail);
            }
            
            if (!userEmail) {
                window.location.href = 'login.html';
            } else {
                controllaBackup();
                caricaLista();
            }
        }

        async function caricaLista() {
            const { data, error } = await supabaseClient.from('lista_spesa').select('*, prodotti(nome)').eq('email_utente', userEmail);
            const div = document.getElementById("contenitoreLista");
            
            if (!data || !data.length) {
                div.innerHTML = "La lista è vuota.";
                return;
            }

            data.sort((a, b) => (a.prodotti?.nome || "").localeCompare(b.prodotti?.nome || ""));
            div.innerHTML = "";
            data.forEach(item => {
                const riga = document.createElement("div");
                riga.className = "item";
                const iconaClasse = item.completato ? 'restore' : 'check';
                const svgIcona = item.completato ? `<path d="M9 14l-4-4 4-4M5 10h11a4 4 0 110 8h-1"/>` : `<path d="M5 12l5 5L20 7"/>`;

                riga.innerHTML = `<span class="testo-prodotto ${item.completato ? 'barrato' : ''}">${item.prodotti?.nome}</span>
                    <div style="display:flex;">
                        <button class="btn-small ${iconaClasse}" onclick="toggle(${item.id}, ${item.completato})"><svg class="icon" viewBox="0 0 24 24">${svgIcona}</svg></button>
                        <button class="btn-small delete" onclick="elimina(${item.id})"><svg class="icon" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
                    </div>`;
                div.appendChild(riga);
            });
        }

        async function toggle(id, stato) {
            await supabaseClient.from('lista_spesa').update({ completato: !stato }).eq('id', id);
            caricaLista();
        }

        async function elimina(id) {
            await supabaseClient.from('lista_spesa').delete().eq('id', id);
            caricaLista();
        }

        // ELIMINA ACQUISTATI SENZA MESSAGGIO
        async function eliminaAcquistati() {
            await supabaseClient.from('lista_spesa').delete().eq('email_utente', userEmail).eq('completato', true);
            caricaLista();
        }

        function apriModalSvuota() { document.getElementById('svuotaModal').style.display = 'flex'; }
        function chiudiModal() { document.getElementById('svuotaModal').style.display = 'none'; }

        async function confermaSvuota() {
            // Salva backup prima di svuotare
            const { data } = await supabaseClient.from('lista_spesa').select('prodotto_id').eq('email_utente', userEmail);
            if (data && data.length > 0) {
                localStorage.setItem('backup_lista', JSON.stringify(data.map(d => d.prodotto_id)));
                document.getElementById('btnRipristina').style.display = 'block';
            }
            
            await supabaseClient.from('lista_spesa').delete().eq('email_utente', userEmail);
            chiudiModal();
            caricaLista();
        }

        function controllaBackup() {
            if (localStorage.getItem('backup_lista')) {
                document.getElementById('btnRipristina').style.display = 'block';
            }
        }

        async function ripristinaUltimaLista() {
            const ids = JSON.parse(localStorage.getItem('backup_lista'));
            if (!ids) return;

            const righe = ids.map(id => ({ prodotto_id: id, email_utente: userEmail, completato: false }));
            await supabaseClient.from('lista_spesa').insert(righe);
            
            localStorage.removeItem('backup_lista');
            document.getElementById('btnRipristina').style.display = 'none';
            caricaLista();
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            localStorage.clear();
            window.location.href = 'login.html';
        }

        inizializza();
    </script>
</body>
</html>
