<!DOCTYPE html>
<html>
<head>
  <title>Lista Spesa</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f2f2f7;
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    .primary {
      width: 100%;
      background: #5ac8fa;
      color: white;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    .item {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
    }

    .actions button {
      margin-left: 5px;
      border: none;
      border-radius: 10px;
      padding: 6px 10px;
      cursor: pointer;
    }

    .blue { background: #5ac8fa; color: white; }
    .green { background: #4caf82; color: white; }
    .grey { background: #d1d1d6; }
    .red { background: #ff3b30; color: white; }

    .completed {
      text-decoration: line-through;
      opacity: 0.5;
    }
  </style>
</head>

<body>

<div class="app">

  <h1>🛒 Lista Spesa</h1>

  <div class="card">
    <div class="input-row">
      <input id="nuovoProdotto" placeholder="Nuovo prodotto">
    </div>
    <br>
    <button class="primary" onclick="aggiungi()">Aggiungi</button>
  </div>

  <div class="card">
    <div id="lista"></div>
  </div>

  <button class="primary" onclick="vaiProdotti()">Vai ai prodotti</button>

</div>

<script>
const SUPABASE_URL = "https://eejdpophfxsrqdvsucye.supabase.co";
const SUPABASE_KEY = "sb_publishable_A7ZE5MzG6TtUrTKNo3SebA_qOk3_n4v";

function vaiProdotti() {
  window.location.href = "/prodotti.html";
}

/* LISTA */

async function caricaLista() {
  const res = await fetch(SUPABASE_URL + "/rest/v1/lista_spesa?select=*,prodotti(nome)", {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY
    }
  });

  const data = await res.json();
  const div = document.getElementById("lista");
  div.innerHTML = "";

  data.forEach(item => {
    const el = document.createElement("div");
    el.className = "item";

    el.innerHTML = `
      <span class="${item.completato ? "completed" : ""}">
        ${item.prodotti.nome}
      </span>

      <div class="actions">
        ${item.completato
          ? `<button class="grey" onclick="ripristina(${item.id})">↩</button>`
          : `<button class="green" onclick="completa(${item.id})">✔</button>`
        }
        <button class="red" onclick="rimuovi(${item.id})">🗑</button>
      </div>
    `;

    div.appendChild(el);
  });
}

async function completa(id) {
  await fetch(SUPABASE_URL + "/rest/v1/lista_spesa?id=eq." + id, {
    method: "PATCH",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ completato: true })
  });
  caricaLista();
}

async function ripristina(id) {
  await fetch(SUPABASE_URL + "/rest/v1/lista_spesa?id=eq." + id, {
    method: "PATCH",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ completato: false })
  });
  caricaLista();
}

async function rimuovi(id) {
  await fetch(SUPABASE_URL + "/rest/v1/lista_spesa?id=eq." + id, {
    method: "DELETE",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY
    }
  });
  caricaLista();
}

async function aggiungi() {
  const nome = document.getElementById("nuovoProdotto").value;

  await fetch(SUPABASE_URL + "/rest/v1/lista_spesa", {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      prodotto_nome: nome,
      completato: false
    })
  });

  document.getElementById("nuovoProdotto").value = "";
  caricaLista();
}

caricaLista();
</script>

</body>
</html>
