<!DOCTYPE html>
<html>
<head>
  <title>Lista Spesa</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#5ac8fa">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="/icon-192.png">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f2f2f7;
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      padding-bottom: 90px;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 15px;
      margin-bottom: 15px;
    }

    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 6px 10px;
      cursor: pointer;
      margin-left: 5px;
    }

    .green { background: #34c759; color: white; }
    .red { background: #8b0000; color: white; }
    .grey { background: #d1d1d6; }

    .completed {
      text-decoration: line-through;
      opacity: 0.5;
    }

    /* TAB BAR */
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 65px;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      border-top: 1px solid #ddd;
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 999;
    }

    .tab-item {
      flex: 1;
      text-align: center;
      font-size: 12px;
      color: #8e8e93;
      text-decoration: none;
    }

    .tab-item.active {
      color: #5ac8fa;
      font-weight: 600;
    }

    .tab-icon {
      display: block;
      font-size: 20px;
      margin-bottom: 3px;
    }
  </style>
</head>

<body>

<div class="app">

  <h1>🛒 Lista Spesa</h1>

  <div class="card">
    <div id="lista"></div>
  </div>

</div>

<!-- TAB BAR -->
<div class="tab-bar">

  <a href="/index.html" class="tab-item active">
    <span class="tab-icon">🛒</span>
    Lista
  </a>

  <a href="/prodotti.html" class="tab-item">
    <span class="tab-icon">📦</span>
    Prodotti
  </a>

</div>

<script>
const SUPABASE_URL = "https://eejdpophfxsrqdvsucye.supabase.co";
const SUPABASE_KEY = "sb_publishable_A7ZE5MzG6TtUrTKNo3SebA_qOk3_n4v";

/* ORDINE ALFABETICO */
function ordina(data) {
  return data.sort((a, b) =>
    (a.prodotti?.nome || "").localeCompare(b.prodotti?.nome || "")
  );
}

/* LISTA */
async function caricaLista() {
  const res = await fetch(SUPABASE_URL + "/rest/v1/lista_spesa?select=*,prodotti(nome)", {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY
    }
  });

  let data = await res.json();
  data = ordina(data);

  const div = document.getElementById("lista");
  div.innerHTML = "";

  data.forEach(item => {
    const el = document.createElement("div");
    el.className = "item";

    el.innerHTML = `
      <span class="${item.completato ? "completed" : ""}">
        ${item.prodotti.nome}
      </span>

      <div>
        ${
          item.completato
          ? `<button class="btn grey" onclick="ripristina(${item.id})">↩</button>`
          : `
            <button class="btn green" onclick="completa(${item.id})">✔</button>
            <button class="btn red" onclick="rimuovi(${item.id})">✖</button>
          `
        }
      </div>
    `;

    div.appendChild(el);
  });
}

async function completa(id) {
  await fetch(SUPABASE_URL + "/rest/v1/lista_spesa?id=eq." + id, {
    method: "PATCH",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ completato: true })
  });

  caricaLista();
}

async function ripristina(id) {
  await fetch(SUPABASE_URL + "/rest/v1/lista_spesa?id=eq." + id, {
    method: "PATCH",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ completato: false })
  });

  caricaLista();
}

async function rimuovi(id) {
  await fetch(SUPABASE_URL + "/rest/v1/lista_spesa?id=eq." + id, {
    method: "DELETE",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY
    }
  });

  caricaLista();
}

caricaLista();
</script>

</body>
</html>
