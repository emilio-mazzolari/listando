<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Le Mie Liste</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Libreria Supabase necessaria per il logout ufficiale -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; font-family: -apple-system, Helvetica, Arial, sans-serif; background: #f2f2f7; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .app { width: 100%; max-width: 420px; padding: 20px; text-align: center; }
        
        h1 { font-size: 28px; color: #1c1c1e; margin-bottom: 40px; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }
        
        .menu-container { display: flex; flex-direction: column; gap: 15px; width: 100%; }
        
        .btn-big { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 15px;
            width: 100%; 
            padding: 30px 0; 
            border-radius: 16px; 
            border: 1px solid #ddd; 
            background: white; 
            color: #1c1c1e; 
            font-size: 20px; 
            font-weight: 700; 
            text-decoration: none; 
            transition: background-color 0.2s;
        }

        .btn-big:active { 
            background-color: #ebebeb;
        }

        .btn-big span { font-size: 28px; }

        .btn-spesa { border-left: 12px solid #aec6cf; }
        .btn-valigia { border-left: 12px solid #9fb8ad; }

        /* Tab Bar */
        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: #aec6cf; display: flex; justify-content: space-around; align-items: center; }
        .tab-item { flex: 1; text-align: center; font-size: 12px; color: #333; text-decoration: none; font-weight: 800; display: flex; flex-direction: column; gap: 4px; text-transform: uppercase; }
        .tab-active { color: white; }
    </style>
</head>
<body>

    <div class="app">
        <h1>Le Mie Liste</h1>

        <div class="menu-container">
            <a href="spesa.html" class="btn-big btn-spesa">
                <span>🛒</span> SPESA
            </a>
            
            <a href="valigia.html" class="btn-big btn-valigia">
                <span>🧳</span> VALIGIA
            </a>
        </div>
    </div>

    <div class="tab-bar">
        <a href="index.html" class="tab-item tab-active"><span>🏠</span>HOME</a>
        <a href="#" class="tab-item" onclick="logout()"><span>🚪</span>ESCI</a>
    </div>

    <script>
        // Configurazione allineata con Screenshot 2026-05-05 alle 23.16.39.jpg
        const SUPABASE_URL = "https://eejdpophfxsrqdvsucye.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlamRwb3BoZnhzcnFkdnN1Y3llIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NTMzMDQsImV4cCI6MjA5MzIyOTMwNH0.mpxbwlJyIdZgqKIdutHbLd85JR1P11yiglbYeApi17k";
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Controllo accesso: se non c'è l'email nel localStorage, torna al login
        if (!localStorage.getItem('userEmail')) {
            window.location.href = 'login.html';
        }

        async function logout() {
            try {
                // Chiude la sessione su Supabase
                await supabaseClient.auth.signOut(); 
            } catch (err) {
                console.error("Errore durante il logout sessione:", err);
            }
            // Pulisce i dati locali e reindirizza
            localStorage.clear();
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
