<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Lista Spesa</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body { margin: 0; font-family: -apple-system, Helvetica, Arial, sans-serif; background: #f2f2f7; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 420px; padding: 20px; padding-bottom: 90px; }
        .card { background: white; border-radius: 16px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        
        .item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .testo-prodotto { flex-grow: 1; font-size: 16px; color: #1c1c1e; font-weight: 600; }
        .testo-prodotto.barrato { text-decoration: line-through; color: #8e8e93; opacity: 0.6; }
        
        .btn-small { 
            border: none; 
            border-radius: 8px; 
            width: 32px; 
            height: 32px; 
            cursor: pointer; 
            margin-left: 8px; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center; 
            transition: filter 0.1s;
        }
        .btn-small:active { filter: brightness(0.8); }

        .check { background-color: #45a049; } 
        .restore { background-color: #c7c7cc; } /* Grigio per ripristino */
        .delete { background-color: #db5151; } 
        
        .icon { width: 22px; height: 22px; fill: none; stroke: white; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }

        .btn-orange { width: 100%; padding: 15px; border-radius: 12px; border: none; background: #aec6cf; color: white; font-weight: bold; margin-top: 15px; cursor: pointer; font-size: 16px; }
        .btn-secondary { background: #99b3bc; } /* Un tono diverso per distinguere i due bottoni */

        .tab-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; height: 70px; 
            background: #aec6cf; border-top: 1px solid #99b3bc; 
            display: flex; justify-content: space-around; align-items: center; 
            z-index: 1000;
        }
        .tab-item { 
            flex: 1; text-align: center; font-size: 14px; color: black; 
            text-decoration: none; text-transform: uppercase; font-weight: 600;
        }
        .tab-active { font-weight: 900; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal-box { background: white; padding: 25px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; }
        .btn-modal { width: 100%; padding: 15px; margin-top: 10px; border-radius: 12px; border: none; background: #aec6cf; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-cancel { background: #e5e5ea; color: #8e8e93; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="app">
        <div class="header-box"><h1 style="margin:0;">🛒 Lista della spesa</h1></div>
        <div class="card">
            <div id="contenitoreLista">Caricamento...</div>
            
            <!-- Pulsante per eliminare solo i completati -->
            <button class="btn-orange btn-secondary" onclick="eliminaAcquistati()">ELIMINA PRODOTTI ACQUISTATI</button>
            
            <button class="btn-orange" onclick="apriModalSvuota()">SVUOTA TUTTA LA LISTA</button>
        </div>
    </div>

    <div class="tab-bar">
        <a href="index.html" class="tab-item tab-active">🛒 LISTA</a>
        <a href="prodotti.html" class="tab-item">📦 PRODOTTI</a>
        <a href="#" class="tab-item" onclick="logout()">🚪 ESCI</a>
    </div>

    <!-- MODALE SVUOTA TUTTO -->
    <div id="svuotaModal" class="modal-overlay">
        <div class="modal-box">
            <h3>Svuota Lista</h3>
            <p>Sei sicuro di voler cancellare tutti i prodotti dalla lista?</p>
            <button class="btn-modal" onclick="confermaSvuota()">SI, SVUOTA TUTTO</button>
            <button class="btn-modal btn-cancel" onclick="chiudiModal()">ANNULLA</button>
        </div>
    </div>

    <!-- MODAL ALERT -->
    <div id="alertModal" class="modal-overlay">
        <div class="modal-box">
            <h3 id="alertTitle">Attenzione</h3>
            <p id="alertMsg"></p>
            <button class="btn-modal" onclick="chiudiModal()">OK</button>
        </div>
    </div>

    <script>
        const URL = "https://eejdpophfxsrqdvsucye.supabase.co/rest/v1";
        const KEY = "sb_publishable_A7ZE5MzG6TtUrTKNo3SebA_qOk3_n4v";
        const headers = { "apikey": KEY, "Content-Type": "application/json", "Authorization": "Bearer " + KEY };
        const userEmail = localStorage.getItem('userEmail');
        const adminEmail = "emilio.mazzolari.shop@gmail.com";

        if (!userEmail) { window.location.href = 'login.html'; }

        async function caricaLista() {
            try {
                const res = await fetch(`${URL}/lista_spesa?select=*,prodotti(nome)&email_utente=eq.${userEmail}`, { headers });
                let data = await res.json();
                const div = document.getElementById("contenitoreLista");
                
                if (!data || !data.length) {
                    div.innerHTML = "La lista è vuota.";
                    return;
                }

                data.sort((a, b) => (a.prodotti?.nome || "").localeCompare(b.prodotti?.nome || ""));

                div.innerHTML = "";
                data.forEach(item => {
                    const riga = document.createElement("div");
                    riga.className = "item";
                    
                    // Logica icone dinamiche: spunta o freccia ripristino
                    const iconaClasse = item.completato ? 'restore' : 'check';
                    const svgIcona = item.completato 
                        ? `<path d="M9 14l-4-4 4-4M5 10h11a4 4 0 110 8h-1"/>` // Freccia ↩️
                        : `<path d="M5 12l5 5L20 7"/>`; // Spunta ✅

                    riga.innerHTML = `
                        <span class="testo-prodotto ${item.completato ? 'barrato' : ''}">${item.prodotti.nome}</span>
                        <div style="display:flex;">
                            <button class="btn-small ${iconaClasse}" onclick="toggle(${item.id}, ${item.completato})">
                                <svg class="icon" viewBox="0 0 24 24">${svgIcona}</svg>
                            </button>
                            <button class="btn-small delete" onclick="elimina(${item.id})">
                                <svg class="icon" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
                            </button>
                        </div>
                    `;
                    div.appendChild(riga);
                });
            } catch (e) { console.error(e); }
        }

        async function toggle(id, stato) {
            await fetch(`${URL}/lista_spesa?id=eq.${id}`, {
                method: "PATCH", headers,
                body: JSON.stringify({ completato: !stato })
            });
            caricaLista();
        }

        async function elimina(id) {
            await fetch(`${URL}/lista_spesa?id=eq.${id}`, { method: "DELETE", headers });
            caricaLista();
        }

        // Funzione per eliminare solo i prodotti con completato = true
        async function eliminaAcquistati() {
            if (confirm("Vuoi rimuovere dalla lista tutti i prodotti già acquistati?")) {
                await fetch(`${URL}/lista_spesa?email_utente=eq.${userEmail}&completato=eq.true`, { 
                    method: "DELETE", 
                    headers 
                });
                caricaLista();
            }
        }

        function apriModalSvuota() {
            document.getElementById('svuotaModal').style.display = 'flex';
        }
async function confermaSvuota() {
    // Rimosso il blocco if (userEmail !== adminEmail)
    await fetch(`${URL}/lista_spesa?email_utente=eq.${userEmail}`, { method: "DELETE", headers });
    chiudiModal();
    caricaLista();
}
            await fetch(`${URL}/lista_spesa?email_utente=eq.${userEmail}`, { method: "DELETE", headers });
            chiudiModal();
            caricaLista();
        }

        function mostraAlert(titolo, messaggio) {
            document.getElementById('alertTitle').innerText = titolo;
            document.getElementById('alertMsg').innerText = messaggio;
            document.getElementById('alertModal').style.display = 'flex';
        }

        function chiudiModal() {
            document.getElementById('svuotaModal').style.display = 'none';
            document.getElementById('alertModal').style.display = 'none';
        }

        function logout() {
            localStorage.removeItem('userEmail');
            window.location.href = 'login.html';
        }

        caricaLista();
    </script>
</body>
</html>
