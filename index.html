<!DOCTYPE html>
<html>
<head>
  <title>Lista Spesa</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f2f2f7;
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      padding-bottom: 90px;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 15px;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #ddd;
      margin-bottom: 10px;
      box-sizing: border-box;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      background: #5ac8fa;
      color: white;
    }

    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
    }

    .btn-small {
      border: none;
      border-radius: 10px;
      padding: 6px 10px;
      cursor: pointer;
      margin-left: 5px;
    }

    .check { background: #4caf82; color: white; }
    .restore { background: #d1d1d6; }
    .delete { background: #ff6b6b; color: white; }

    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 65px;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      border-top: 1px solid #ddd;
      display: flex;
      justify-content: space-around;
      align-items: center;
    }

    .tab-item {
      flex: 1;
      text-align: center;
      font-size: 12px;
      color: #8e8e93;
      text-decoration: none;
    }

    .tab-item.active {
      color: #5ac8fa;
      font-weight: 600;
    }

    .tab-icon {
      display: block;
      font-size: 20px;
    }

    #appBox { display:none; }

  </style>
</head>

<body>

<div class="app">

  <!-- 🔐 LOGIN -->
  <div id="loginBox" class="card">
    <h2>Accedi</h2>
    <input id="email" placeholder="La tua email">
    <button class="btn" onclick="login()">Entra subito</button>
  </div>

  <!-- 📋 APP -->
  <div id="appBox">

    <h1>🛒 Lista Spesa</h1>

    <div class="card">
      <div id="lista"></div>
      <button class="btn" onclick="svuotaLista()">Svuota lista</button>
    </div>

  </div>

</div>

<!-- TAB BAR -->
<div class="tab-bar">

  <a href="/index.html" class="tab-item active">
    <span class="tab-icon">🛒</span>
    Lista
  </a>

  <a href="/prodotti.html" class="tab-item">
    <span class="tab-icon">🧾</span>
    Prodotti
  </a>

</div>

<script>
const SUPABASE_URL = "https://eejdpophfxsrqdvsucye.supabase.co";
const SUPABASE_KEY = "sb_publishable_A7ZE5MzG6TtUrTKNo3SebA_qOk3_n4v";

let userId = null;

/* 🔐 LOGIN */
async function login() {
  const email = document.getElementById("email").value;

  await fetch(SUPABASE_URL + "/auth/v1/otp", {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      email,
      create_user: true
    })
  });

  alert("Controlla la tua email 🚀");
}

/* 🔎 USER */
async function checkUser() {
  const res = await fetch(SUPABASE_URL + "/auth/v1/user", {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + localStorage.getItem("sb-token")
    }
  });

  if (res.ok) {
    const user = await res.json();
    userId = user.id;

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("appBox").style.display = "block";

    caricaLista();
  }
}

/* 📋 LISTA */
async function caricaLista() {
  const res = await fetch(
    SUPABASE_URL + "/rest/v1/lista_spesa?select=*&user_id=eq." + userId,
    {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY
      }
    }
  );

  const lista = await res.json();

  const resProd = await fetch(
    SUPABASE_URL + "/rest/v1/prodotti?select=*&user_id=eq." + userId,
    {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY
      }
    }
  );

  const prodotti = await resProd.json();

  const div = document.getElementById("lista");
  div.innerHTML = "";

  lista.forEach(item => {

    const prod = prodotti.find(p => p.id === item.prodotto_id);
    const nome = prod ? prod.nome : "Prodotto eliminato";

    const el = document.createElement("div");
    el.className = "item";

    el.innerHTML = `
      <span style="${item.completato ? 'text-decoration:line-through;opacity:0.5' : ''}">
        ${nome}
      </span>

      <div>
        ${
          item.completato
            ? `<button class="btn-small restore" onclick="toggle(${item.id}, false)">↩</button>`
            : `<button class="btn-small check" onclick="toggle(${item.id}, true)">✔</button>`
        }
        <button class="btn-small delete" onclick="removeItem(${item.id})">✖</button>
      </div>
    `;

    div.appendChild(el);
  });
}

/* ✔ TOGGLE */
async function toggle(id, value) {
  await fetch(SUPABASE_URL + "/rest/v1/lista_spesa?id=eq." + id, {
    method: "PATCH",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ completato: value })
  });

  caricaLista();
}

/* ✖ DELETE */
async function removeItem(id) {
  await fetch(SUPABASE_URL + "/rest/v1/lista_spesa?id=eq." + id, {
    method: "DELETE",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY
    }
  });

  caricaLista();
}

/* 🧹 SVUOTA */
async function svuotaLista() {
  await fetch(SUPABASE_URL + "/rest/v1/lista_spesa?user_id=eq." + userId, {
    method: "DELETE",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY
    }
  });

  caricaLista();
}

checkUser();
</script>

</body>
</html>
