<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Lista Spesa</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* ... (Manteniamo lo stile precedente) ... */
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f2f2f7; display: flex; justify-content: center; }
    .app { width: 100%; max-width: 420px; padding: 20px; padding-bottom: 90px; }
    .card { background: white; border-radius: 16px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 10px; box-sizing: border-box; font-size: 16px; }
    .btn { width: 100%; padding: 12px; border-radius: 12px; border: none; cursor: pointer; background: #5ac8fa; color: white; font-weight: 600; font-size: 16px; }
    .item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
    .btn-small { border: none; border-radius: 10px; padding: 8px 12px; cursor: pointer; margin-left: 5px; }
    .check { background: #4caf82; color: white; }
    .restore { background: #d1d1d6; color: #3a3a3c; }
    .delete { background: #ff6b6b; color: white; }
    .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 65px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-top: 1px solid #ddd; display: flex; justify-content: space-around; align-items: center; }
    .tab-item { flex: 1; text-align: center; font-size: 12px; color: #8e8e93; text-decoration: none; }
    .tab-item.active { color: #5ac8fa; font-weight: 600; }
    #appBox { display:none; }
    h1 { text-align: center; }

    /* Notifica flash */
    #toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: #32d74b; color: white; padding: 10px 20px;
      border-radius: 20px; font-size: 14px; font-weight: bold;
      display: none; z-index: 1000;
    }
  </style>
</head>
<body>

<div id="toast">Prodotto inserito!</div>

<div class="app">
  <div id="loginBox" class="card">
    <h2>Benvenuto</h2>
    <input id="emailField" type="email" placeholder="La tua email">
    <button class="btn" onclick="login()">Entra</button>
  </div>

  <div id="appBox">
    <h1>🛒 Lista Spesa</h1>
    <div class="card">
      <div id="lista">Caricamento...</div>
      <div style="margin-top: 20px;">
        <button class="btn" style="background: #ff9500;" onclick="svuotaLista()">Svuota tutto</button>
      </div>
    </div>
  </div>
</div>

<div class="tab-bar">
  <a href="index.html" class="tab-item active">🛒 Lista</a>
  <a href="prodotti.html" class="tab-item">🧾 Prodotti</a>
</div>

<script>
const SUPABASE_URL = "https://eejdpophfxsrqdvsucye.supabase.co";
const SUPABASE_KEY = "sb_publishable_A7ZE5MzG6TtUrTKNo3SebA_qOk3_n4v";
let userEmail = localStorage.getItem("user-email");

function login() {
  const email = document.getElementById("emailField").value.trim();
  if (email.includes("@")) {
    localStorage.setItem("user-email", email);
    userEmail = email;
    location.reload();
  }
}

function showToast(text) {
  const t = document.getElementById("toast");
  t.innerText = text;
  t.style.display = "block";
  setTimeout(() => { t.style.display = "none"; }, 1500);
}

async function caricaLista() {
  try {
    const [resProd, resLista] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/prodotti?select=*`, { headers: { "apikey": SUPABASE_KEY } }),
      fetch(`${SUPABASE_URL}/rest/v1/lista_spesa?select=*`, { headers: { "apikey": SUPABASE_KEY } })
    ]);

    const prodotti = await resProd.json();
    let listaRaw = await resLista.json();

    // Rimuoviamo duplicati (se per errore ci sono due ID uguali nel DB)
    const uniqueIds = new Set();
    let lista = listaRaw.filter(item => {
      if (uniqueIds.has(item.prodotto_id)) return false;
      uniqueIds.add(item.prodotto_id);
      return true;
    });

    lista = lista.map(item => {
      const p = prodotti.find(prod => prod.id === item.prodotto_id);
      return { ...item, nomeProdotto: p ? p.nome : "Sconosciuto" };
    });

    // Ordine alfabetico
    lista.sort((a, b) => a.nomeProdotto.localeCompare(b.nomeProdotto));

    const div = document.getElementById("lista");
    div.innerHTML = lista.length ? "" : "<p style='text-align:center;'>Lista vuota</p>";

    lista.forEach(item => {
      const el = document.createElement("div");
      el.className = "item";
      el.innerHTML = `
        <span style="${item.completato ? 'text-decoration:line-through; opacity:0.5' : ''}">${item.nomeProdotto}</span>
        <div>
          <button class="btn-small ${item.completato ? 'restore' : 'check'}" onclick="toggle(${item.id}, ${!item.completato})">
            ${item.completato ? '↩' : '✔'}
          </button>
          <button class="btn-small delete" onclick="removeItem(${item.id})">✖</button>
        </div>
      `;
      div.appendChild(el);
    });
  } catch (e) { console.error(e); }
}

async function toggle(id, value) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/lista_spesa?id=eq.${id}`, {
    method: "PATCH",
    headers: { "apikey": SUPABASE_KEY, "Content-Type": "application/json", "Prefer": "return=minimal" },
    body: JSON.stringify({ completato: value })
  });
  if(res.ok) caricaLista();
}

async function removeItem(id) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/lista_spesa?id=eq.${id}`, {
    method: "DELETE",
    headers: { "apikey": SUPABASE_KEY }
  });
  if(res.ok) caricaLista();
}

async function svuotaLista() {
  if (!confirm("Cancello tutto?")) return;
  await fetch(`${SUPABASE_URL}/rest/v1/lista_spesa?select=*`, {
    method: "DELETE",
    headers: { "apikey": SUPABASE_KEY }
  });
  caricaLista();
}

if (userEmail) {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("appBox").style.display = "block";
  caricaLista();
}
</script>
</body>
</html>
