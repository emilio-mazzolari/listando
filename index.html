<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Lista Spesa</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body { margin: 0; font-family: -apple-system, sans-serif; background: #f2f2f7; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 420px; padding: 20px; padding-bottom: 90px; }
        .card { background: white; border-radius: 16px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        
        /* Stile prodotti e bottoni come li avevi prima */
        .item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .testo-prodotto { flex-grow: 1; font-size: 16px; color: #1c1c1e; }
        .testo-prodotto.barrato { text-decoration: line-through; color: #8e8e93; }
        
        .btn-small { border: none; border-radius: 8px; width: 35px; height: 35px; cursor: pointer; margin-left: 5px; display: inline-flex; align-items: center; justify-content: center; font-size: 16px; }
        .check { background-color: #77dd77; color: white; } /* Verde */
        .delete { background-color: #ff6961; color: white; } /* Rosso */
        
        .btn-orange { width: 100%; padding: 15px; border-radius: 12px; border: none; background: #aec6cf; color: white; font-weight: bold; margin-top: 15px; cursor: pointer; font-size: 16px; }

        /* Nuova barra grigia coordinata */
        .tab-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; height: 70px; 
            background: #aec6cf; border-top: 1px solid #99b3bc; 
            display: flex; justify-content: space-around; align-items: center; 
            z-index: 1000;
        }
        .tab-item { 
            flex: 1; text-align: center; font-size: 14px; color: black; 
            text-decoration: none; text-transform: uppercase; font-weight: 500;
        }
        .tab-active { font-weight: 900; }

        #toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 15px 30px; border-radius: 12px; color: white; font-weight: bold; display: none; z-index: 2000; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div id="toast"></div>
    <div class="app">
        <div class="header-box"><h1 style="margin:0;">🛒 Lista della spesa</h1></div>
        <div class="card">
            <div id="contenitoreLista">Caricamento...</div>
            <button class="btn-orange" onclick="svuotaLista()">SVUOTA TUTTA LA LISTA</button>
        </div>
    </div>

    <!-- La tua nuova barra -->
    <div class="tab-bar">
        <a href="index.html" class="tab-item tab-active">🛒 LISTA</a>
        <a href="prodotti.html" class="tab-item">📦 PRODOTTI</a>
        <a href="#" class="tab-item" onclick="logout()">🚪 ESCI</a>
    </div>

    <script>
        const URL = "https://eejdpophfxsrqdvsucye.supabase.co/rest/v1";
        const KEY = "sb_publishable_A7ZE5MzG6TtUrTKNo3SebA_qOk3_n4v";
        const headers = { "apikey": KEY, "Content-Type": "application/json" };
        const userEmail = localStorage.getItem('userEmail');

        if (!userEmail) { window.location.href = 'login.html'; }

        async function caricaLista() {
            try {
                const res = await fetch(`${URL}/lista_spesa?select=*,prodotti(nome)&email_utente=eq.${userEmail}`, { headers });
                const data = await res.json();
                const div = document.getElementById("contenitoreLista");
                div.innerHTML = data.length ? "" : "La lista è vuota.";
                
                // Ordina: prima quelli da comprare, poi quelli barrati
                data.sort((a, b) => a.completato - b.completato).forEach(item => {
                    const riga = document.createElement("div");
                    riga.className = "item";
                    riga.innerHTML = `
                        <span class="testo-prodotto ${item.completato ? 'barrato' : ''}">${item.prodotti.nome}</span>
                        <div style="display:flex;">
                            <button class="btn-small check" onclick="toggle(${item.id}, ${item.completato})">✓</button>
                            <button class="btn-small delete" onclick="elimina(${item.id})">✕</button>
                        </div>
                    `;
                    div.appendChild(riga);
                });
            } catch (e) { console.error(e); }
        }

        async function toggle(id, stato) {
            await fetch(`${URL}/lista_spesa?id=eq.${id}`, {
                method: "PATCH", headers,
                body: JSON.stringify({ completato: !stato })
            });
            caricaLista();
        }

        async function elimina(id) {
            await fetch(`${URL}/lista_spesa?id=eq.${id}`, { method: "DELETE", headers });
            caricaLista();
        }

        async function svuotaLista() {
            if (confirm("Vuoi svuotare tutta la lista?")) {
                await fetch(`${URL}/lista_spesa?email_utente=eq.${userEmail}`, { method: "DELETE", headers });
                caricaLista();
            }
        }

        function logout() {
            localStorage.removeItem('userEmail');
            window.location.href = 'login.html';
        }

        caricaLista();
    </script>
</body>
</html>
