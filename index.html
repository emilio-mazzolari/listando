<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Listando - Le Mie Liste</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --green: #0fba8d;
            --blue: #3384d4;
            --yellow: #feb310;
            --grey: #d8dddc;
            --dark: #1c1c1e;
            --bg: #fdfdfd;
        }

        html, body { overflow-x: hidden; max-width: 100%; }

        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            color: var(--dark);
        }

        .app { 
            width: 100%; 
            max-width: 400px; 
            padding: 20px; 
            padding-bottom: 120px; 
            text-align: center;
        }
        
        .logo-header { margin-bottom: 30px; margin-top: 20px; }
        .logo-img { max-width: 150px; height: auto; border-radius: 20px; }

        .menu-container { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            width: 100%; 
        }
        
        .btn-big { 
            display: flex; 
            align-items: center; 
            gap: 20px;
            width: 100%; 
            padding: 18px 22px; 
            border-radius: 28px; 
            border: 4px solid var(--grey); 
            background: white; 
            color: var(--dark); 
            font-size: 18px; 
            font-weight: 800; 
            text-decoration: none; 
            transition: all 0.2s ease;
            box-sizing: border-box;
            position: relative;
        }

        .btn-big:active:not(.btn-locked) { 
            transform: scale(0.96);
            background-color: #fafafa;
        }

        .btn-spesa { border-color: var(--blue); }
        .btn-valigia { border-color: var(--yellow); }
        .btn-foto { border-color: #7c5cbf; }

        .btn-locked {
            opacity: 0.5;
            border-style: dashed;
            cursor: default;
        }

        .badge-soon {
            font-size: 9px;
            background: var(--grey);
            color: #555;
            padding: 3px 8px;
            border-radius: 10px;
            margin-left: auto;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .lock-icon {
            position: absolute;
            top: 10px;
            right: 15px;
            width: 14px;
            height: 14px;
            opacity: 0.5;
        }

        .icon-svg { width: 38px; height: 38px; flex-shrink: 0; }

        .tab-bar { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            height: 85px; 
            background: white; 
            display: flex; 
            justify-content: space-around; 
            align-items: center; 
            border-top: 3px solid var(--grey);
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 100;
        }
        
        .tab-item { 
            flex: 1; 
            text-align: center; 
            font-size: 11px; 
            color: var(--dark); 
            text-decoration: none; 
            font-weight: 800; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            gap: 6px; 
        }

        .tab-active { color: var(--green); }
        .tab-active .icon-tab { stroke: var(--green); }

        .icon-tab { width: 28px; height: 28px; stroke-width: 2.5px; stroke: var(--dark); fill: none; }
        .logout-btn { color: #eb445a; }
        .logout-btn .icon-tab { stroke: #eb445a; }

        /* ── Safe areas ── */
        .app {
            padding-left: max(20px, env(safe-area-inset-left, 20px));
            padding-right: max(20px, env(safe-area-inset-right, 20px));
        }

        /* ── Focus styles ── */
        button:focus-visible, a:focus-visible {
            outline: 3px solid var(--blue);
            outline-offset: 2px;
        }

        /* ── Tablet portrait (≥600px) ── */
        @media (min-width: 600px) {
            .app { max-width: 640px; padding-left: 28px; padding-right: 28px; }
        }

        /* ── iPad / tablet landscape (≥768px) ── */
        @media (min-width: 768px) {
            .app { max-width: 760px; padding-left: 36px; padding-right: 36px; }
            .menu-container {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 15px;
            }
        }

        /* ── Desktop (≥1024px): sidebar navigation ── */
        @media (min-width: 1024px) {
            body { display: block; }

            .app {
                margin-left: 240px;
                max-width: 900px;
                padding: 48px 56px 60px;
            }

            .tab-bar {
                top: 0; bottom: 0; right: auto;
                width: 240px;
                height: 100vh;
                flex-direction: column;
                justify-content: flex-start;
                align-items: stretch;
                border-top: none;
                border-right: 3px solid var(--grey);
                padding: 28px 12px 24px;
                overflow-y: auto;
            }

            .tab-bar::before {
                content: "LISTANDO";
                display: block;
                font-weight: 900;
                font-size: 20px;
                letter-spacing: -0.8px;
                color: var(--green);
                padding: 0 8px 28px;
                font-family: 'Segoe UI', system-ui, sans-serif;
            }

            .tab-item {
                flex: none;
                flex-direction: row;
                justify-content: flex-start;
                padding: 13px 16px;
                font-size: 13px;
                gap: 12px;
                text-align: left;
                border-radius: 14px;
                letter-spacing: 0;
                min-height: 44px;
                margin-bottom: 2px;
            }

            .tab-active { background: rgba(15, 186, 141, 0.1); }

            .icon-tab { width: 20px; height: 20px; flex-shrink: 0; }

            .modal-overlay { align-items: center; padding-bottom: 0; }
            .modal-box { border-radius: 28px; }
        }

        /* ── Wide desktop (≥1280px) ── */
        @media (min-width: 1280px) {
            .tab-bar { width: 260px; }
            .app { margin-left: 260px; max-width: 940px; }
            .menu-container { grid-template-columns: 1fr 1fr 1fr; }
        }

        /* ── Small mobile overflow fix (≤400px) ── */
        @media (max-width: 400px) {
            .btn-big { gap: 12px; padding: 14px 16px; font-size: 16px; }
            .badge-soon { font-size: 8px; padding: 3px 6px; }
        }
    </style>
</head>

    <script>
        const SUPABASE_URL = "https://eejdpophfxsrqdvsucye.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlamRwb3BoZnhzcnFkdnN1Y3llIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NTMzMDQsImV4cCI6MjA5MzIyOTMwNH0.mpxbwlJyIdZgqKIdutHbLd85JR1P11yiglbYeApi17k";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        if (!localStorage.getItem('userEmail')) {
            window.location.href = 'login.html';
        }

        async function logout() {
            try { await supabaseClient.auth.signOut(); } catch (err) {}
            localStorage.removeItem('userEmail');
            window.location.href = 'login.html';
        }

        // ── Service Worker + Push ─────────────────────────────────────────
        const VAPID_PUBLIC_KEY = 'BATe8jx7GOX6w2NUFoMQoGI6l8BRyJEVcsDlwf3IdIa5AEENkxpSCNuhkl4PgDxR_8f-AJerrYxENnH0mb-MTys';

        function urlBase64ToUint8Array(b64) {
            const pad = '='.repeat((4 - b64.length % 4) % 4);
            const base64 = (b64 + pad).replace(/-/g, '+').replace(/_/g, '/');
            const raw = atob(base64);
            return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
        }

        async function initSW() {
            if (!('serviceWorker' in navigator)) return;
            const reg = await navigator.serviceWorker.register('/sw.js');

            if (!('PushManager' in window)) return;
            if (Notification.permission === 'denied') return;
            if (localStorage.getItem('pushDismissed')) return;

            await navigator.serviceWorker.ready;
            const existing = await reg.pushManager.getSubscription();
            if (existing) return; // già iscritto

            if (Notification.permission === 'default') {
                document.getElementById('pushBanner').style.display = 'flex';
            }
        }

        async function iscriviPush() {
            document.getElementById('pushBanner').style.display = 'none';
            const userEmail = localStorage.getItem('userEmail');
            if (!userEmail) return;

            const perm = await Notification.requestPermission();
            if (perm !== 'granted') return;

            try {
                const reg = await navigator.serviceWorker.ready;
                const sub = await reg.pushManager.subscribe({
                    userVisibleOnly: true,
                    applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY),
                });
                await fetch('/api/subscribe', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail, subscription: sub.toJSON() }),
                });
            } catch (err) {
                console.error('Push subscription failed:', err);
            }
        }

        function chiudiBanner() {
            document.getElementById('pushBanner').style.display = 'none';
            localStorage.setItem('pushDismissed', '1');
        }

        window.addEventListener('load', () => setTimeout(initSW, 800));
    </script>
