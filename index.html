<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Listando - Le Mie Liste</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --green: #0fba8d;
            --blue: #3384d4;
            --yellow: #feb310;
            --grey: #d8dddc;
            --dark: #1c1c1e;
            --bg: #fdfdfd;
        }

        * { box-sizing: border-box; }
        html, body { margin: 0; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--dark);
            display: flex;
            justify-content: center;
            min-height: 100dvh;
        }

        .app {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            padding: max(10px, env(safe-area-inset-top, 10px)) 12px 0;
        }

        .app-title {
            font-size: 13px;
            font-weight: 900;
            color: var(--green);
            text-align: center;
            letter-spacing: 2px;
            padding: 4px 0 10px;
            flex-shrink: 0;
        }

        .menu-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding-bottom: calc(85px + env(safe-area-inset-bottom, 0px));
        }

        .btn-big {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 7px;
            border-radius: 22px;
            border: 3px solid var(--grey);
            background: white;
            color: var(--dark);
            font-size: 11px;
            font-weight: 900;
            text-decoration: none;
            transition: transform 0.15s ease, background 0.15s;
            padding: 8px 4px;
            text-align: center;
            line-height: 1.2;
            letter-spacing: 0.3px;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }

        .btn-big:active { transform: scale(0.93); background: #f5f5f5; }
        .sortable-ghost { opacity: 0.35; }
        .sortable-chosen { transform: scale(1.06); box-shadow: 0 8px 28px rgba(0,0,0,0.18); z-index: 10; }

        .icon-svg { width: 30px; height: 30px; flex-shrink: 0; pointer-events: none; }

        .tab-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 75px;
            background: white;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 2px solid var(--grey);
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 100;
        }

        .tab-item {
            flex: 1;
            text-align: center;
            font-size: 11px;
            color: var(--dark);
            text-decoration: none;
            font-weight: 800;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .tab-active { color: var(--green); }
        .tab-active .icon-tab { stroke: var(--green); }
        .icon-tab { width: 26px; height: 26px; stroke-width: 2.5px; stroke: var(--dark); fill: none; }

        button:focus-visible, a:focus-visible { outline: 3px solid var(--blue); outline-offset: 2px; }

        /* ── Desktop (≥1024px): sidebar navigation ── */
        @media (min-width: 1024px) {
            html, body { overflow: auto; height: auto; }
            body { display: block; }

            .app {
                height: auto;
                min-height: 100vh;
                margin-left: 240px;
                max-width: 900px;
                padding: 48px 56px 60px;
                display: block;
            }

            .app-title { display: none; }

            .menu-container {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                grid-template-rows: auto;
                gap: 14px;
                padding-bottom: 0;
            }

            .btn-big {
                flex-direction: row;
                justify-content: flex-start;
                gap: 14px;
                padding: 16px 20px;
                font-size: 15px;
                border-radius: 24px;
                border-width: 3.5px;
            }

            .icon-svg { width: 34px; height: 34px; }

            .tab-bar {
                top: 0; bottom: 0; right: auto;
                width: 240px;
                height: 100vh;
                flex-direction: column;
                justify-content: flex-start;
                align-items: stretch;
                border-top: none;
                border-right: 2px solid var(--grey);
                padding: 28px 12px 24px;
                overflow-y: auto;
            }

            .tab-bar::before {
                content: "LISTANDO";
                display: block;
                font-weight: 900;
                font-size: 20px;
                letter-spacing: -0.8px;
                color: var(--green);
                padding: 0 8px 28px;
            }

            .tab-item {
                flex: none;
                flex-direction: row;
                justify-content: flex-start;
                padding: 13px 16px;
                font-size: 13px;
                gap: 12px;
                text-align: left;
                border-radius: 14px;
                min-height: 44px;
                margin-bottom: 2px;
            }

            .tab-active { background: rgba(15,186,141,0.1); }
            .icon-tab { width: 20px; height: 20px; flex-shrink: 0; }
        }

        @media (min-width: 1280px) {
            .tab-bar { width: 260px; }
            .app { margin-left: 260px; max-width: 940px; }
        }
    </style>
</head>

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    <script>
        const SUPABASE_URL = "https://eejdpophfxsrqdvsucye.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlamRwb3BoZnhzcnFkdnN1Y3llIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NTMzMDQsImV4cCI6MjA5MzIyOTMwNH0.mpxbwlJyIdZgqKIdutHbLd85JR1P11yiglbYeApi17k";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        if (!localStorage.getItem('userEmail')) {
            window.location.href = 'login.html';
        }

        async function logout() {
            try { await supabaseClient.auth.signOut(); } catch (err) {}
            localStorage.removeItem('userEmail');
            window.location.href = 'login.html';
        }

        // ── Service Worker + Push ─────────────────────────────────────────
        const VAPID_PUBLIC_KEY = 'BATe8jx7GOX6w2NUFoMQoGI6l8BRyJEVcsDlwf3IdIa5AEENkxpSCNuhkl4PgDxR_8f-AJerrYxENnH0mb-MTys';

        function urlBase64ToUint8Array(b64) {
            const pad = '='.repeat((4 - b64.length % 4) % 4);
            const base64 = (b64 + pad).replace(/-/g, '+').replace(/_/g, '/');
            const raw = atob(base64);
            return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
        }

        async function initSW() {
            if (!('serviceWorker' in navigator)) return;
            const reg = await navigator.serviceWorker.register('/sw.js');

            if (!('PushManager' in window)) return;
            if (Notification.permission === 'denied') return;
            if (localStorage.getItem('pushDismissed')) return;

            await navigator.serviceWorker.ready;
            const existing = await reg.pushManager.getSubscription();
            if (existing) return; // già iscritto

            if (Notification.permission === 'default') {
                document.getElementById('pushBanner').style.display = 'flex';
            }
        }

        async function iscriviPush() {
            document.getElementById('pushBanner').style.display = 'none';
            const userEmail = localStorage.getItem('userEmail');
            if (!userEmail) return;

            const perm = await Notification.requestPermission();
            if (perm !== 'granted') return;

            try {
                const reg = await navigator.serviceWorker.ready;
                const sub = await reg.pushManager.subscribe({
                    userVisibleOnly: true,
                    applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY),
                });
                await fetch('/api/subscribe', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail, subscription: sub.toJSON() }),
                });
            } catch (err) {
                console.error('Push subscription failed:', err);
            }
        }

        function chiudiBanner() {
            document.getElementById('pushBanner').style.display = 'none';
            localStorage.setItem('pushDismissed', '1');
        }

        window.addEventListener('load', () => setTimeout(initSW, 800));

        // ── Drag to reorder ───────────────────────────────────────────────
        const ORDER_KEY = 'listando_home_order';

        function applyOrder() {
            const saved = JSON.parse(localStorage.getItem(ORDER_KEY) || '[]');
            if (!saved.length) return;
            const grid = document.getElementById('menuGrid');
            saved.forEach(id => {
                const el = grid.querySelector(`[data-id="${id}"]`);
                if (el) grid.appendChild(el);
            });
        }

        function saveOrder() {
            const ids = [...document.querySelectorAll('#menuGrid [data-id]')].map(el => el.dataset.id);
            localStorage.setItem(ORDER_KEY, JSON.stringify(ids));
        }

        applyOrder();

        Sortable.create(document.getElementById('menuGrid'), {
            animation: 200,
            delay: 350,
            delayOnTouchOnly: true,
            touchStartThreshold: 8,
            ghostClass: 'sortable-ghost',
            chosenClass: 'sortable-chosen',
            onEnd: saveOrder,
        });
    </script>
