<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Lista Spesa</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; font-family: -apple-system, sans-serif; background: #f2f2f7; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 420px; padding: 20px; }
        .card { background: white; border-radius: 16px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        #debug-box { font-size: 10px; color: red; background: #eee; padding: 5px; margin-bottom: 10px; display: block; border-radius: 5px; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .btn-orange { width: 100%; padding: 15px; border-radius: 12px; border: none; background: #aec6cf; color: white; font-weight: bold; margin-top: 10px; }
        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 70px; background: #aec6cf; display: flex; justify-content: space-around; align-items: center; }
        .tab-item { text-decoration: none; color: black; font-weight: 600; }
    </style>
</head>
<body>
    <div class="app">
        <!-- Riquadro di debug per capire cosa succede -->
        <div id="debug-box">Stato: Inizializzazione...</div>

        <div class="header-box"><h1>🛒 Lista Spesa</h1></div>
        <div class="card">
            <div id="contenitoreLista">Caricamento prodotti...</div>
            <button class="btn-orange" onclick="logout()">ESCI</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://eejdpophfxsrqdvsucye.supabase.co";
        const SUPABASE_KEY = "sb_publishable_A7ZE5MzG6TtUrTKNo3SebA_qOk3_n4v";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const debug = document.getElementById('debug-box');

        async function inizializza() {
            debug.innerText = "Controllo sessione...";
            
            // 1. Chiediamo a Supabase se c'è una sessione attiva (anche da Google)
            const { data: { session }, error } = await supabaseClient.auth.getSession();
            
            if (error) {
                debug.innerText = "Errore sessione: " + error.message;
            }

            if (session) {
                debug.innerText = "Sessione trovata! Email: " + session.user.email;
                localStorage.setItem('userEmail', session.user.email);
                caricaLista(session.user.email);
            } else {
                debug.innerText = "Nessuna sessione. Controllo LocalStorage...";
                const local = localStorage.getItem('userEmail');
                if (local) {
                    debug.innerText = "Trovata email locale: " + local;
                    caricaLista(local);
                } else {
                    debug.innerText = "Utente non loggato. Redirect a login...";
                    // Aspettiamo 1 secondo per farti leggere il debug prima di scappare alla login
                    setTimeout(() => { window.location.href = 'login.html'; }, 1500);
                }
            }
        }

        async function caricaLista(email) {
            const div = document.getElementById("contenitoreLista");
            const { data, error } = await supabaseClient
                .from('lista_spesa')
                .select('*, prodotti(nome)')
                .eq('email_utente', email);

            if (error) {
                div.innerHTML = "Errore DB: " + error.message;
                return;
            }
            
            if (!data || data.length === 0) {
                div.innerHTML = "La lista è vuota.";
            } else {
                div.innerHTML = data.map(item => `<div class="item">${item.prodotti?.nome || 'Prodotto'}</div>`).join('');
            }
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            localStorage.clear();
            window.location.href = 'login.html';
        }

        inizializza();
    </script>
</body>
</html>
