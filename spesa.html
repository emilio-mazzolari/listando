<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Lista Spesa</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; font-family: -apple-system, Helvetica, Arial, sans-serif; background: #f2f2f7; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 420px; padding: 20px; padding-bottom: 100px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-clear { background: #ff3b30; color: white; border: none; padding: 10px 15px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 11px; text-transform: uppercase; }

        .card { background: white; border-radius: 16px; padding: 5px 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid #f2f2f7; }
        .item:last-child { border-bottom: none; }
        
        .testo { flex-grow: 1; font-size: 16px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: 500; color: #1c1c1e; }
        .testo span { font-size: 18px; }
        .completato { text-decoration: line-through; color: #8e8e93; font-weight: 400; }
        
        .btn-del { background: #f2f2f7; border: none; font-size: 16px; cursor: pointer; padding: 8px; border-radius: 10px; transition: 0.2s; }

        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: #aec6cf; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(0,0,0,0.1); z-index: 1000; }
        .tab-item { flex: 1; text-align: center; font-size: 11px; color: #333; text-decoration: none; font-weight: 800; display: flex; flex-direction: column; text-transform: uppercase; }
        .tab-item span { font-size: 22px; margin-bottom: 3px; }
        .tab-active { color: white; }

        .empty-state { text-align: center; padding: 40px 20px; color: #8e8e93; }
        .empty-state span { font-size: 40px; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="app">
        <div class="header">
            <h2 style="margin:0; font-weight: 800;">🛒 LISTA SPESA</h2>
            <button class="btn-clear" onclick="svuotaLista()">SVUOTA</button>
        </div>

        <div id="listaSpesaContenitore" class="card">
            <div class="empty-state">Caricamento in corso...</div>
        </div>
    </div>

    <!-- Barra di Navigazione -->
    <div class="tab-bar">
        <a href="index.html" class="tab-item"><span>🏠</span>HOME</a>
        <a href="spesa.html" class="tab-item tab-active"><span>🛒</span>SPESA</a>
        <a href="prodottispesa.html" class="tab-item"><span>📦</span>PRODOTTI</a>
        <a href="#" class="tab-item" onclick="logout()"><span>🚪</span>ESCI</a>
    </div>

    <script>
        const URL = "https://eejdpophfxsrqdvsucye.supabase.co/rest/v1/lista_spesa";
        const KEY = "sb_publishable_A7ZE5MzG6TtUrTKNo3SebA_qOk3_n4v";
        const headers = { 
            "apikey": KEY, 
            "Content-Type": "application/json", 
            "Authorization": "Bearer " + KEY 
        };
        const userEmail = localStorage.getItem('userEmail');

        async function caricaLista() {
    const container = document.getElementById("listaSpesaContenitore");
    try {
        // Recuperiamo la lista con i dettagli del prodotto associato
        // Nota: questa query funziona se hai creato una "Foreign Key" tra le tabelle
        const res = await fetch(`${URL}?email_utente=eq.${userEmail}&select=*,prodotti(nome)`, { headers });
        const dati = await res.json();

        if (dati.length === 0) {
            container.innerHTML = "<div class='empty-state'>La lista è vuota.</div>";
            return;
        }

        container.innerHTML = "";
        dati.forEach(item => {
            // Se la relazione prodotti(nome) esiste, usiamo item.prodotti.nome
            // Altrimenti, mostriamo un testo di backup
            const nomeProdotto = item.prodotti ? item.prodotti.nome : "Prodotto #" + item.prodotto_id;
            
            const riga = document.createElement("div");
            riga.className = "item";
            riga.innerHTML = `
                <div class="testo ${item.completato ? 'completato' : ''}" onclick="toggleCheck(${item.id}, ${item.completato})">
                    <span>${item.completato ? '✅' : '⬜'}</span> ${nomeProdotto}
                </div>
                <button class="btn-del" onclick="eliminaDallaLista(${item.id})">🗑️</button>
            `;
            container.appendChild(riga);
        });
    } catch (e) {
        console.error(e);
    }
}

        async function toggleCheck(id, statoAttuale) {
            await fetch(`${URL}?id=eq.${id}`, {
                method: "PATCH", headers,
                body: JSON.stringify({ completato: !statoAttuale })
            });
            caricaLista();
        }

        async function eliminaDallaLista(id) {
            await fetch(`${URL}?id=eq.${id}`, { method: "DELETE", headers });
            caricaLista();
        }

        async function svuotaLista() {
            if(confirm("Vuoi svuotare tutta la lista della spesa?")) {
                await fetch(`${URL}?email_utente=eq.${userEmail}`, { method: "DELETE", headers });
                caricaLista();
            }
        }

        function logout() { localStorage.clear(); window.location.href = 'login.html'; }

        if (!userEmail) {
            window.location.href = 'login.html';
        } else {
            caricaLista();
        }
    </script>
</body>
</html>
