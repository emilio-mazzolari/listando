<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Listando - Lista Spesa</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --green: #0fba8d; --blue: #3384d4; --yellow: #feb310; --red: #ff4d4d; --grey: #d8dddc; --dark: #000000; --bg: #fdfdfd; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; }
        .app { width: 100%; max-width: 420px; padding: 20px; padding-bottom: 110px; }
        h2 { font-weight: 900; font-size: 24px; text-transform: uppercase; margin-bottom: 20px; }
        .card { background: white; border-radius: 28px; padding: 15px; border: 3px solid var(--grey); min-height: 150px; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 2px solid #f2f2f7; }
        .testo-prodotto { font-weight: 700; font-size: 17px; flex: 1; }
        .testo-prodotto.barrato { text-decoration: line-through; color: #b0b0b0; opacity: 0.6; }
        .btn-small { border: 2.5px solid var(--grey); border-radius: 12px; width: 40px; height: 40px; cursor: pointer; background: white; font-weight: bold; }
        .btn-small.check { border-color: var(--green); color: var(--green); }
        .btn-small.delete { border-color: var(--red); color: var(--red); }
        .controls { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .btn-action { width: 100%; padding: 16px; border-radius: 20px; border: 3px solid var(--grey); font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 3px solid var(--grey); }
        .tab-item { text-decoration: none; color: var(--dark); font-size: 10px; font-weight: 800; text-align: center; }
        .tab-active { color: var(--green); }
    </style>
</head>
<body>
    <div class="app">
        <h2>La mia Lista</h2>
        <div class="card" id="contenitoreLista"><div style="text-align:center; padding:20px;">Caricamento...</div></div>
        <div class="controls">
            <button class="btn-action" onclick="eliminaAcquistati()">Pulisci completati</button>
            <button class="btn-action" style="background:var(--blue); color:white; border-color:var(--blue);" onclick="window.location.href='spesa_prodotti.html'">+ AGGIUNGI PRODOTTI</button>
        </div>
    </div>

    <div class="tab-bar">
        <a href="index.html" class="tab-item">HOME</a>
        <a href="spesa.html" class="tab-item tab-active">SPESA</a>
        <a href="spesa_prodotti.html" class="tab-item">PRODOTTI</a>
    </div>

    <script>
        const URL = "https://eejdpophfxsrqdvsucye.supabase.co/rest/v1";
        const KEY = "sb_publishable_A7ZE5MzG6TtUrTKNo3SebA_qOk3_n4v";
        const headers = { "apikey": KEY, "Content-Type": "application/json", "Authorization": "Bearer " + KEY };
        const userEmail = localStorage.getItem('userEmail');

        async function caricaLista() {
            if (!userEmail) return;
            try {
                // Notare l'uso di email_utente
                const res = await fetch(`${URL}/spesa_lista?select=*,spesa_prodotti(nome)&email_utente=eq.${userEmail}`, { headers });
                const data = await res.json();
                
                const div = document.getElementById("contenitoreLista");
                if (!Array.isArray(data) || data.length === 0) {
                    div.innerHTML = "<div style='text-align:center; padding:20px;'>Lista vuota!</div>";
                    return;
                }

                data.sort((a, b) => a.completato - b.completato);
                div.innerHTML = "";
                data.forEach(item => {
                    const nome = item.spesa_prodotti?.nome || "Prodotto ignoto";
                    const riga = document.createElement("div");
                    riga.className = "item";
                    riga.innerHTML = `
                        <span class="testo-prodotto ${item.completato ? 'barrato' : ''}">${nome}</span>
                        <div style="display:flex; gap:5px;">
                            <button class="btn-small check" onclick="toggle(${item.id}, ${item.completato})">${item.completato ? '↺' : '✓'}</button>
                            <button class="btn-small delete" onclick="elimina(${item.id})">🗑</button>
                        </div>`;
                    div.appendChild(riga);
                });
            } catch (e) { console.error(e); }
        }

        async function toggle(id, stato) {
            await fetch(`${URL}/spesa_lista?id=eq.${id}`, { method: "PATCH", headers, body: JSON.stringify({ completato: !stato }) });
            caricaLista();
        }

        async function elimina(id) {
            await fetch(`${URL}/spesa_lista?id=eq.${id}`, { method: "DELETE", headers });
            caricaLista();
        }

        async function eliminaAcquistati() {
            if (confirm("Eliminare i prodotti presi?")) {
                await fetch(`${URL}/spesa_lista?email_utente=eq.${userEmail}&completato=eq.true`, { method: "DELETE", headers });
                caricaLista();
            }
        }

        window.onload = caricaLista;
    </script>
</body>
</html>
