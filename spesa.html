<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Listando - Lista Spesa</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --green: #0fba8d; --blue: #3384d4; --yellow: #feb310; --red: #ff4d4d; --grey: #d8dddc; --dark: #000000; --bg: #fdfdfd; }
        body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--dark); display: flex; justify-content: center; }
        .app { width: 100%; max-width: 420px; padding: 20px; padding-bottom: 110px; }
        h2 { font-weight: 900; font-size: 24px; margin: 10px 0 20px 0; text-transform: uppercase; }
        .card { background: white; border-radius: 28px; padding: 10px 20px; border: 3px solid var(--grey); min-height: 150px; margin-bottom: 20px; }
        .header-lista { padding: 15px 0; border-bottom: 2px solid #f2f2f7; text-align: center; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 2px solid #f2f2f7; }
        .testo-prodotto { font-weight: 700; font-size: 17px; flex: 1; }
        .testo-prodotto.barrato { text-decoration: line-through; color: #b0b0b0; opacity: 0.6; }
        .btn-actions { display: flex; gap: 8px; }
        .btn-small { border: 2.5px solid var(--grey); border-radius: 14px; width: 42px; height: 42px; cursor: pointer; display: flex; align-items: center; justify-content: center; background: white; }
        .btn-small.check { border-color: var(--green); color: var(--green); }
        .btn-small.restore { border-color: var(--blue); color: var(--blue); }
        .btn-small.delete { border-color: var(--red); color: var(--red); }
        .controls-group { display: flex; flex-direction: column; gap: 10px; }
        .btn-action { width: 100%; padding: 16px; border-radius: 20px; border: 3px solid var(--grey); background: white; font-weight: 800; text-transform: uppercase; cursor: pointer; }
        .btn-main-color { background: var(--blue); color: white; border-color: var(--blue); }
        .empty-msg { text-align: center; padding: 30px 10px; color: #888; font-weight: 600; }
        .btn-empty { display: inline-block; padding: 12px 25px; background: var(--blue); color: white; border-radius: 15px; text-decoration: none; font-weight: 800; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(5px); }
        .modal-box { background: white; padding: 30px; border-radius: 32px; width: 85%; max-width: 350px; text-align: center; border: 4px solid var(--grey); }
        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 85px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 3px solid var(--grey); }
        .tab-item { flex: 1; text-align: center; font-size: 10px; color: var(--dark); text-decoration: none; font-weight: 800; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .tab-active { color: var(--green); }
        .icon-tab { width: 26px; height: 26px; stroke-width: 2.5; stroke: currentColor; fill: none; }
    </style>
</head>
<body>
    <div class="app">
        <h2>Lista Spesa</h2>
        <div class="card" id="cardLista">
            <div id="headerAggiungi" class="header-lista" style="display:none;">
                <a href="spesa_prodotti.html" class="btn-empty">AGGIUNGI PRODOTTI</a>
            </div>
            <div id="contenitoreLista"><div class="empty-msg">Caricamento...</div></div>
        </div>
        <div id="controlliLista" class="controls-group" style="display: none;">
            <button class="btn-action" onclick="eliminaAcquistati()">Elimina Acquistati</button>
            <button class="btn-action" onclick="ripristinaLista()">Ripristina tutto</button>
            <button class="btn-action btn-main-color" onclick="apriModalSvuota()">Svuota Lista</button>
        </div>
    </div>

    <div id="svuotaModal" class="modal-overlay">
        <div class="modal-box">
            <h3>Svuota tutto?</h3>
            <button class="btn-action btn-main-color" style="background:var(--red); margin-bottom:10px" onclick="confermaSvuota()">SÌ, CANCELLA</button>
            <button class="btn-action" onclick="chiudiModal()">ANNULLA</button>
        </div>
    </div>

    <div class="tab-bar">
        <a href="index.html" class="tab-item"><svg class="icon-tab" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>HOME</a>
        <a href="spesa.html" class="tab-item tab-active"><svg class="icon-tab" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>SPESA</a>
        <a href="spesa_prodotti.html" class="tab-item"><svg class="icon-tab" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>PRODOTTI</a>
        <a href="#" class="tab-item" onclick="logout()"><svg class="icon-tab" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline></svg>ESCI</a>
    </div>

    <script>
        const URL = "https://eejdpophfxsrqdvsucye.supabase.co/rest/v1";
        const KEY = "sb_publishable_A7ZE5MzG6TtUrTKNo3SebA_qOk3_n4v";
        const headers = { "apikey": KEY, "Content-Type": "application/json", "Authorization": "Bearer " + KEY };
        const userEmail = localStorage.getItem('userEmail');

        async function caricaLista() {
            if (!userEmail) { window.location.href = 'login.html'; return; }
            try {
                const res = await fetch(`${URL}/spesa_lista?select=*,spesa_prodotti(nome)&email_utente=eq.${userEmail}`, { headers });
                const data = await res.json();
                
                const div = document.getElementById("contenitoreLista");
                const header = document.getElementById("headerAggiungi");
                const ctrl = document.getElementById("controlliLista");

                if (!Array.isArray(data) || data.length === 0) {
                    header.style.display = "none";
                    div.innerHTML = `<div class="empty-msg">La lista è vuota<br><br><a href="spesa_prodotti.html" class="btn-empty">AGGIUNGI PRODOTTI</a></div>`;
                    ctrl.style.display = "none";
                    return;
                }

                header.style.display = "block";
                ctrl.style.display = "flex";
                data.sort((a, b) => a.completato - b.completato);

                div.innerHTML = "";
                data.forEach(item => {
                    const nome = item.spesa_prodotti?.nome || "Prodotto rimosso";
                    const riga = document.createElement("div");
                    riga.className = "item";
                    riga.innerHTML = `
                        <span class="testo-prodotto ${item.completato ? 'barrato' : ''}">${nome}</span>
                        <div class="btn-actions">
                            <button class="btn-small ${item.completato ? 'restore' : 'check'}" onclick="toggle(${item.id}, ${item.completato})">
                                ${item.completato ? '↺' : '✓'}
                            </button>
                            <button class="btn-small delete" onclick="elimina(${item.id})">🗑</button>
                        </div>`;
                    div.appendChild(riga);
                });
            } catch (e) { console.error(e); }
        }

        async function toggle(id, stato) {
            await fetch(`${URL}/spesa_lista?id=eq.${id}`, { method: "PATCH", headers, body: JSON.stringify({ completato: !stato }) });
            caricaLista();
        }

        async function elimina(id) {
            await fetch(`${URL}/spesa_lista?id=eq.${id}`, { method: "DELETE", headers });
            caricaLista();
        }

        async function eliminaAcquistati() {
            if (confirm("Eliminare i prodotti acquistati?")) {
                await fetch(`${URL}/spesa_lista?email_utente=eq.${userEmail}&completato=eq.true`, { method: "DELETE", headers });
                caricaLista();
            }
        }

        async function ripristinaLista() {
            await fetch(`${URL}/spesa_lista?email_utente=eq.${userEmail}`, { method: "PATCH", headers, body: JSON.stringify({ completato: false }) });
            caricaLista();
        }

        function apriModalSvuota() { document.getElementById('svuotaModal').style.display = 'flex'; }
        function chiudiModal() { document.getElementById('svuotaModal').style.display = 'none'; }
        async function confermaSvuota() {
            await fetch(`${URL}/spesa_lista?email_utente=eq.${userEmail}`, { method: "DELETE", headers });
            chiudiModal(); caricaLista();
        }
        function logout() { localStorage.clear(); window.location.href = 'login.html'; }
        caricaLista();
    </script>
</body>
</html>
