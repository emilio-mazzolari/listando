<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Listando - Lista Spesa</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --green: #0fba8d;
            --blue: #3384d4;
            --yellow: #feb310;
            --red: #ff4d4d;
            --grey: #d8dddc;
            --grey-light: #f2f2f7;
            --dark: #111111;
            --bg: #f5f6f8;
            --white: #ffffff;
            --shadow: 0 4px 20px rgba(0,0,0,0.07);
        }

        * { box-sizing: border-box; }

        html, body { overflow-x: hidden; max-width: 100%; }

        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--dark);
            display: flex;
            justify-content: center;
        }

        .app {
            width: 100%;
            max-width: 420px;
            padding: 24px 20px 120px;
        }

        /* ── Header ── */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .page-title {
            font-weight: 900;
            font-size: 26px;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            margin: 0;
        }

        .badge-count {
            background: var(--blue);
            color: white;
            font-size: 13px;
            font-weight: 800;
            padding: 4px 12px;
            border-radius: 20px;
            display: none;
        }

        /* ── Card Lista ── */
        .card {
            background: var(--white);
            border-radius: 28px;
            border: 3px solid var(--grey);
            overflow: hidden;
            box-shadow: var(--shadow);
            margin-bottom: 16px;
        }

        .card-header {
            padding: 16px 20px;
            border-bottom: 2px solid var(--grey-light);
            display: none;
            justify-content: space-between;
            align-items: center;
        }

        .card-header-label {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #999;
        }

        .btn-add-inline {
            background: var(--blue);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 8px 16px;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: opacity 0.2s;
        }
        .btn-add-inline:active { opacity: 0.8; }
        .btn-add-inline svg { width: 14px; height: 14px; stroke: white; fill: none; stroke-width: 3; }

        /* ── Righe prodotto ── */
        .item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            border-bottom: 2px solid var(--grey-light);
            transition: background 0.15s;
        }
        .item:last-child { border-bottom: none; }
        .item.completato-row { background: #fafafa; }

        .btn-small {
            border: 2.5px solid var(--grey);
            border-radius: 12px;
            width: 44px;
            height: 44px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--white);
            transition: all 0.15s;
            flex-shrink: 0;
        }
        .btn-small:active { transform: scale(0.9); }
        .btn-small svg { width: 18px; height: 18px; stroke-width: 2.5; stroke: currentColor; fill: none; }

        .btn-small.check  { border-color: var(--green); color: var(--green); }
        .btn-small.delete { border-color: var(--red);   color: var(--red);   }

        .btn-small.check.done         { background: var(--green); border-color: var(--green); color: white; }
        .btn-small.check:active       { background: #e6faf5; }
        .btn-small.check.done:active  { opacity: 0.85; background: var(--green); }
        .btn-small.delete:active      { background: #fff0f0; }

        .testo-prodotto {
            font-weight: 700;
            font-size: 16px;
            flex: 1;
            transition: all 0.25s;
            line-height: 1.3;
        }
        .testo-prodotto.barrato {
            text-decoration: line-through;
            color: #b5b5b5;
            font-weight: 600;
        }

        /* ── Stato vuoto ── */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
        }
        .empty-icon {
            width: 60px; height: 60px;
            background: var(--grey-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }
        .empty-icon svg { width: 28px; height: 28px; stroke: #aaa; fill: none; stroke-width: 2; }
        .empty-title { font-weight: 900; font-size: 17px; margin-bottom: 6px; }
        .empty-sub { color: #999; font-size: 14px; font-weight: 600; margin-bottom: 20px; }

        .btn-empty {
            display: inline-block;
            padding: 14px 28px;
            background: var(--blue);
            color: white;
            border-radius: 18px;
            text-decoration: none;
            font-weight: 800;
            font-size: 14px;
            transition: transform 0.15s;
        }
        .btn-empty:active { transform: scale(0.96); }

        /* ── Barra progresso ── */
        .progress-wrap {
            padding: 0 20px 16px;
            display: none;
        }
        .progress-bar-bg {
            background: var(--grey-light);
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--green), #0fd4a4);
            border-radius: 10px;
            transition: width 0.4s ease;
            width: 0%;
        }
        .progress-label {
            font-size: 12px;
            font-weight: 700;
            color: #999;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
        }
        .progress-label span { color: var(--green); }

        /* ── Controlli ── */
        .controls-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-action {
            width: 100%;
            padding: 16px;
            border-radius: 20px;
            border: 3px solid var(--grey);
            background: var(--white);
            font-weight: 800;
            font-size: 13px;
            cursor: pointer;
            text-transform: uppercase;
            color: var(--dark);
            transition: all 0.15s;
            letter-spacing: 0.3px;
            box-shadow: var(--shadow);
        }
        .btn-action:active { background: var(--grey-light); transform: scale(0.98); }

        .btn-action.danger { border-color: #ffd6d6; color: var(--red); }
        .btn-action.danger:active { background: #fff0f0; }

        .btn-action.primary {
            background: var(--blue);
            color: white;
            border-color: var(--blue);
        }
        .btn-action.primary:active { opacity: 0.88; }

        /* ── Modal ── */
        .modal-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.45);
            display: none; align-items: flex-end;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(6px);
            padding-bottom: 30px;
        }
        .modal-box {
            background: white;
            padding: 32px 28px 24px;
            border-radius: 32px 32px 24px 24px;
            width: 92%;
            max-width: 380px;
            text-align: center;
            border: 3px solid var(--grey);
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(40px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }
        .modal-emoji { font-size: 40px; margin-bottom: 10px; }
        .modal-box h3 { font-weight: 900; font-size: 20px; margin: 0 0 8px; }
        .modal-box p { font-weight: 600; color: #777; font-size: 14px; margin: 0 0 20px; }

        .btn-modal {
            width: 100%; padding: 16px;
            margin-top: 8px;
            border-radius: 18px;
            border: none;
            font-weight: 800;
            cursor: pointer;
            font-size: 15px;
            transition: opacity 0.15s;
        }
        .btn-modal:active { opacity: 0.85; }

        /* ── Tab Bar ── */
        .tab-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 88px;
            background: white;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 3px solid var(--grey);
            z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom, 0);
        }
        .tab-item {
            flex: 1; text-align: center;
            font-size: 10px; color: #aaa;
            text-decoration: none;
            font-weight: 800;
            display: flex; flex-direction: column;
            align-items: center; gap: 5px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            transition: color 0.15s;
        }
        .tab-active { color: var(--green); }
        .icon-tab { width: 24px; height: 24px; stroke-width: 2.5; stroke: currentColor; fill: none; }

        /* ── Safe areas ── */
        .app {
            padding-left: max(20px, env(safe-area-inset-left, 20px));
            padding-right: max(20px, env(safe-area-inset-right, 20px));
        }

        /* ── Focus styles ── */
        button:focus-visible, a:focus-visible {
            outline: 3px solid var(--blue);
            outline-offset: 2px;
        }

        /* ── Tablet portrait (≥600px) ── */
        @media (min-width: 600px) {
            .app { max-width: 640px; padding-left: 28px; padding-right: 28px; }
        }

        /* ── iPad / tablet landscape (≥768px) ── */
        @media (min-width: 768px) {
            .app { max-width: 760px; padding-left: 36px; padding-right: 36px; }
        }

        /* ── Desktop (≥1024px): sidebar navigation ── */
        @media (min-width: 1024px) {
            body { display: block; }

            .app {
                margin-left: 240px;
                max-width: 900px;
                padding: 48px 56px 60px;
            }

            .tab-bar {
                top: 0; bottom: 0; right: auto;
                width: 240px;
                height: 100vh;
                flex-direction: column;
                justify-content: flex-start;
                align-items: stretch;
                border-top: none;
                border-right: 3px solid var(--grey);
                padding: 28px 12px 24px;
                overflow-y: auto;
            }

            .tab-bar::before {
                content: "LISTANDO";
                display: block;
                font-weight: 900;
                font-size: 20px;
                letter-spacing: -0.8px;
                color: var(--green);
                padding: 0 8px 28px;
                font-family: 'Segoe UI', system-ui, sans-serif;
            }

            .tab-item {
                flex: none;
                flex-direction: row;
                justify-content: flex-start;
                padding: 13px 16px;
                font-size: 13px;
                gap: 12px;
                text-align: left;
                border-radius: 14px;
                letter-spacing: 0;
                min-height: 44px;
                margin-bottom: 2px;
            }

            .tab-active { background: rgba(15, 186, 141, 0.1); }

            .icon-tab { width: 20px; height: 20px; flex-shrink: 0; }

            .modal-overlay { align-items: center; padding-bottom: 0; }
            .modal-box { border-radius: 28px; }
        }

        /* ── Wide desktop (≥1280px) ── */
        @media (min-width: 1280px) {
            .tab-bar { width: 260px; }
            .app { margin-left: 260px; max-width: 940px; }
        }

        /* ── Small mobile overflow fix (≤400px) ── */
        @media (max-width: 400px) {
            .item { padding: 12px 14px; }
            .testo-prodotto { word-break: break-word; min-width: 0; }
        }
    </style>
</head>
<body>

<div class="app">

    <div class="page-header">
        <h2 class="page-title">Lista Spesa</h2>
        <span class="badge-count" id="badgeCount"></span>
    </div>

    <div class="card" id="cardLista">
        <div id="cardHeader" class="card-header">
            <span class="card-header-label" id="labelProgresso">0 prodotti</span>
            <a href="spesa_prodotti.html" class="btn-add-inline">
                <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Aggiungi
            </a>
        </div>

        <div id="progressWrap" class="progress-wrap">
            <div class="progress-label">
                <span id="progressText">Avanzamento</span>
                <span id="progressPct">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressFill"></div>
            </div>
        </div>

        <div id="contenitoreLista">
            <div class="empty-state">
                <div class="empty-icon">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>
                </div>
                <div class="empty-title">Caricamento…</div>
            </div>
        </div>
    </div>

    <div id="controlliLista" class="controls-group" style="display:none;">
        <button class="btn-action" onclick="eliminaAcquistati()">✓ Elimina Acquistati</button>
        <button class="btn-action" onclick="ripristinaLista()">↺ Ripristina tutto</button>
        <button class="btn-action primary" onclick="apriModalSvuota()">Svuota Lista</button>
    </div>
</div>

<!-- Modal Svuota -->
<div id="svuotaModal" class="modal-overlay">
    <div class="modal-box">
        <div class="modal-emoji">🗑️</div>
        <h3>Svuota tutto?</h3>
        <p>Questa azione cancellerà tutti i prodotti dalla tua lista attuale.</p>
        <button class="btn-modal" style="background:var(--red); color:white;" onclick="confermaSvuota()">Sì, cancella tutto</button>
        <button class="btn-modal" style="background:var(--grey-light); color:var(--dark);" onclick="chiudiModal()">Annulla</button>
    </div>
</div>

<!-- Tab Bar -->
<nav class="tab-bar">
    <a href="index.html" class="tab-item">
        <svg class="icon-tab" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        Home
    </a>
    <a href="spesa.html" class="tab-item tab-active">
        <svg class="icon-tab" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        Spesa
    </a>
    <a href="spesa_prodotti.html" class="tab-item">
        <svg class="icon-tab" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        Prodotti
    </a>
    <a href="#" class="tab-item" onclick="logout()">
        <svg class="icon-tab" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/></svg>
        Esci
    </a>
</nav>

<script>
    const SUPABASE_URL = "https://eejdpophfxsrqdvsucye.supabase.co";
    const URL_BASE = SUPABASE_URL + "/rest/v1";
    const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlamRwb3BoZnhzcnFkdnN1Y3llIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NTMzMDQsImV4cCI6MjA5MzIyOTMwNH0.mpxbwlJyIdZgqKIdutHbLd85JR1P11yiglbYeApi17k";

    const supabaseClient = supabase.createClient(SUPABASE_URL, KEY);

    const headers = {
        "apikey": KEY,
        "Content-Type": "application/json",
        "Authorization": "Bearer " + KEY
    };
    const userEmail = localStorage.getItem('userEmail');
    if (!userEmail) window.location.href = 'login.html';

    function withTimeout(promise, ms) {
        return Promise.race([
            promise,
            new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), ms))
        ]);
    }

    async function caricaLista() {
        if (!userEmail) return;
        const div = document.getElementById("contenitoreLista");
        try {
            const [{ data: listaData, error: errLista }, { data: prodottiData }] = await withTimeout(
                Promise.all([
                    supabaseClient.from('spesa_lista').select('*').eq('email_utente', userEmail),
                    supabaseClient.from('spesa_prodotti').select('id, nome')
                ]),
                12000
            );

            if (errLista) {
                console.error("Errore SELECT spesa_lista:", errLista);
                div.innerHTML = `<div class="empty-state">
                    <div class="empty-title">Errore di caricamento</div>
                    <div class="empty-sub">Controlla la connessione e <a href="" style="color:var(--blue);text-decoration:underline">ricarica</a></div>
                </div>`;
                return;
            }

            const data = listaData || [];
            const prodottiMap = {};
            if (Array.isArray(prodottiData)) {
                prodottiData.forEach(p => { prodottiMap[p.id] = p.nome; });
            }

            const div       = document.getElementById("contenitoreLista");
            const cardHeader = document.getElementById("cardHeader");
            const controlli = document.getElementById("controlliLista");
            const progressWrap = document.getElementById("progressWrap");
            const badge     = document.getElementById("badgeCount");

            if (!Array.isArray(data) || data.length === 0) {
                cardHeader.style.display = "none";
                progressWrap.style.display = "none";
                controlli.style.display = "none";
                badge.style.display = "none";
                div.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                        </div>
                        <div class="empty-title">Lista vuota</div>
                        <div class="empty-sub">Aggiungi i prodotti che vuoi acquistare</div>
                        <a href="spesa_prodotti.html" class="btn-empty">+ Aggiungi prodotti</a>
                    </div>`;
                return;
            }

            // Calcolo progresso
            const totale    = data.length;
            const completati = data.filter(i => i.completato).length;
            const pct       = Math.round((completati / totale) * 100);
            const rimanenti = totale - completati;

            // Aggiorna badge e label
            badge.style.display = rimanenti > 0 ? "inline-block" : "none";
            badge.textContent   = rimanenti;

            document.getElementById("labelProgresso").textContent =
                `${totale} prodotto${totale !== 1 ? 'i' : ''}`;
            document.getElementById("progressText").textContent =
                `${completati} di ${totale} presi`;
            document.getElementById("progressPct").textContent = `${pct}%`;
            document.getElementById("progressFill").style.width = `${pct}%`;

            cardHeader.style.display    = "flex";
            progressWrap.style.display  = "block";
            controlli.style.display     = "flex";

            // Ordina: non completati prima, poi alfabeticamente
            data.sort((a, b) => {
                if (a.completato !== b.completato) return a.completato ? 1 : -1;
                const nomeA = prodottiMap[a.prodotto_id] || a.nome || '';
                const nomeB = prodottiMap[b.prodotto_id] || b.nome || '';
                return nomeA.localeCompare(nomeB, 'it');
            });

            div.innerHTML = "";
            data.forEach(item => {
                const nome = prodottiMap[item.prodotto_id] || item.nome || "Prodotto";
                const riga = document.createElement("div");
                riga.className = `item${item.completato ? ' completato-row' : ''}`;
                riga.innerHTML = `
                    <button class="btn-small check ${item.completato ? 'done' : ''}" onclick="toggle(${item.id}, ${item.completato})" aria-label="${item.completato ? 'Ripristina' : 'Segna come preso'}">
                        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
                    </button>
                    <span class="testo-prodotto ${item.completato ? 'barrato' : ''}">${nome}</span>
                    <button class="btn-small delete" onclick="elimina(${item.id})" aria-label="Elimina">
                        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                `;
                div.appendChild(riga);
            });

        } catch (e) {
            console.error(e);
            div.innerHTML = `<div class="empty-state">
                <div class="empty-title">Errore di rete</div>
                <div class="empty-sub">Controlla la connessione e <a href="" style="color:var(--blue);text-decoration:underline">ricarica</a></div>
            </div>`;
        }
    }

    async function toggle(id, stato) {
        await supabaseClient.from('spesa_lista').update({ completato: !stato }).eq('id', id);
        caricaLista();
    }

    async function elimina(id) {
        await supabaseClient.from('spesa_lista').delete().eq('id', id);
        caricaLista();
    }

    async function eliminaAcquistati() {
        if (confirm("Eliminare i prodotti già presi?")) {
            await supabaseClient.from('spesa_lista')
                .delete()
                .eq('email_utente', userEmail)
                .eq('completato', true);
            caricaLista();
        }
    }

    async function ripristinaLista() {
        await supabaseClient.from('spesa_lista')
            .update({ completato: false })
            .eq('email_utente', userEmail);
        caricaLista();
    }

    function apriModalSvuota()  { document.getElementById('svuotaModal').style.display = 'flex'; }
    function chiudiModal()      { document.getElementById('svuotaModal').style.display = 'none'; }

    async function confermaSvuota() {
        await supabaseClient.from('spesa_lista').delete().eq('email_utente', userEmail);
        chiudiModal();
        caricaLista();
    }

    function logout() { localStorage.clear(); window.location.href = 'login.html'; }

    caricaLista();

    document.addEventListener('visibilitychange', () => {
        if (!document.hidden) caricaLista();
    });
</script>
</body>
</html>
