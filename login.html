<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Listando</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Listando">
<meta name="mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="logolistando.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --green: #0fba8d;
            --blue: #3384d4;
            --yellow: #feb310;
            --grey: #d8dddc;
            --dark: #1c1c1e;
            --bg: #fdfdfd;
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            color: var(--dark);
        }

        .card { 
            background: white; 
            padding: 40px 30px; 
            border-radius: 32px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 350px; 
            text-align: center; 
            border: 4px solid var(--grey);
        }

        .logo-img {
    width: 100%;       /* Prende la larghezza del contenitore */
    max-width: 320px;  /* Dimensione raddoppiata */
    height: auto;
    margin-bottom: 20px;
    display: block;
    margin-left: auto;
    margin-right: auto;
}

        p { 
            font-weight: 600; 
            color: #000000; 
            margin-bottom: 30px; 
            font-size: 16px;
        }

        input { 
            width: 100%; 
            padding: 16px; 
            margin-bottom: 15px; 
            border-radius: 18px; 
            border: 3px solid var(--grey); 
            box-sizing: border-box; 
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--blue);
        }

        button { 
            width: 100%; 
            padding: 16px; 
            border-radius: 18px; 
            border: none; 
            font-weight: 800; 
            font-size: 16px;
            cursor: pointer; 
            transition: transform 0.1s, opacity 0s; 
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-email { 
            background: var(--blue); 
            color: white; 
            margin-bottom: 10px; 
        }

        .btn-google { 
            background: white; 
            border: 3px solid var(--grey); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px; 
            color: var(--dark);
        }

        .divider { 
            margin: 25px 0; 
            color: var(--grey); 
            font-size: 12px; 
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 2px;
            background: var(--grey);
        }

        #status { 
            margin-top: 20px; 
            font-size: 13px; 
            font-weight: 700; 
            min-height: 20px; 
        }

        .error { color: #ff3b30; }
        .success { color: var(--green); }

        /* ── Focus styles ── */
        button:focus-visible, a:focus-visible {
            outline: 3px solid var(--blue);
            outline-offset: 2px;
        }

        @media (min-width: 768px) {
            .card { max-width: 420px; }
        }
        @media (min-width: 1024px) {
            .card { max-width: 460px; }
        }
    </style>
</head>
<body>

<div class="card">
    <img src="logolistando.png" alt="Listando" class="logo-img">
    
    <p>Accedi alle tue liste</p>

    <input type="email" id="emailInput" placeholder="La tua email">
    <button class="btn-email" onclick="loginManuale()">ENTRA CON EMAIL</button>

    <div class="divider">OPPURE</div>

    <button class="btn-google" id="btnGoogle">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="20" alt="G">
        Accedi con Google
    </button>

    <div id="status"></div>
</div>

<script>
const SUPABASE_URL = "https://eejdpophfxsrqdvsucye.supabase.co"; 
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlamRwb3BoZnhzcnFkdnN1Y3llIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NTMzMDQsImV4cCI6MjA5MzIyOTMwNH0.mpxbwlJyIdZgqKIdutHbLd85JR1P11yiglbYeApi17k";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const statusDiv = document.getElementById('status');

document.getElementById('btnGoogle').addEventListener('click', async () => {
    statusDiv.innerHTML = 'Connessione a Google...';
    
    const { error } = await supabaseClient.auth.signInWithOAuth({
        provider: 'google',
        options: {
            redirectTo: "https://listando.it/login.html", // URL pulito
            queryParams: {
                access_type: 'offline',
                prompt: 'consent'
            }
        }
    });

    if (error) {
        statusDiv.innerHTML = `<span class="error">${error.message}</span>`;
    }
});

function loginManuale() {
    const email = document.getElementById('emailInput').value.trim();
    if (email.includes('@')) {
        localStorage.setItem('userEmail', email);
        statusDiv.innerHTML = '<span class="success">Accesso in corso...</span>';
        setTimeout(() => {
            window.location.href = 'index.html';
        }, 500);
    } else {
        statusDiv.innerHTML = '<span class="error">Inserisci un\'email valida.</span>';
    }
}

supabaseClient.auth.onAuthStateChange((event, session) => {
    if (event === "SIGNED_IN" && session) {
        localStorage.setItem('userEmail', session.user.email);
        window.location.assign('index.html');
    }
});
</script>
</body>
</html>
