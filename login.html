<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Lista Spesa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; font-family: -apple-system, sans-serif; background: #f2f2f7; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #ddd; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; }
        .btn-email { background: #aec6cf; color: white; margin-bottom: 20px; }
        .btn-google { background: white; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; }
        #status { margin-top: 15px; font-size: 13px; font-weight: bold; min-height: 20px; }
        .error { color: #d32f2f; }
    </style>
</head>
<body>
<div class="card">
    <h1>Benvenuto</h1>
    <p>Accedi alle tue liste</p>
    <input type="email" id="emailInput" placeholder="La tua email">
    <button class="btn-email" onclick="loginManuale()">ENTRA CON EMAIL</button>
    <div style="margin: 20px 0; color: #aaa; font-size: 12px;">OPPURE</div>
    <button class="btn-google" id="btnGoogle">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="18" alt="G">
        Accedi con Google
    </button>
    <div id="status"></div>
</div>

<script>
const SUPABASE_URL = "https://eejdpophfxsrqdvsucye.supabase.co"; 
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlamRwb3BoZnhzcnFkdnN1Y3llIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NTMzMDQsImV4cCI6MjA5MzIyOTMwNH0.mpxbwlJyIdZgqKIdutHbLd85JR1P11yiglbYeApi17k";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const statusDiv = document.getElementById('status');

document.getElementById('btnGoogle').addEventListener('click', async () => {
    statusDiv.innerHTML = 'Connessione a Google...';
    
    const { error } = await supabaseClient.auth.signInWithOAuth({
    provider: 'google',
    options: {
        redirectTo: "[lista-spesa-flame.vercel.app](https://lista-spesa-flame.vercel.app/login.html)",
        queryParams: {
            access_type: 'offline',
            prompt: 'consent'
        }
    }
});

    if (error) {
        statusDiv.innerHTML = `<span class="error">${error.message}</span>`;
    }
});

function loginManuale() {
    const email = document.getElementById('emailInput').value.trim();
    if (email.includes('@')) {
        localStorage.setItem('userEmail', email);
        window.location.href = 'index.html';
    } else {
        statusDiv.innerHTML = '<span class="error">Inserisci un\'email valida.</span>';
    }
}

supabaseClient.auth.onAuthStateChange((event, session) => {
    console.log("Evento Auth:", event);
    if (event === "SIGNED_IN" && session) {
        localStorage.setItem('userEmail', session.user.email);
        window.location.assign('index.html');
    }
});
</script>
</body>
</html>
