<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accesso Spesa</title>
    <!-- Proviamo un link diverso per la libreria, più universale -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #f2f2f7; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #e1e1e1; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; margin-bottom: 15px; }
        .btn-primary { background: #aec6cf; color: white; }
        .btn-google { background: white; border: 1px solid #e1e1e1; display: flex; align-items: center; justify-content: center; gap: 10px; }
        #debug-msg { color: red; font-size: 11px; margin-top: 10px; min-height: 15px; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Benvenuto</h2>
        <p style="color:#636366; font-size: 14px;">Accedi alla tua lista spesa</p>

        <input type="email" id="emailInput" placeholder="Inserisci la tua email">
        <button class="btn btn-primary" onclick="loginManuale()">ENTRA CON EMAIL</button>

        <div style="margin: 10px 0; color: #8e8e93; font-size: 12px;">oppure</div>

        <button class="btn btn-google" onclick="loginConGoogle()">
            <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="18">
            Accedi con Google
        </button>
        
        <div id="debug-msg"></div>
    </div>

    <script>
        const URL = "https://eejdpophfxsrqdvsucye.supabase.co";
        const KEY = "sb_publishable_A7ZE5MzG6TtUrTKNo3SebA_qOk3_n4v";
        let supabaseClient;

        // Funzione per inizializzare il client
        function initSupabase() {
            try {
                if (typeof supabase !== 'undefined') {
                    supabaseClient = supabase.createClient(URL, KEY);
                    console.log("Supabase pronto!");
                } else {
                    document.getElementById('debug-msg').innerText = "Libreria non trovata. Ricarica la pagina.";
                }
            } catch (e) {
                document.getElementById('debug-msg').innerText = "Errore: " + e.message;
            }
        }

        // Chiamata immediata
        initSupabase();

        async function loginConGoogle() {
            if (!supabaseClient) {
                initSupabase(); // Riprova l'inizializzazione se era fallita
                if (!supabaseClient) return;
            }
            
            document.getElementById('debug-msg').innerText = "Connessione a Google...";
            
            const { error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: window.location.origin + window.location.pathname.replace('login.html', 'index.html')
                }
            });

            if (error) document.getElementById('debug-msg').innerText = error.message;
        }

        function loginManuale() {
            const email = document.getElementById('emailInput').value.trim();
            if (email.includes('@')) {
                localStorage.setItem('userEmail', email);
                window.location.href = 'index.html';
            } else {
                alert("Inserisci una mail valida");
            }
        }
    </script>
</body>
</html>
