<script>
const SUPABASE_URL = "https://eejdpophfxsrqdvsucye.supabase.co"; 
const SUPABASE_KEY = "sb_publishable_A7ZE5MzG6TtUrTKNo3SebA_qOk3_n4v";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: {
        detectSessionInUrl: true
    }
});

const statusDiv = document.getElementById('status');


// 🔹 GESTIONE LOGIN GOOGLE
async function loginConGoogle() {
    statusDiv.innerHTML = '<span class="loading">Apertura Google...</span>';

    const { error } = await supabaseClient.auth.signInWithOAuth({
        provider: 'google',
        options: {
            redirectTo: window.location.origin + '/index.html'
        }
    });

    if (error) {
        statusDiv.innerHTML = `<span class="error">Errore: ${error.message}</span>`;
    }
}


// 🔹 GESTIONE EVENTI AUTH
supabaseClient.auth.onAuthStateChange((event, session) => {
    console.log("Evento:", event);

    if (event === 'SIGNED_IN' && session) {
        statusDiv.innerHTML = '<span class="loading">Accesso riuscito! Reindirizzamento...</span>';
        
        localStorage.setItem('userEmail', session.user.email);

        setTimeout(() => {
            window.location.replace('index.html');
        }, 300);
    }
});


// 🔹 LOGIN MANUALE
function loginManuale() {
    const email = document.getElementById('emailInput').value.trim();

    if (email.includes('@') && email.length > 5) {
        localStorage.setItem('userEmail', email);
        window.location.href = 'index.html';
    } else {
        alert("Inserisci un'email valida.");
    }
}


// 🔹 CONTROLLO SESSIONE ALL'AVVIO
async function init() {
    const { data: { session } } = await supabaseClient.auth.getSession();

    if (session) {
        localStorage.setItem('userEmail', session.user.email);
        window.location.replace('index.html');
    }
}

init();
</script>
