<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Listando - Album Condiviso</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --purple: #7c5cbf; --grey: #d8dddc; --grey-light: #f2f2f7; --dark: #111; --bg: #f5f6f8; --white: #fff; }
        * { box-sizing: border-box; }
        html, body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--dark); }

        .header {
            background: white; border-bottom: 2px solid var(--grey-light);
            padding: 18px 20px; text-align: center;
        }
        .header-logo { font-weight: 900; font-size: 14px; color: var(--purple); letter-spacing: 1px; margin-bottom: 6px; }
        .header-title { font-weight: 900; font-size: 22px; margin: 0 0 4px; }
        .header-meta { font-size: 12px; color: #999; font-weight: 600; line-height: 1.8; }

        .meta-chips { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; padding: 12px 20px; }
        .chip { background: var(--grey-light); border-radius: 20px; padding: 5px 12px; font-size: 12px; font-weight: 700; color: #555; }
        .chip.persona { background: #ede8f8; color: var(--purple); }

        .foto-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; padding-bottom: 40px; }
        .foto-cell { aspect-ratio: 1; overflow: hidden; cursor: pointer; background: var(--grey-light); }
        .foto-cell img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .empty-state { text-align: center; padding: 60px 20px; }
        .empty-title { font-weight: 900; font-size: 18px; margin-bottom: 8px; }
        .empty-sub { color: #999; font-size: 14px; }

        /* Lightbox */
        .lightbox {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.95); z-index: 5000;
            align-items: center; justify-content: center; flex-direction: column;
        }
        .lightbox.open { display: flex; }
        .lightbox img { max-width: 100%; max-height: calc(100vh - 80px); object-fit: contain; }
        .lightbox-close {
            position: absolute; top: 16px; right: 16px;
            color: white; background: rgba(255,255,255,0.15); border: none;
            border-radius: 50%; width: 44px; height: 44px; font-size: 22px; cursor: pointer;
        }
        .lightbox-nav {
            position: absolute; top: 50%; transform: translateY(-50%);
            color: white; background: rgba(255,255,255,0.15); border: none;
            border-radius: 50%; width: 44px; height: 44px; font-size: 22px; cursor: pointer;
        }
        .lightbox-prev { left: 12px; }
        .lightbox-next { right: 12px; }
        .lightbox-counter { position: absolute; bottom: 20px; color: rgba(255,255,255,0.7); font-size: 13px; font-weight: 700; }

        .footer { text-align: center; padding: 24px; font-size: 12px; color: #bbb; font-weight: 600; }
        .footer a { color: var(--purple); text-decoration: none; font-weight: 800; }

        @media (min-width: 600px) { .foto-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (min-width: 900px) { .foto-grid { grid-template-columns: repeat(5, 1fr); max-width: 900px; margin: 0 auto; } }
    </style>
</head>
<body>

<div class="header">
    <div class="header-logo">LISTANDO</div>
    <h1 class="header-title" id="albumNome">Caricamento…</h1>
    <div class="header-meta" id="albumMeta"></div>
</div>
<div class="meta-chips" id="metaChips"></div>

<div class="foto-grid" id="fotoGrid">
    <div class="empty-state" style="grid-column:1/-1">
        <div class="empty-title">Caricamento…</div>
    </div>
</div>

<div class="lightbox" id="lightbox" onclick="chiudiLightbox()">
    <button class="lightbox-close" onclick="chiudiLightbox()">✕</button>
    <button class="lightbox-nav lightbox-prev" onclick="event.stopPropagation(); navLightbox(-1)">‹</button>
    <img id="lightboxImg" src="" alt="">
    <button class="lightbox-nav lightbox-next" onclick="event.stopPropagation(); navLightbox(1)">›</button>
    <span class="lightbox-counter" id="lightboxCounter"></span>
</div>

<div class="footer">Album condiviso tramite <a href="https://listando.it">listando.it</a></div>

<script>
    const SUPABASE_URL = "https://eejdpophfxsrqdvsucye.supabase.co";
    const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlamRwb3BoZnhzcnFkdnN1Y3llIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NTMzMDQsImV4cCI6MjA5MzIyOTMwNH0.mpxbwlJyIdZgqKIdutHbLd85JR1P11yiglbYeApi17k";
    const supabaseClient = supabase.createClient(SUPABASE_URL, KEY);

    const token = new URLSearchParams(location.search).get('token');
    let foto = [];
    let lightboxIdx = 0;

    async function carica() {
        if (!token) { document.getElementById('albumNome').textContent = 'Link non valido'; return; }

        const { data: album, error } = await supabaseClient
            .from('foto_album').select('*').eq('share_token', token).single();

        if (error || !album) {
            document.getElementById('albumNome').textContent = 'Album non trovato';
            document.getElementById('fotoGrid').innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-title">Link non valido o album eliminato</div></div>`;
            return;
        }

        document.getElementById('albumNome').textContent = album.nome;
        document.title = `${album.nome} — Listando`;

        const meta = [];
        if (album.data_album) meta.push(`📅 ${new Date(album.data_album + 'T00:00:00').toLocaleDateString('it', { day: '2-digit', month: 'long', year: 'numeric' })}`);
        if (album.luogo)      meta.push(`📍 ${album.luogo}`);
        if (album.argomento)  meta.push(`🏷️ ${album.argomento}`);
        document.getElementById('albumMeta').textContent = meta.join('  ·  ');

        const chips = document.getElementById('metaChips');
        if (album.persone) {
            album.persone.split(',').map(p => p.trim()).filter(Boolean).forEach(p => {
                chips.innerHTML += `<span class="chip persona">👤 ${p}</span>`;
            });
        }
        if (!chips.innerHTML) chips.style.display = 'none';

        const { data: fotoData } = await supabaseClient
            .from('foto').select('*').eq('album_id', album.id).order('created_at', { ascending: false });

        foto = fotoData || [];
        const grid = document.getElementById('fotoGrid');

        if (foto.length === 0) {
            grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-title">Nessuna foto</div><div class="empty-sub">L'album è vuoto</div></div>`;
            return;
        }

        grid.innerHTML = '';
        foto.forEach((f, idx) => {
            const cell = document.createElement('div');
            cell.className = 'foto-cell';
            cell.innerHTML = `<img src="${f.url}" alt="foto" loading="lazy" onclick="apriLightbox(${idx})">`;
            grid.appendChild(cell);
        });
    }

    function apriLightbox(idx) {
        lightboxIdx = idx;
        document.getElementById('lightbox').classList.add('open');
        aggiornaLightbox();
    }
    function chiudiLightbox() { document.getElementById('lightbox').classList.remove('open'); }
    function navLightbox(dir) {
        lightboxIdx = (lightboxIdx + dir + foto.length) % foto.length;
        aggiornaLightbox();
    }
    function aggiornaLightbox() {
        document.getElementById('lightboxImg').src = foto[lightboxIdx].url;
        document.getElementById('lightboxCounter').textContent = `${lightboxIdx + 1} / ${foto.length}`;
    }
    document.addEventListener('keydown', e => {
        if (!document.getElementById('lightbox').classList.contains('open')) return;
        if (e.key === 'ArrowLeft')  navLightbox(-1);
        if (e.key === 'ArrowRight') navLightbox(1);
        if (e.key === 'Escape')     chiudiLightbox();
    });

    carica();
</script>
</body>
</html>
