<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Listando - Canzoni</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --green: #0fba8d; --blue: #3384d4; --red: #ff3b30;
            --music: #1db954; --music-dark: #158a3e;
            --grey: #d8dddc; --grey-light: #f2f2f7;
            --dark: #111; --bg: #f5f6f8; --white: #fff;
        }
        * { box-sizing: border-box; }
        html, body { overflow-x: hidden; max-width: 100%; margin: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--dark); padding-bottom: 200px; }

        .page-header {
            position: sticky; top: 0; z-index: 100;
            background: var(--white); border-bottom: 2px solid var(--grey-light);
            display: flex; align-items: center; gap: 10px;
            padding: 14px 16px; padding-top: max(14px, env(safe-area-inset-top, 14px));
        }
        .btn-back { width: 40px; height: 40px; border-radius: 12px; border: 2.5px solid var(--grey); background: var(--white); display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn-back svg { width: 18px; height: 18px; stroke: var(--dark); fill: none; stroke-width: 2.5; }
        .header-title { font-weight: 900; font-size: 18px; flex: 1; }
        .header-actions { display: flex; gap: 8px; }
        .btn-icon-hdr { width: 40px; height: 40px; border-radius: 12px; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; }
        .btn-icon-hdr.add { background: var(--music); color: white; }
        .btn-icon-hdr.upload { background: var(--blue); color: white; }

        /* Playlist section */
        .section-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 16px 8px; }
        .section-title { font-weight: 900; font-size: 16px; }
        .btn-new-playlist { padding: 6px 14px; border-radius: 12px; border: 2px solid var(--music); color: var(--music); background: none; font-weight: 800; font-size: 13px; cursor: pointer; font-family: inherit; }

        /* Playlists grid */
        .playlists-scroll { display: flex; gap: 12px; overflow-x: auto; padding: 0 16px 4px; scrollbar-width: none; }
        .playlists-scroll::-webkit-scrollbar { display: none; }
        .playlist-card {
            flex-shrink: 0; width: 130px; cursor: pointer;
        }
        .playlist-cover {
            width: 130px; height: 130px; border-radius: 16px;
            background: linear-gradient(135deg, var(--music), #0a8040);
            display: flex; align-items: center; justify-content: center;
            font-size: 40px; margin-bottom: 8px; overflow: hidden; position: relative;
        }
        .playlist-cover img { width: 100%; height: 100%; object-fit: cover; }
        .playlist-cover-count {
            position: absolute; bottom: 6px; right: 8px;
            background: rgba(0,0,0,0.5); color: white;
            font-size: 11px; font-weight: 800; border-radius: 8px; padding: 2px 6px;
        }
        .playlist-name { font-weight: 800; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .playlist-sub { font-size: 11px; color: #888; font-weight: 600; margin-top: 2px; }

        /* Song list */
        .songs-header { display: flex; align-items: center; gap: 10px; padding: 16px 16px 6px; }
        .songs-title { font-weight: 900; font-size: 16px; flex: 1; }
        .btn-shuffle { padding: 8px 16px; border-radius: 12px; border: none; background: var(--music); color: white; font-weight: 800; font-size: 13px; cursor: pointer; }

        .song-item {
            display: flex; align-items: center; gap: 12px; padding: 10px 16px;
            cursor: pointer; border-bottom: 1px solid var(--grey-light);
            transition: background 0.1s;
        }
        .song-item:active { background: var(--grey-light); }
        .song-item.playing { background: #f0fdf8; }
        .song-num { width: 24px; text-align: center; font-size: 13px; font-weight: 700; color: #bbb; flex-shrink: 0; }
        .song-num.playing { color: var(--music); font-size: 16px; }
        .song-info { flex: 1; min-width: 0; }
        .song-title { font-weight: 800; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-title.playing { color: var(--music); }
        .song-artist { font-size: 12px; color: #888; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-dur { font-size: 12px; color: #aaa; font-weight: 600; flex-shrink: 0; }
        .btn-song-more { width: 32px; height: 32px; border-radius: 50%; border: none; background: none; font-size: 18px; color: #bbb; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

        /* Now playing bar */
        .player-bar {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
            background: var(--dark); color: white;
            padding: 12px 16px; padding-bottom: max(12px, env(safe-area-inset-bottom, 12px));
            display: none;
        }
        .player-bar.visible { display: block; }
        .player-progress-wrap { margin-bottom: 10px; }
        .player-progress-bg { background: rgba(255,255,255,0.2); border-radius: 4px; height: 3px; cursor: pointer; }
        .player-progress-fill { background: var(--music); border-radius: 4px; height: 3px; transition: width 0.5s linear; }
        .player-row { display: flex; align-items: center; gap: 12px; }
        .player-art { width: 44px; height: 44px; border-radius: 10px; background: linear-gradient(135deg, var(--music), #0a8040); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; overflow: hidden; }
        .player-art img { width: 100%; height: 100%; object-fit: cover; }
        .player-info { flex: 1; min-width: 0; }
        .player-title { font-weight: 800; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-artist { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 2px; }
        .player-controls { display: flex; gap: 4px; align-items: center; }
        .btn-ctrl { width: 40px; height: 40px; border-radius: 50%; border: none; background: none; color: white; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-ctrl.play-pause { width: 48px; height: 48px; background: var(--music); border-radius: 50%; font-size: 22px; }
        .player-times { display: flex; justify-content: space-between; font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 4px; }

        .upload-bar { display: none; position: fixed; top: 0; left: 0; right: 0; background: var(--music); color: white; text-align: center; font-size: 13px; font-weight: 800; padding: 10px; z-index: 9999; }

        /* Playlist detail */
        .back-playlist { display: flex; align-items: center; gap: 8px; padding: 12px 16px; cursor: pointer; }
        .back-playlist span { font-size: 13px; font-weight: 800; color: var(--music); }

        /* Empty */
        .empty-msg { text-align: center; padding: 48px 24px; color: #bbb; font-weight: 700; font-size: 15px; }

        /* Context menu */
        .ctx-menu { display: none; position: fixed; z-index: 999; background: var(--white); border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.18); padding: 8px; min-width: 180px; }
        .ctx-menu.open { display: block; }
        .ctx-item { padding: 12px 16px; font-size: 14px; font-weight: 700; cursor: pointer; border-radius: 10px; }
        .ctx-item:active { background: var(--grey-light); }
        .ctx-item.danger { color: var(--red); }

        /* Modals */
        .modal-overlay { display: none; position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.5); align-items: flex-end; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal-box { background: var(--white); border-radius: 28px 28px 0 0; padding: 24px 20px; padding-bottom: max(24px, env(safe-area-inset-bottom, 24px)); width: 100%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
        .modal-handle { width: 40px; height: 4px; background: var(--grey); border-radius: 4px; margin: 0 auto 20px; }
        .modal-title { font-weight: 900; font-size: 18px; margin-bottom: 18px; }
        .form-group { margin-bottom: 12px; }
        .form-label { font-size: 12px; font-weight: 800; color: #666; margin-bottom: 5px; display: block; text-transform: uppercase; letter-spacing: 0.4px; }
        .form-input { width: 100%; padding: 12px 14px; border-radius: 14px; border: 2.5px solid var(--grey); font-size: 15px; font-family: inherit; outline: none; transition: border-color 0.2s; }
        .form-input:focus { border-color: var(--music); }
        .btn-save-modal { width: 100%; padding: 16px; border-radius: 18px; border: none; background: var(--music); color: white; font-weight: 900; font-size: 16px; cursor: pointer; font-family: inherit; margin-top: 8px; }
        .btn-delete-modal { width: 100%; padding: 14px; border-radius: 18px; border: none; background: #fff0f0; color: var(--red); font-weight: 800; font-size: 14px; cursor: pointer; font-family: inherit; margin-top: 8px; }

        .toast { position: fixed; bottom: 160px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--dark); color: white; padding: 12px 20px; border-radius: 14px; font-weight: 700; font-size: 14px; opacity: 0; transition: all 0.25s; white-space: nowrap; z-index: 9999; pointer-events: none; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="upload-bar" id="uploadBar">⬆️ Carico…</div>

<div class="page-header">
    <button class="btn-back" onclick="goBack()">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="header-title" id="headerTitle">CANZONI</div>
    <div class="header-actions">
        <button class="btn-icon-hdr upload" id="btnUpload" onclick="document.getElementById('fileInput').click()" title="Carica MP3">⬆️</button>
        <button class="btn-icon-hdr add" onclick="apriNuovaPlaylist()" title="Nuova raccolta">+</button>
    </div>
</div>

<input type="file" id="fileInput" accept="audio/mpeg,audio/mp3,audio/aac,audio/ogg,audio/wav,audio/*" multiple onchange="handleFiles(this.files)">

<!-- Main view -->
<div id="mainView">
    <div class="section-header">
        <div class="section-title">🎵 Le tue raccolte</div>
    </div>
    <div class="playlists-scroll" id="playlistsScroll">
        <div class="empty-msg" style="padding:24px">Nessuna raccolta ancora</div>
    </div>

    <div class="songs-header">
        <div class="songs-title">Tutte le canzoni</div>
        <button class="btn-shuffle" onclick="shuffle()">🔀 Shuffle</button>
    </div>
    <div id="allSongsList"></div>
</div>

<!-- Playlist detail view -->
<div id="playlistView" style="display:none">
    <div class="back-playlist" onclick="tornaAlMain()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        <span>Raccolte</span>
    </div>
    <div style="padding: 0 16px 12px; display:flex; align-items:center; gap:14px">
        <div class="playlist-cover" style="width:80px;height:80px;border-radius:12px;font-size:28px;flex-shrink:0" id="plDetailCover">🎵</div>
        <div>
            <div id="plDetailName" style="font-weight:900;font-size:20px"></div>
            <div id="plDetailCount" style="font-size:13px;color:#888;font-weight:600;margin-top:4px"></div>
        </div>
    </div>
    <div id="playlistSongsList"></div>
</div>

<!-- Context menu -->
<div class="ctx-menu" id="ctxMenu">
    <div class="ctx-item" id="ctxRinomina" onclick="ctxAction('rinomina')">✏️ Rinomina</div>
    <div class="ctx-item" id="ctxSposta" onclick="ctxAction('sposta')">📁 Sposta raccolta</div>
    <div class="ctx-item danger" onclick="ctxAction('elimina')">🗑️ Elimina</div>
</div>

<!-- Playlist modal -->
<div class="modal-overlay" id="modalePlaylist">
    <div class="modal-box">
        <div class="modal-handle"></div>
        <div class="modal-title" id="plModalTitle">Nuova raccolta</div>
        <div class="form-group">
            <label class="form-label">Nome raccolta *</label>
            <input class="form-input" id="plNome" placeholder="es. Estate 2024, Pop, Relax…" type="text">
        </div>
        <button class="btn-save-modal" onclick="salvaPlaylist()">SALVA</button>
        <button class="btn-delete-modal" id="btnElPlaylist" style="display:none" onclick="eliminaPlaylist()">ELIMINA RACCOLTA</button>
    </div>
</div>

<!-- Song edit modal -->
<div class="modal-overlay" id="modaleSong">
    <div class="modal-box">
        <div class="modal-handle"></div>
        <div class="modal-title">Modifica canzone</div>
        <div class="form-group">
            <label class="form-label">Titolo *</label>
            <input class="form-input" id="sTitolo" type="text">
        </div>
        <div class="form-group">
            <label class="form-label">Artista</label>
            <input class="form-input" id="sArtista" type="text" placeholder="Artista / Band">
        </div>
        <div class="form-group">
            <label class="form-label">Raccolta</label>
            <select class="form-input" id="sPlaylist">
                <option value="">— Nessuna —</option>
            </select>
        </div>
        <button class="btn-save-modal" onclick="salvaSong()">SALVA</button>
        <button class="btn-delete-modal" onclick="eliminaSong()">ELIMINA</button>
    </div>
</div>

<!-- Player -->
<div class="player-bar" id="playerBar">
    <div class="player-progress-wrap">
        <div class="player-progress-bg" onclick="seekClick(event)">
            <div class="player-progress-fill" id="progressFill" style="width:0%"></div>
        </div>
        <div class="player-times"><span id="timeCur">0:00</span><span id="timeTot">0:00</span></div>
    </div>
    <div class="player-row">
        <div class="player-art" id="playerArt">🎵</div>
        <div class="player-info">
            <div class="player-title" id="playerTitle">—</div>
            <div class="player-artist" id="playerArtist"></div>
        </div>
        <div class="player-controls">
            <button class="btn-ctrl" onclick="prevSong()">⏮</button>
            <button class="btn-ctrl play-pause" id="btnPlayPause" onclick="togglePlay()">▶</button>
            <button class="btn-ctrl" onclick="nextSong()">⏭</button>
        </div>
    </div>
</div>

<audio id="audioEl" onended="nextSong()" ontimeupdate="updateProgress()"></audio>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = "https://eejdpophfxsrqdvsucye.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlamRwb3BoZnhzcnFkdnN1Y3llIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NTMzMDQsImV4cCI6MjA5MzIyOTMwNH0.mpxbwlJyIdZgqKIdutHbLd85JR1P11yiglbYeApi17k";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const userEmail = localStorage.getItem('userEmail');
if (!userEmail) location.href = 'login.html';

const audio = document.getElementById('audioEl');
let playlists = [];
let songs = [];
let queue = [];
let queueIdx = 0;
let currentPlaylistId = null;
let editPlaylistId = null;
let editSongId = null;
let ctxTargetId = null;
let ctxTargetType = null;

// ── Data loading ───────────────────────────────────────────────────────
async function carica() {
    const [{ data: pl }, { data: s }] = await Promise.all([
        sb.from('canzoni_playlist').select('*').eq('email_utente', userEmail).is('parent_id', null).order('nome'),
        sb.from('canzoni').select('*').eq('email_utente', userEmail).order('sort_order').order('titolo')
    ]);
    playlists = pl || [];
    songs = s || [];
    renderMain();
}

// ── Render main ────────────────────────────────────────────────────────
function renderMain() {
    renderPlaylists();
    renderSongList('allSongsList', songs);
}

function renderPlaylists() {
    const scroll = document.getElementById('playlistsScroll');
    if (!playlists.length) {
        scroll.innerHTML = '<div style="padding:8px 0; color:#bbb; font-weight:700; font-size:14px">Nessuna raccolta</div>';
        return;
    }
    scroll.innerHTML = playlists.map(pl => {
        const count = songs.filter(s => s.playlist_id === pl.id).length;
        return `<div class="playlist-card" onclick="apriPlaylist(${pl.id})">
            <div class="playlist-cover">🎵<div class="playlist-cover-count">${count}</div></div>
            <div class="playlist-name">${pl.nome}</div>
            <div class="playlist-sub">${count} canz.</div>
        </div>`;
    }).join('');
}

function renderSongList(containerId, list) {
    const el = document.getElementById(containerId);
    if (!list.length) {
        el.innerHTML = '<div class="empty-msg">🎵 Nessuna canzone — carica dei file MP3</div>';
        return;
    }
    el.innerHTML = list.map((s, i) => songItemHtml(s, i)).join('');
}

function songItemHtml(s, i) {
    const isPlay = audio.src && audio.src === s.url && !audio.paused;
    const dur = s.durata_sec ? fmtTime(s.durata_sec) : '—';
    return `<div class="song-item${isPlay ? ' playing' : ''}" onclick="playSong(${s.id})" data-song-id="${s.id}">
        <div class="song-num${isPlay ? ' playing' : ''}">${isPlay ? '♫' : i + 1}</div>
        <div class="song-info">
            <div class="song-title${isPlay ? ' playing' : ''}">${s.titolo}</div>
            ${s.artista ? `<div class="song-artist">${s.artista}</div>` : ''}
        </div>
        <div class="song-dur">${dur}</div>
        <button class="btn-song-more" onclick="event.stopPropagation(); apriCtxSong(${s.id}, event)">⋮</button>
    </div>`;
}

// ── Playlist detail ────────────────────────────────────────────────────
function apriPlaylist(id) {
    currentPlaylistId = id;
    const pl = playlists.find(p => p.id === id);
    if (!pl) return;
    const plSongs = songs.filter(s => s.playlist_id === id);
    document.getElementById('mainView').style.display = 'none';
    document.getElementById('playlistView').style.display = '';
    document.getElementById('headerTitle').textContent = pl.nome;
    document.getElementById('plDetailName').textContent = pl.nome;
    document.getElementById('plDetailCount').textContent = `${plSongs.length} canzoni`;
    document.getElementById('btnUpload').style.display = '';
    renderSongList('playlistSongsList', plSongs);
}

function tornaAlMain() {
    currentPlaylistId = null;
    document.getElementById('mainView').style.display = '';
    document.getElementById('playlistView').style.display = 'none';
    document.getElementById('headerTitle').textContent = 'CANZONI';
}

function goBack() {
    if (currentPlaylistId) { tornaAlMain(); } else { history.back(); }
}

// ── Player ─────────────────────────────────────────────────────────────
function playSong(id, list) {
    const songList = list || (currentPlaylistId ? songs.filter(s => s.playlist_id === currentPlaylistId) : songs);
    const idx = songList.findIndex(s => s.id === id);
    if (idx === -1) return;
    queue = songList; queueIdx = idx;
    loadAndPlay();
}

function loadAndPlay() {
    const s = queue[queueIdx];
    if (!s) return;
    audio.src = s.url;
    audio.play().catch(e => console.warn('play error', e));
    document.getElementById('playerTitle').textContent = s.titolo;
    document.getElementById('playerArtist').textContent = s.artista || '';
    document.getElementById('playerBar').classList.add('visible');
    document.getElementById('btnPlayPause').textContent = '⏸';
    renderMain();
    if (currentPlaylistId) {
        const plSongs = songs.filter(s => s.playlist_id === currentPlaylistId);
        renderSongList('playlistSongsList', plSongs);
    }
}

function togglePlay() {
    if (audio.paused) { audio.play(); document.getElementById('btnPlayPause').textContent = '⏸'; }
    else { audio.pause(); document.getElementById('btnPlayPause').textContent = '▶'; }
}
function nextSong() { queueIdx = (queueIdx + 1) % queue.length; loadAndPlay(); }
function prevSong() { if (audio.currentTime > 3) { audio.currentTime = 0; return; } queueIdx = (queueIdx - 1 + queue.length) % queue.length; loadAndPlay(); }

function shuffle() {
    const list = currentPlaylistId ? songs.filter(s => s.playlist_id === currentPlaylistId) : songs;
    if (!list.length) { toast('Nessuna canzone'); return; }
    queue = [...list].sort(() => Math.random() - 0.5);
    queueIdx = 0; loadAndPlay();
    toast('🔀 Shuffle attivo');
}

function updateProgress() {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('timeCur').textContent = fmtTime(audio.currentTime);
    document.getElementById('timeTot').textContent = fmtTime(audio.duration);
}

function seekClick(e) {
    const rect = e.currentTarget.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pct * audio.duration;
}

function fmtTime(sec) {
    const m = Math.floor(sec / 60), s = Math.floor(sec % 60);
    return `${m}:${s.toString().padStart(2,'0')}`;
}

// ── Upload ─────────────────────────────────────────────────────────────
async function handleFiles(fileList) {
    const files = Array.from(fileList).filter(f => f.type.startsWith('audio/') || f.name.match(/\.(mp3|aac|ogg|wav|flac|m4a)$/i));
    if (!files.length) { toast('Nessun file audio selezionato'); return; }
    const bar = document.getElementById('uploadBar');
    bar.style.display = 'block';
    let ok = 0;
    for (let i = 0; i < files.length; i++) {
        const file = files[i];
        bar.textContent = `⬆️ Carico ${i + 1} di ${files.length}: ${file.name}`;
        try {
            const slug = userEmail.replace(/[^a-zA-Z0-9]/g, '_');
            const ext = file.name.split('.').pop().toLowerCase();
            const fname = `${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
            const path = `${slug}/audio/${fname}`;

            const { error: upErr } = await sb.storage.from('canzoni').upload(path, file, { contentType: file.type || 'audio/mpeg' });
            if (upErr) throw upErr;

            const { data: { publicUrl } } = sb.storage.from('canzoni').getPublicUrl(path);

            // Try to read duration
            let durata_sec = null;
            try { durata_sec = await getAudioDuration(file); } catch {}

            // Parse title from filename
            const baseName = file.name.replace(/\.[^.]+$/, '');
            const [artista, titolo] = baseName.includes(' - ')
                ? baseName.split(' - ', 2).map(s => s.trim())
                : [null, baseName];

            const { error: dbErr } = await sb.from('canzoni').insert({
                email_utente: userEmail,
                playlist_id: currentPlaylistId || null,
                titolo: titolo || baseName,
                artista: artista || null,
                storage_path: path,
                url: publicUrl,
                size_bytes: file.size,
                durata_sec,
                sort_order: Date.now() + i
            });
            if (dbErr) throw dbErr;
            ok++;
        } catch(e) {
            console.error(e);
            toast('Errore: ' + (e.message || 'riprova'));
        }
    }
    bar.style.display = 'none';
    document.getElementById('fileInput').value = '';
    await carica();
    if (currentPlaylistId) apriPlaylist(currentPlaylistId);
    if (ok > 0) toast(`✓ ${ok} canzoni caricate!`);
}

function getAudioDuration(file) {
    return new Promise((resolve, reject) => {
        const url = URL.createObjectURL(file);
        const a = document.createElement('audio');
        a.src = url;
        a.onloadedmetadata = () => { URL.revokeObjectURL(url); resolve(a.duration); };
        a.onerror = reject;
    });
}

// ── Playlists CRUD ─────────────────────────────────────────────────────
function apriNuovaPlaylist() {
    editPlaylistId = null;
    document.getElementById('plModalTitle').textContent = 'Nuova raccolta';
    document.getElementById('plNome').value = '';
    document.getElementById('btnElPlaylist').style.display = 'none';
    document.getElementById('modalePlaylist').classList.add('open');
}

async function salvaPlaylist() {
    const nome = document.getElementById('plNome').value.trim();
    if (!nome) { toast('Inserisci il nome'); return; }
    if (editPlaylistId) {
        await sb.from('canzoni_playlist').update({ nome }).eq('id', editPlaylistId);
        toast('✓ Raccolta rinominata');
    } else {
        const { error } = await sb.from('canzoni_playlist').insert({ email_utente: userEmail, nome });
        if (error) { toast('Errore: ' + error.message); return; }
        toast('✓ Raccolta creata');
    }
    document.getElementById('modalePlaylist').classList.remove('open');
    await carica();
}

async function eliminaPlaylist() {
    if (!editPlaylistId || !confirm('Eliminare la raccolta? Le canzoni rimarranno.')) return;
    await sb.from('canzoni_playlist').delete().eq('id', editPlaylistId);
    document.getElementById('modalePlaylist').classList.remove('open');
    toast('Raccolta eliminata');
    await carica();
}

// ── Context menu ────────────────────────────────────────────────────────
function apriCtxSong(id, e) {
    ctxTargetId = id; ctxTargetType = 'song';
    showCtx(e.clientX, e.clientY);
    document.getElementById('ctxRinomina').textContent = '✏️ Modifica';
    document.getElementById('ctxSposta').style.display = 'none';
}
function showCtx(x, y) {
    const m = document.getElementById('ctxMenu');
    m.classList.add('open');
    m.style.left = Math.min(x, window.innerWidth - 200) + 'px';
    m.style.top = Math.min(y, window.innerHeight - 150) + 'px';
}
document.addEventListener('click', e => { if (!document.getElementById('ctxMenu').contains(e.target)) document.getElementById('ctxMenu').classList.remove('open'); });

async function ctxAction(action) {
    document.getElementById('ctxMenu').classList.remove('open');
    if (ctxTargetType === 'song') {
        const s = songs.find(x => x.id === ctxTargetId);
        if (!s) return;
        if (action === 'rinomina') { apriEditSong(s); }
        else if (action === 'elimina') { await eliminaSongById(ctxTargetId); }
    }
}

function apriEditSong(s) {
    editSongId = s.id;
    document.getElementById('sTitolo').value = s.titolo || '';
    document.getElementById('sArtista').value = s.artista || '';
    const sel = document.getElementById('sPlaylist');
    sel.innerHTML = '<option value="">— Nessuna raccolta —</option>' +
        playlists.map(p => `<option value="${p.id}"${p.id === s.playlist_id ? ' selected' : ''}>${p.nome}</option>`).join('');
    document.getElementById('modaleSong').classList.add('open');
}

async function salvaSong() {
    const s = songs.find(x => x.id === editSongId);
    if (!s) return;
    const titolo = document.getElementById('sTitolo').value.trim();
    if (!titolo) { toast('Inserisci il titolo'); return; }
    const plVal = document.getElementById('sPlaylist').value;
    const { error } = await sb.from('canzoni').update({
        titolo,
        artista: document.getElementById('sArtista').value.trim() || null,
        playlist_id: plVal ? Number(plVal) : null
    }).eq('id', editSongId);
    if (error) { toast('Errore: ' + error.message); return; }
    document.getElementById('modaleSong').classList.remove('open');
    toast('✓ Salvato');
    await carica();
    if (currentPlaylistId) apriPlaylist(currentPlaylistId);
}

async function eliminaSong() {
    if (!editSongId || !confirm('Eliminare questa canzone?')) return;
    document.getElementById('modaleSong').classList.remove('open');
    await eliminaSongById(editSongId);
}

async function eliminaSongById(id) {
    const s = songs.find(x => x.id === id);
    if (!s) return;
    if (audio.src === s.url) { audio.pause(); audio.src = ''; document.getElementById('playerBar').classList.remove('visible'); }
    await sb.storage.from('canzoni').remove([s.storage_path]);
    await sb.from('canzoni').delete().eq('id', id);
    toast('Canzone eliminata');
    await carica();
    if (currentPlaylistId) apriPlaylist(currentPlaylistId);
}

[document.getElementById('modalePlaylist'), document.getElementById('modaleSong')].forEach(m => {
    m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

let toastTimer;
function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

carica();
</script>
